<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Объединение таблиц Word — GigaChat</title>
<script>
    (function () {
        var t = localStorage.getItem('giga_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
    })();
</script>
<style>
:root {
    --bg-primary: #0a0e15;
    --bg-secondary: #131820;
    --bg-input: #1b2230;
    --bg-card: #131820;
    --border: #283040;
    --text-primary: #e6e8ec;
    --text-secondary: #8a98a8;
    --text-muted: #5a6878;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-light: rgba(37, 99, 235, 0.12);
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: Segoe UI, Tahoma, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.btn-home { display:block; padding:10px 16px; background:#070a10; border-bottom:1px solid var(--border); color:#7a8a9a; text-decoration:none; font-size:13px; transition:color .2s; }
.btn-home:hover { color: var(--accent); }
.btn-home .arrow { margin-right:6px; }

header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
}
header h1 {
    font-family: Consolas, monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
}
.header-right { display: flex; align-items: center; gap: 12px; }

.theme-toggle {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 50%;
    width: 36px; height: 36px;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
    color: var(--text-secondary);
    flex-shrink: 0;
}
.theme-toggle:hover { border-color: rgba(255, 255, 255, 0.4); color: var(--text-primary); transform: scale(1.08); }
.theme-toggle svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.theme-toggle .theme-icon-sun { display: inline-flex; }
.theme-toggle .theme-icon-moon { display: none; }

main {
    flex: 1;
    padding: 32px 24px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
}

.intro {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
}
.intro h2 {
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 10px;
    font-weight: 600;
}
.intro p {
    color: var(--text-secondary);
    font-size: 13.5px;
    line-height: 1.6;
}
.intro p + p { margin-top: 8px; }
.intro code {
    background: var(--bg-input);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: Consolas, monospace;
    font-size: 12px;
    color: var(--accent);
}

.drop-zone {
    display: block;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    transition: all 0.2s;
    cursor: pointer;
    background: var(--bg-card);
    margin-bottom: 16px;
}
.drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-light);
}
/* pointer-events: none на детях предотвращает «мерцание» dragover —
   браузер не считает заход курсора на дочерний div выходом из drop-zone. */
.drop-zone > * { pointer-events: none; }
.drop-zone .icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.5;
}
.drop-zone .title {
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 6px;
    font-weight: 500;
}
.drop-zone .hint {
    font-size: 12px;
    color: var(--text-muted);
}
.drop-zone input[type="file"] { display: none; }

#fileList {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
}
#fileList.show { display: block; }
#fileList .file-list-header {
    padding: 12px 18px;
    background: var(--bg-input);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
}
#fileList .file-list-header .count {
    color: var(--accent);
    font-weight: 600;
}
#fileList .file-list-header .clear-all {
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    background: none;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: inherit;
}
#fileList .file-list-header .clear-all:hover { color: var(--error); background: rgba(239,68,68,0.08); }
.file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
}
.file-row:last-child { border-bottom: none; }
.file-row .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-primary);
}
.file-row .size {
    color: var(--text-muted);
    font-size: 12px;
    font-family: Consolas, monospace;
    flex-shrink: 0;
}
.file-row .remove {
    width: 22px; height: 22px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
}
.file-row .remove:hover { color: var(--error); background: rgba(239,68,68,0.08); }

.warning {
    background: rgba(245, 158, 11, 0.10);
    border: 1px solid rgba(245, 158, 11, 0.4);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: var(--warning);
    font-size: 13px;
    display: none;
}
.warning.show { display: block; }

.error-msg {
    background: rgba(239, 68, 68, 0.10);
    border: 1px solid rgba(239, 68, 68, 0.4);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: var(--error);
    font-size: 13px;
    display: none;
}
.error-msg.show { display: block; }

.success-msg {
    background: rgba(16, 185, 129, 0.10);
    border: 1px solid rgba(16, 185, 129, 0.4);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: var(--success);
    font-size: 13px;
    display: none;
}
.success-msg.show { display: block; }

.actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}
.btn-primary {
    padding: 12px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14.5px;
    font-weight: 600;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary {
    padding: 12px 20px;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
}
.btn-secondary:hover:not(:disabled) { color: var(--text-primary); border-color: var(--text-secondary); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
}
.status-bar .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #f0ad4e;
    animation: pulse 1s infinite;
}
.status-bar .dot.online { background: #4caf50; box-shadow: 0 0 8px rgba(76,175,80,0.5); animation: pulse 2s infinite; }
.status-bar .dot.offline { background: #cc4444; box-shadow: 0 0 8px rgba(204,68,68,0.4); animation: none; }
.status-bar .dot.checking { background: #f0ad4e; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ============ СВЕТЛАЯ ТЕМА ============ */

    --bg-primary: #faf6ee;
    --bg-secondary: #f5efe1;
    --bg-input: #f0e8d4;

}
:root[data-theme="light"] body { background: var(--bg-primary); color: var(--text-primary); }

:root[data-theme="light"] .theme-toggle { border-color: rgba(212, 175, 55, 0.35); color: #8a7754; }
:root[data-theme="light"] .theme-toggle:hover { border-color: rgba(212, 175, 55, 0.7); color: #2d2416; box-shadow: 0 0 16px rgba(212, 175, 55, 0.25); }
:root[data-theme="light"] .theme-toggle .theme-icon-sun { display: none; }
:root[data-theme="light"] .theme-toggle .theme-icon-moon { display: inline-flex; }
</style>

<body>

<a class="btn-home" href="../GigaChat-Platform.html"><span class="arrow">&#8592;</span>GigaChat</a>

<header>
    <h1>Объединение Word — GigaChat</h1>
    <div class="header-right">
        <div class="status-bar"><span class="dot checking" id="statusDot"></span><span id="statusText">проверка...</span></div>
        <button class="theme-toggle" onclick="GigaChat.toggleTheme()" title="Сменить тему" aria-label="Сменить тему">
            <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
            <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>
</header>

<main>
    <div class="intro">
        <h2>Что делает инструмент</h2>
        <p>Загружаете несколько <b>Word-файлов</b> (<code>.docx</code>) с одинаковыми таблицами. Инструмент склеивает все таблицы в одну и отдаёт итоговый <code>.docx</code>.</p>
        <p>Читается <b>первая таблица</b> в каждом документе. Первая строка таблицы — заголовок.</p>
    </div>

    <label class="drop-zone" id="dropZone" for="fileInput">
        <div class="icon">📄</div>
        <div class="title">Перетащите Word-файлы сюда или нажмите для выбора</div>
        <div class="hint">Принимаются только <b>.docx</b>.</div>
        <input type="file" id="fileInput" multiple accept=".docx">
    </label>

    <div class="warning" id="warningBox"></div>
    <div class="error-msg" id="errorBox"></div>
    <div class="success-msg" id="successBox"></div>

    <div id="fileList">
        <div class="file-list-header">
            <span>Выбрано: <span class="count" id="fileCount">0</span></span>
            <button class="clear-all" type="button" onclick="clearFiles()">Очистить</button>
        </div>
        <div id="fileRows"></div>
    </div>

    <div class="actions">
        <button class="btn-primary" id="mergeBtn" onclick="doMerge()" disabled>
            <span id="mergeBtnText">Объединить и скачать</span>
        </button>
    </div>
</main>

<script>
// Word-объединение работает ПОЛНОСТЬЮ В БРАУЗЕРЕ через JSZip.
// Никаких HTTP-запросов, никакого Python-сервиса, никакого n8n.
// Файл .docx — это zip-архив; внутри word/document.xml — XML с таблицей.
// Распаковываем → парсим → склеиваем таблицы → запаковываем → скачиваем.
var MAX_FILES_WARN = 10;
var MAX_FILES_HARD = 25;

var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var fileList = document.getElementById('fileList');
var fileRows = document.getElementById('fileRows');
var fileCount = document.getElementById('fileCount');
var warningBox = document.getElementById('warningBox');
var errorBox = document.getElementById('errorBox');
var successBox = document.getElementById('successBox');
var mergeBtn = document.getElementById('mergeBtn');
var mergeBtnText = document.getElementById('mergeBtnText');
var statusDot = document.getElementById('statusDot');
var statusText = document.getElementById('statusText');

var selectedFiles = [];

function escapeHtml(s) { return GigaChat.escapeHtml(s); }

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' Б';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
    return (bytes / 1024 / 1024).toFixed(1) + ' МБ';
}

function detectKind(name) {
    var lower = (name || '').toLowerCase();
    if (lower.endsWith('.docx')) return 'docx';
    return null;
}

function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
    successBox.classList.remove('show');
}
function clearError() {
    errorBox.classList.remove('show');
}
function showSuccess(msg) {
    successBox.textContent = msg;
    successBox.classList.add('show');
    errorBox.classList.remove('show');
}
function clearSuccess() {
    successBox.classList.remove('show');
}

function renderList() {
    if (selectedFiles.length === 0) {
        fileList.classList.remove('show');
        warningBox.classList.remove('show');
        mergeBtn.disabled = true;
        return;
    }
    fileList.classList.add('show');
    fileCount.textContent = selectedFiles.length;

    var html = '';
    for (var i = 0; i < selectedFiles.length; i++) {
        var f = selectedFiles[i];
        html += '<div class="file-row">';
        html += '<span class="name">' + escapeHtml(f.name) + '</span>';
        html += '<span class="size">' + formatSize(f.size) + '</span>';
        html += '<button class="remove" onclick="removeFile(' + i + ')" title="Удалить">×</button>';
        html += '</div>';
    }
    fileRows.innerHTML = html;

    // Предупреждения
    var warns = [];
    if (selectedFiles.length > MAX_FILES_HARD) {
        warns.push('Превышен предел в ' + MAX_FILES_HARD + ' файлов. Удалите лишние.');
    } else if (selectedFiles.length > MAX_FILES_WARN) {
        warns.push('Файлов больше ' + MAX_FILES_WARN + ' — обработка может занять минуту или дольше.');
    }
    // Проверка одинаковости формата
    var kinds = {};
    for (var j = 0; j < selectedFiles.length; j++) {
        var k = detectKind(selectedFiles[j].name);
        if (k) kinds[k] = true;
        else warns.push('Файл «' + selectedFiles[j].name + '» имеет неподдерживаемый формат.');
    }
    if (Object.keys(kinds).length > 1) {
        warns.push('Файлы разных форматов. Оставьте только .docx.');
    }

    if (warns.length > 0) {
        warningBox.innerHTML = warns.map(function(w) { return '⚠ ' + escapeHtml(w); }).join('<br>');
        warningBox.classList.add('show');
    } else {
        warningBox.classList.remove('show');
    }

    var canMerge = selectedFiles.length >= 1 &&
                   selectedFiles.length <= MAX_FILES_HARD &&
                   Object.keys(kinds).length === 1;
    mergeBtn.disabled = !canMerge;
}

function addFiles(fileLikeList) {
    clearError();
    clearSuccess();
    for (var i = 0; i < fileLikeList.length; i++) {
        var f = fileLikeList[i];
        // Защита от дубликатов по имени+размеру
        var dup = false;
        for (var j = 0; j < selectedFiles.length; j++) {
            if (selectedFiles[j].name === f.name && selectedFiles[j].size === f.size) {
                dup = true; break;
            }
        }
        if (!dup) selectedFiles.push(f);
    }
    renderList();
}

function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderList();
}
function clearFiles() {
    selectedFiles = [];
    fileInput.value = '';
    renderList();
    clearError();
    clearSuccess();
}

fileInput.addEventListener('change', function() {
    addFiles(fileInput.files);
    // Сбрасываем value чтобы можно было загрузить тот же файл повторно
    fileInput.value = '';
});

dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer && e.dataTransfer.files) {
        addFiles(e.dataTransfer.files);
    }
});
// =================== Browser-only merge через JSZip + DOMParser ===================

var WNS = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';

function normalizeHeader(h) {
    return String(h == null ? '' : h).trim().toLowerCase()
        .replace(/[\s._\-(){}\[\]\\\/:;,!?'"]+/g, '');
}

// Извлекает текст из всех ячеек <w:tc> одной строки <w:tr>.
function extractRowText(tr) {
    var tcs = tr.getElementsByTagName('w:tc');
    var result = [];
    for (var i = 0; i < tcs.length; i++) {
        var ts = tcs[i].getElementsByTagName('w:t');
        var parts = [];
        for (var j = 0; j < ts.length; j++) {
            parts.push(ts[j].textContent || '');
        }
        result.push(parts.join(''));
    }
    return result;
}

// Парсит один docx-файл: распаковывает, находит первую таблицу, извлекает строки.
async function parseDocx(file) {
    var buf = await file.arrayBuffer();
    var zip = await JSZip.loadAsync(buf);
    var xmlFile = zip.file('word/document.xml');
    if (!xmlFile) throw new Error('В файле «' + file.name + '» нет word/document.xml — это не Word-документ.');
    var xml = await xmlFile.async('string');
    var doc = new DOMParser().parseFromString(xml, 'application/xml');
    var pe = doc.getElementsByTagName('parsererror')[0];
    if (pe) throw new Error('Файл «' + file.name + '»: не удалось разобрать XML.');

    var tables = doc.getElementsByTagName('w:tbl');
    if (tables.length === 0) throw new Error('В файле «' + file.name + '» нет таблиц.');
    var tbl = tables[0];

    var rows = tbl.getElementsByTagName('w:tr');
    if (rows.length === 0) throw new Error('Таблица в файле «' + file.name + '» пустая.');

    var headers = extractRowText(rows[0]);
    var dataRows = [];
    for (var i = 1; i < rows.length; i++) {
        var rowText = extractRowText(rows[i]);
        // Пропускаем полностью пустые строки
        var hasContent = false;
        for (var j = 0; j < rowText.length; j++) {
            if (String(rowText[j] || '').trim() !== '') { hasContent = true; break; }
        }
        if (hasContent) dataRows.push(rowText);
    }

    return { file: file, zip: zip, doc: doc, tbl: tbl, headers: headers, dataRows: dataRows };
}

// Создаёт XML-узел <w:tr> с ячейками.
function buildRow(xmlDoc, cells, isHeader) {
    var tr = xmlDoc.createElementNS(WNS, 'w:tr');
    for (var i = 0; i < cells.length; i++) {
        var tc = xmlDoc.createElementNS(WNS, 'w:tc');

        var tcPr = xmlDoc.createElementNS(WNS, 'w:tcPr');
        var tcW = xmlDoc.createElementNS(WNS, 'w:tcW');
        tcW.setAttributeNS(WNS, 'w:w', '2200');
        tcW.setAttributeNS(WNS, 'w:type', 'dxa');
        tcPr.appendChild(tcW);
        tc.appendChild(tcPr);

        var p = xmlDoc.createElementNS(WNS, 'w:p');
        var r = xmlDoc.createElementNS(WNS, 'w:r');
        if (isHeader) {
            var rPr = xmlDoc.createElementNS(WNS, 'w:rPr');
            var b = xmlDoc.createElementNS(WNS, 'w:b');
            rPr.appendChild(b);
            r.appendChild(rPr);
        }
        var t = xmlDoc.createElementNS(WNS, 'w:t');
        t.setAttributeNS('http://www.w3.org/XML/1998/namespace', 'xml:space', 'preserve');
        t.textContent = String(cells[i] == null ? '' : cells[i]);
        r.appendChild(t);
        p.appendChild(r);
        tc.appendChild(p);
        tr.appendChild(tc);
    }
    return tr;
}

async function mergeDocxFiles(files) {
    // 1. Парсим все файлы
    var parsed = [];
    for (var i = 0; i < files.length; i++) {
        parsed.push(await parseDocx(files[i]));
    }

    // 2. Объединяем заголовки (union со стабильным порядком первого появления)
    var columnOrder = [];
    var canonical = {};
    for (var i = 0; i < parsed.length; i++) {
        var hs = parsed[i].headers;
        for (var j = 0; j < hs.length; j++) {
            var norm = normalizeHeader(hs[j]);
            if (!norm) continue;
            if (!(norm in canonical)) {
                canonical[norm] = hs[j];
                columnOrder.push(norm);
            }
        }
    }
    if (columnOrder.length === 0) throw new Error('Во всех файлах заголовки пустые — нечего объединять.');

    var mergedHeaders = columnOrder.map(function(k) { return canonical[k]; });

    // 3. Объединяем строки
    var mergedDataRows = [];
    for (var i = 0; i < parsed.length; i++) {
        var p = parsed[i];
        var localMap = {};
        for (var j = 0; j < p.headers.length; j++) {
            var norm = normalizeHeader(p.headers[j]);
            if (norm && !(norm in localMap)) localMap[norm] = j;
        }
        for (var k = 0; k < p.dataRows.length; k++) {
            var row = p.dataRows[k];
            var newRow = [];
            for (var c = 0; c < columnOrder.length; c++) {
                var idx = localMap[columnOrder[c]];
                newRow.push((idx != null && row[idx] != null) ? row[idx] : '');
            }
            mergedDataRows.push(newRow);
        }
    }
    if (mergedDataRows.length === 0) throw new Error('Во всех файлах нет данных кроме заголовков.');

    // 4. Берём первый файл как template — там сохранятся все служебные части docx
    //    (стили, шрифты, нумерация, заголовки страниц) и стиль таблицы.
    var template = parsed[0];
    var xmlDoc = template.doc;
    var origTbl = template.tbl;

    // Копируем w:tblPr из оригинальной таблицы (стиль, обводки, цвет и т.п.)
    var tblPr = origTbl.getElementsByTagName('w:tblPr')[0];

    // Строим новую таблицу
    var newTbl = xmlDoc.createElementNS(WNS, 'w:tbl');
    if (tblPr) newTbl.appendChild(tblPr.cloneNode(true));

    // w:tblGrid — определение ширин колонок
    var tblGrid = xmlDoc.createElementNS(WNS, 'w:tblGrid');
    for (var i = 0; i < mergedHeaders.length; i++) {
        var gc = xmlDoc.createElementNS(WNS, 'w:gridCol');
        gc.setAttributeNS(WNS, 'w:w', '2200');
        tblGrid.appendChild(gc);
    }
    newTbl.appendChild(tblGrid);

    // Заголовок (жирным) и данные
    newTbl.appendChild(buildRow(xmlDoc, mergedHeaders, true));
    for (var i = 0; i < mergedDataRows.length; i++) {
        newTbl.appendChild(buildRow(xmlDoc, mergedDataRows[i], false));
    }

    // Заменяем старую таблицу новой
    origTbl.parentNode.replaceChild(newTbl, origTbl);

    // 5. Сериализуем XML и пишем обратно в zip
    var newXml = new XMLSerializer().serializeToString(xmlDoc);
    if (newXml.indexOf('<?xml') !== 0) {
        newXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' + newXml;
    }
    template.zip.file('word/document.xml', newXml);

    // 6. Генерируем итоговый docx как Blob
    var blob = await template.zip.generateAsync({
        type: 'blob',
        mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });

    return { blob: blob, rowsCount: mergedDataRows.length, colsCount: mergedHeaders.length };
}

async function doMerge() {
    if (selectedFiles.length === 0) return;
    clearError();
    clearSuccess();
    mergeBtn.disabled = true;
    mergeBtnText.innerHTML = '<span class="spinner"></span> Обрабатываю...';

    try {
        var result = await mergeDocxFiles(selectedFiles);
        var filename = 'merged.docx';

        // Триггерим скачивание
        var url = URL.createObjectURL(result.blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);

        var filesCount = selectedFiles.length;
        showSuccess('Готово. Файл «' + filename + '» (' + formatSize(result.blob.size) +
                    ') скачан. Объединено файлов: ' + filesCount +
                    ', строк: ' + result.rowsCount + ', столбцов: ' + result.colsCount + '.');
        selectedFiles = [];
        fileInput.value = '';
    } catch (err) {
        showError(err && err.message ? err.message : 'Не удалось обработать файлы.');
    } finally {
        mergeBtn.disabled = false;
        mergeBtnText.textContent = 'Объединить и скачать';
        renderList();
    }
}

// Status check: проверяем что JSZip загрузился — это всё что нужно для работы.
function checkStatus() {
    if (typeof JSZip === 'undefined') {
        statusDot.className = 'dot offline';
        statusText.textContent = 'JSZip не загружен';
    } else {
        statusDot.className = 'dot online';
        statusText.textContent = 'готов';
    }
}
checkStatus();

renderList();
</script>

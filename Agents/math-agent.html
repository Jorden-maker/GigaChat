<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Математический агент - GigaChat</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-input: #0f3460;
            --bg-user: #1a3a5c;
            --bg-bot: #1e2a3a;
            --border: #2a4a6a;
            --text-primary: #e0e0e0;
            --text-secondary: #8899aa;
            --accent: #e94560;
            --accent-hover: #d63851;
            --code-bg: #0d1117;
            --code-text: #7ee787;
            --sidebar-width: 220px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Segoe UI, Tahoma, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .btn-home { display:block; padding:10px 16px; background:#0a0a1a; border-bottom:1px solid #1a2a4a; color:#667; text-decoration:none; font-size:13px; transition:color .2s; }
        .btn-home:hover { color:#e94560; }
        .btn-home .arrow { margin-right:6px; }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #0f0f23;
            border-right: 1px solid #1a2a4a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid #1a2a4a;
        }
        .sidebar-header h3 {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .sidebar-add {
            padding: 10px 16px;
            border-bottom: 1px solid #1a2a4a;
        }
        .sidebar-add button {
            width: 100%;
            padding: 8px;
            background: var(--bg-secondary);
            border: 1px dashed #2a4a6a;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .sidebar-add button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: #1a2a4a transparent;
        }
        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: background 0.15s;
        }
        .session-item:hover { background: var(--bg-secondary); }
        .session-item.active {
            background: var(--bg-secondary);
            color: var(--accent);
            border: 1px solid var(--border);
        }
        .session-item .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .session-item .close {
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px;
            color: #556; font-size: 14px;
            flex-shrink: 0; margin-left: 6px;
        }
        .session-item .close:hover { background: #2a2a4a; color: #ff6666; }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            flex-shrink: 0;
            border-bottom: 1px solid #1a3a5a;
        }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header-right { display:flex; align-items:center; gap:12px; }
        header h1 {
            font-family: Consolas, monospace;
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 2px;
        }
        header .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        header .status .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #f0ad4e;
            animation: pulse 1s infinite;
        }
        header .status .dot.online { background: #4caf50; box-shadow: 0 0 8px rgba(76,175,80,0.5); animation: pulse 2s infinite; }
        header .status .dot.offline { background: #cc4444; box-shadow: 0 0 8px rgba(204,68,68,0.4); animation: none; }
        header .status .dot.checking { background: #f0ad4e; animation: pulse 1s infinite; }
        .btn-export { padding:6px 16px; background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-secondary); border-radius:6px; cursor:pointer; font-size:12px; transition:all .2s; }
        .btn-export:hover { background:rgba(77,171,255,0.15); color:var(--accent); border-color:var(--accent); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: #2a4a6a transparent;
        }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 10px; }
        .msg {
            margin: 10px 0;
            padding: 14px 18px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 14.5px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user {
            background: var(--bg-user);
            margin-left: auto;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .bot {
            background: var(--bg-bot);
            border: 1px solid #253545;
            color: #c8c8c8;
        }
        .bot b { color: var(--text-primary); }
        .code-block {
            background: var(--code-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            font-family: Consolas, monospace;
            font-size: 13px;
            color: var(--code-text);
            white-space: pre-wrap;
            overflow-x: auto;
            position: relative;
        }
        .code-block .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #30363d;
            border: none;
            color: #8b949e;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .code-block .copy-btn:hover { background: #484f58; color: #e0e0e0; }
        .raw-result {
            background: #1a2332;
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            margin: 8px 0;
            font-family: Consolas, monospace;
            font-size: 14px;
            color: #ffcc00;
        }
        .loading {
            display: flex; align-items: center; gap: 8px;
            color: var(--text-secondary); font-size: 13px;
            padding: 14px 18px; font-style: italic;
        }
        .loading .dots span {
            display: inline-block; width: 4px; height: 4px;
            border-radius: 50%; background: var(--text-secondary);
            animation: blink 1.4s infinite;
        }
        .loading .dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .error {
            background: #2a1020; border: 1px solid #cc4444;
            color: #ff8888; padding: 12px 16px;
            border-radius: 10px; margin: 10px 0; font-size: 13px;
        }
        .timer {
            font-family: Consolas, monospace;
            font-size: 11px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        .bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
        #input-area { display: flex; gap: 10px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 14px 18px;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif;
            font-size: 15px; outline: none;
            transition: border-color 0.2s;
            resize: none; min-height: 48px; max-height: 150px; line-height: 1.5;
            overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-track { background: transparent; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: #445566; }
        #send {
            padding: 14px 24px; background: var(--accent);
            color: white; border: none; border-radius: 10px;
            cursor: pointer; font-family: Segoe UI, Tahoma, sans-serif;
            font-size: 14px; font-weight: 600;
            letter-spacing: 0.5px; transition: background 0.2s; align-self: flex-end; flex-shrink: 0;
        }
        #send:hover { background: var(--accent-hover); }
        #send:disabled { opacity: 0.4; cursor: not-allowed; }
        .empty-chat {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: #445566; font-size: 14px;
        }
    </style>
    <script src="_config.js"></script>
    <script src="_shared.js"></script>
</head>
<body>
    <div class="sidebar">
        <a class="btn-home" href="../GigaChat-Platform.html"><span class="arrow">&#8592;</span>GigaChat</a>
        <div class="sidebar-header"><h3>Сессии</h3></div>
        <div class="sidebar-add">
            <button onclick="createNewSession()">+ Новая сессия</button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left">
                <h1>Математический агент - GigaChat</h1>
            </div>
            <div class="header-right">
                <div class="status" id="statusBar">
                    <span class="dot checking" id="statusDot"></span>
                    <span id="statusText">проверка...</span>
                </div>
                <button class="btn-export" onclick="exportChat()">Экспорт</button>
            </div>
        </header>
        <div id="chat">
            <div class="empty-chat">Создайте новую сессию для начала работы</div>
        </div>
        <div class="bottom-area">
            <div id="input-area">
                <textarea id="msg" rows="1" placeholder="Введите математическую задачу..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,150)+'px';" disabled></textarea>
                <button id="send" onclick="sendMsg()" disabled>Решить</button>
            </div>
        </div>
    </div>
    <script>
        var WEBHOOK_URL = GigaChat.webhookUrl('math');
        var FETCH_TIMEOUT_MS = 120000;
        var MAX_RETRIES = 2;
        var RETRY_DELAY_MS = 3000;

        var HISTORY_URL = GigaChat.webhookUrl('history');

        var chat = document.getElementById('chat');
        var input = document.getElementById('msg');
        var btn = document.getElementById('send');
        var sessionList = document.getElementById('sessionList');
        var statusDot = document.getElementById('statusDot');
        var statusText = document.getElementById('statusText');
        var sessions = [];
        var displayMessages = [];
        var activeSessionId = null;
        var sessionCounter = 0;
        var isProcessing = false;

        function saveSessions() {
            try {
                localStorage.setItem('math_sessions', JSON.stringify(sessions));
                localStorage.setItem('math_active', activeSessionId || '');
                localStorage.setItem('math_counter', sessionCounter);
            } catch (e) {}
        }
        function loadSessions() {
            try {
                var s = localStorage.getItem('math_sessions');
                var a = localStorage.getItem('math_active');
                var c = localStorage.getItem('math_counter');
                if (s) sessions = JSON.parse(s);
                if (a) activeSessionId = a || null;
                if (c) sessionCounter = parseInt(c, 10) || 0;
                try { localStorage.removeItem('math_histories'); } catch (e) {}
            } catch (e) {}
        }
        function checkServerStatus() {
            return GigaChat.checkServerStatus(WEBHOOK_URL, statusDot, statusText);
        }
        function createNewSession() {
            sessionCounter++;
            var id = 'math_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            sessions.push({ id: id, name: 'Вычисление-' + sessionCounter });
            switchToSession(id, { skipHistoryLoad: true });
        }
        async function switchToSession(id, opts) {
            opts = opts || {};
            activeSessionId = id;
            displayMessages = [];
            renderSessionList();
            saveSessions();
            input.disabled = false; btn.disabled = false; input.focus();
            if (opts.skipHistoryLoad) {
                renderChat();
                return;
            }
            await loadHistoryForActive(id);
        }
        async function loadHistoryForActive(targetSessionId) {
            chat.innerHTML = '<div class="empty-chat">Загружаю историю...</div>';
            try {
                var res = await fetch(HISTORY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify({ session_id: targetSessionId })
                });
                if (activeSessionId !== targetSessionId) return;
                if (!res.ok) throw new Error('Сервер ответил ' + res.status);
                var data = await res.json();
                if (activeSessionId !== targetSessionId) return;
                displayMessages = (data.messages || []).map(function (m) {
                    return { role: m.role, content: m.content, extras: m.extras || null };
                });
                renderChat();
            } catch (e) {
                if (activeSessionId !== targetSessionId) return;
                displayMessages = [];
                chat.innerHTML = '<div class="empty-chat">Не удалось загрузить историю: ' + escapeHtml(e.message) + '</div>';
            }
        }
        function deleteSession(id, event) {
            event.stopPropagation();
            sessions = sessions.filter(function(s) { return s.id !== id; });
            if (activeSessionId === id) {
                if (sessions.length > 0) { switchToSession(sessions[sessions.length - 1].id); }
                else {
                    activeSessionId = null;
                    displayMessages = [];
                    chat.innerHTML = '<div class="empty-chat">Создайте новую сессию для начала работы</div>';
                    input.disabled = true; btn.disabled = true;
                }
            }
            renderSessionList(); saveSessions();
        }
        function renderSessionList() {
            var html = '';
            for (var i = 0; i < sessions.length; i++) {
                var s = sessions[i];
                var isActive = s.id === activeSessionId ? ' active' : '';
                html += '<div class="session-item' + isActive + '" onclick="switchToSession(\'' + s.id + '\')">';
                html += '<span class="name">' + escapeHtml(s.name) + '</span>';
                html += '<span class="close" onclick="deleteSession(\'' + s.id + '\', event)">&#215;</span>';
                html += '</div>';
            }
            sessionList.innerHTML = html;
        }
        function renderChat() {
            if (!activeSessionId || !sessions.find(function(s){ return s.id === activeSessionId; })) {
                chat.innerHTML = '<div class="empty-chat">Создайте новую сессию для начала работы</div>';
                return;
            }
            if (displayMessages.length === 0) { chat.innerHTML = ''; return; }
            var html = '';
            for (var i = 0; i < displayMessages.length; i++) {
                var m = displayMessages[i];
                if (m.role === 'user') {
                    html += '<div class="msg user">' + escapeHtml(m.content) + '</div>';
                } else {
                    html += '<div class="msg bot">' + formatBotMessage(m) + '</div>';
                }
            }
            chat.innerHTML = html;
            chat.scrollTop = chat.scrollHeight;
        }
        function fetchWithRetry(url, options, retries) {
            return GigaChat.fetchWithRetry(url, options, { timeout: FETCH_TIMEOUT_MS, retries: retries, retryDelay: RETRY_DELAY_MS });
        }
        async function sendMsg() {
            if (!activeSessionId || !sessions.find(function(s){ return s.id === activeSessionId; })) return;
            var text = input.value.trim();
            if (!text || isProcessing) return;
            isProcessing = true;
            var sendSessionId = activeSessionId;
            displayMessages.push({ role: 'user', content: text });
            renderChat();
            input.value = ''; input.disabled = true; btn.disabled = true;

            var loadingId = 'loading-' + Date.now();
            var startTime = Date.now();
            chat.innerHTML += '<div class="loading" id="' + loadingId + '">Считаю <span class="dots"><span>.</span><span>.</span><span>.</span></span><span class="timer" id="timer-' + loadingId + '">0 сек</span></div>';
            chat.scrollTop = chat.scrollHeight;

            var timerInterval = setInterval(function() {
                var el = document.getElementById('timer-' + loadingId);
                if (el) {
                    var sec = Math.floor((Date.now() - startTime) / 1000);
                    el.textContent = sec + ' сек';
                }
            }, 1000);

            try {
                var res = await fetchWithRetry(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify({ message: text, session_id: sendSessionId })
                }, MAX_RETRIES);

                clearInterval(timerInterval);
                var loading = document.getElementById(loadingId);
                if (loading) loading.remove();

                if (!res.ok) throw new Error('Сервер вернул ошибку: ' + res.status);

                var data = await res.json();
                if (activeSessionId === sendSessionId) {
                    displayMessages.push({
                        role: 'assistant',
                        content: data.response || 'Пустой ответ',
                        extras: { code: data.code || '', raw_result: data.raw_result || '' }
                    });
                    renderChat();
                }
                statusDot.className = 'dot online'; statusText.textContent = 'Онлайн';
            } catch (e) {
                clearInterval(timerInterval);
                var loading = document.getElementById(loadingId);
                if (loading) loading.remove();
                if (activeSessionId === sendSessionId) {
                    displayMessages.push({
                        role: 'assistant',
                        content: 'Ошибка: ' + e.message,
                        extras: null
                    });
                    renderChat();
                }
                statusDot.className = 'dot offline'; statusText.textContent = 'Офлайн';
            }
            isProcessing = false;
            input.disabled = false; btn.disabled = false; input.focus();
            if (activeSessionId === sendSessionId) chat.scrollTop = chat.scrollHeight;
        }
        function formatBotMessage(msg) {
            var html = '';
            var extras = msg.extras || {};
            var code = extras.code || msg.code || '';
            var raw = extras.raw_result || msg.raw_result || '';
            if (code) {
                html += '<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Копировать</button>' + escapeHtml(code) + '</div>';
            }
            if (raw) {
                html += '<div class="raw-result">' + escapeHtml(raw) + '</div>';
            }
            html += formatText(msg.content || '');
            return html;
        }
        function exportChat() {
            if (!activeSessionId || displayMessages.length === 0) {
                alert('Нечего экспортировать.'); return;
            }
            var sessionName = '';
            for (var i = 0; i < sessions.length; i++) {
                if (sessions[i].id === activeSessionId) { sessionName = sessions[i].name; break; }
            }
            var lines = ['=== ' + sessionName + ' ===', 'Экспорт: ' + new Date().toLocaleString('ru-RU'), ''];
            for (var j = 0; j < displayMessages.length; j++) {
                var m = displayMessages[j];
                var extras = m.extras || {};
                var code = extras.code || m.code || '';
                var raw = extras.raw_result || m.raw_result || '';
                lines.push('[' + (m.role === 'user' ? 'Вы' : 'Мат. агент') + ']');
                if (code) { lines.push('Код: ' + code); }
                if (raw) { lines.push('Результат: ' + raw); }
                lines.push(m.content); lines.push('');
            }
            var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = sessionName + '_' + new Date().toISOString().slice(0, 10) + '.txt';
            a.click(); URL.revokeObjectURL(a.href);
        }
        function copyCode(btn) {
            var codeBlock = btn.parentElement;
            var code = codeBlock.textContent.replace('Копировать', '').trim();
            navigator.clipboard.writeText(code).then(function() {
                btn.textContent = 'Скопировано!';
                setTimeout(function() { btn.textContent = 'Копировать'; }, 2000);
            });
        }
        var escapeHtml = GigaChat.escapeHtml;
        function formatText(text) {
            if (!text) return '';
            var html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\*(.+?)\*/g, '<i>$1</i>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }
        loadSessions();
        // Проверяем что activeSessionId реально существует в списке сессий
        if (activeSessionId && !sessions.find(function(s){ return s.id === activeSessionId; })) {
            activeSessionId = null;
        }
        if (sessions.length > 0) {
            renderSessionList();
            if (activeSessionId) { switchToSession(activeSessionId); }
            else { switchToSession(sessions[sessions.length - 1].id); }
        }
        checkServerStatus();
        setInterval(checkServerStatus, 30000);
    </script>
</body>
</html>

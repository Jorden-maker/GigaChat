<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GigaChat Math</title>
    <script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
    <style>
        :root {
            --bg-primary: #1f1f1e;
            --bg-secondary: #1f1e1c;
            --bg-sidebar: #262626;
            --bg-input: #2c2c2a;
            --bg-user: rgba(212, 165, 116, 0.10);
            --bg-bot: #1f1e1c;
            --border: #363432;
            --text-primary: #d4d4d4;
            --text-secondary: #8a8a8a;
            --text-muted: #5a5a5a;
            --accent: #d4a574;
            --accent-hover: #c08a5a;
            --code-bg: #1f1e1c;
            --code-text: #d4d4d4;
            --sidebar-width: 270px;
        }
        :root[data-theme="light"] {
            --bg-primary: #fdfdfc;
            --bg-secondary: #f3f1ec;
            --bg-sidebar: #fdfdfc;
            --bg-input: #fffffe;
            --bg-user: rgba(184, 137, 93, 0.12);
            --bg-bot: #f3f1ec;
            --border: #e3dfd5;
            --text-primary: #1f1f1e;
            --text-secondary: #6b6b68;
            --text-muted: #a8a59f;
            --accent: #b8895d;
            --accent-hover: #a0764d;
            --code-bg: #f3f1ec;
            --code-text: #1f1f1e;
        }
        /* Общие стили чат-агента — в _shared.js через GigaChat.injectAgentCss().
           Здесь только per-page правила. */
        #chat { flex: 1; overflow-y: auto; padding: 20px 40px 45px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        /* Math: активная сессия с border (в shared — без), переопределяем тут. */
        .session-item.active { color: var(--accent); border: 1px solid var(--border); }
        .code-block {
            background: var(--code-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            font-family: Consolas, monospace;
            font-size: 13px;
            color: var(--code-text);
            white-space: pre-wrap;
            overflow-x: auto;
            position: relative;
        }
        .code-block .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .code-block .copy-btn:hover { background: var(--bg-hover); color: var(--accent); border-color: var(--accent); }
        .code-block .code-body { margin: 0; font: inherit; background: transparent; color: inherit; white-space: pre-wrap; }
        .raw-result {
            background: var(--bg-secondary);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            margin: 8px 0;
            font-family: Consolas, monospace;
            font-size: 14px;
            color: var(--accent);
        }
        .bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
        /* Поле ввода: textarea + иконка-отправки (внутри) + скрепка (снаружи).
           Базовая раскладка задаётся классом .gc-input-row в _shared.js. */
        #input-area { display: flex; gap: 8px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif;
            font-size: 15px; outline: none;
            transition: border-color 0.2s;
            resize: none; min-height: 36px; max-height: 130px; line-height: 1.5;
            overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-track { background: transparent; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: var(--text-muted); }
        .empty-chat {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--text-muted); font-size: 14px;
        }
    </style>
    <script src="_config.js"></script>
    <link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
    <script src="lib/highlight.min.js"></script>
    <script src="_shared.js"></script>
    <script src="lib/jszip.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div class="sidebar-header"><h3>Сессии</h3></div>
        <div class="sidebar-add">
            <button onclick="createNewSession()">Новая сессия</button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left">
                <h1>GigaChat Math</h1>
            </div>
            <div class="header-right">
                <div class="status" id="statusBar">
                    <span class="dot checking" id="statusDot"></span>
                    <span id="statusText">проверка...</span>
                </div>
                <button class="btn-export" onclick="exportChat()">Экспорт</button>
            </div>
        </header>
        <div id="chat">
            <div class="empty-chat">Создайте новую сессию для начала работы</div>
        </div>
        <div class="bottom-area">
            <div class="gc-attach-chips" id="attachChips"></div>
            <div id="input-area" class="gc-input-row">
                <div class="gc-input-wrap">
                    <textarea id="msg" rows="1" placeholder="Введите математическую задачу..." disabled></textarea>
                    <button id="send" class="gc-send-icon" onclick="sendMsg()" disabled aria-label="Решить">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                    </button>
                </div>
                <span id="attachBtn"></span>
            </div>
        </div>
    </div>
    <script>
        var escapeHtml = GigaChat.escapeHtml;

        // Упрощённый markdown для math: только bold/italic/br. Markdown-блоки
        // кода идут отдельно через extras.code (внутри .code-block).
        function formatText(text) {
            if (!text) return '';
            var html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\*(.+?)\*/g, '<i>$1</i>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        // Кастомный рендер bot-сообщения: extras.code → code-block с copy-btn,
        // extras.raw_result → raw-result панель, потом explanatory text.
        function formatBotMessage(msg) {
            var html = '';
            var extras = msg.extras || {};
            var code = extras.code || msg.code || '';
            var raw = extras.raw_result || msg.raw_result || '';
            if (code) {
                html += '<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Копировать</button><pre class="code-body">' + escapeHtml(code) + '</pre></div>';
            }
            if (raw) {
                html += '<div class="raw-result">' + escapeHtml(raw) + '</div>';
            }
            html += formatText(msg.content || '');
            return html;
        }

        // Copy-кнопка в .code-block. Берём text только из <pre> (.code-body),
        // fallback на textContent родителя был хрупким при гонке кликов.
        function copyCode(btn) {
            var pre = btn.parentElement.querySelector('.code-body, pre');
            if (!pre) return;
            navigator.clipboard.writeText(pre.textContent.trim()).then(function () {
                btn.textContent = 'Скопировано!';
                setTimeout(function () { btn.textContent = 'Копировать'; }, 2000);
            }).catch(function () {
                btn.textContent = 'Не удалось';
                setTimeout(function () { btn.textContent = 'Копировать'; }, 2000);
            });
        }

        GigaChat.createChatAgent({
            webhookPath: 'math',
            historyPath: 'history',
            prefix: 'math',
            idPrefix: 'math_',
            namePrefix: 'Math-',
            inflightLabel: 'Считаю',
            exportAgentName: 'GigaChat Math',
            emptyChatHtml: '<div class="empty-chat">Создайте новую сессию для начала работы</div>',
            historyErrorHtml: '<div class="empty-chat">Не удалось загрузить историю.</div>',
            historyLoadingHtml: '<div class="empty-chat">Загружаю историю...</div>',
            formatBotHtml: formatBotMessage,
            parseBotMessage: function (data) {
                return {
                    role: 'assistant',
                    content: data.response || 'Пустой ответ',
                    extras: { code: data.code || '', raw_result: data.raw_result || '' }
                };
            }
        });
    </script>
</body>
</html>

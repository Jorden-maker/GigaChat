{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>GigaChat — встроенный чат</title>
  <style>
    :root {
      --bg: #0c1119;
      --bg-msg-user: rgba(255, 255, 255, 0.06);
      --bg-msg-bot: transparent;
      --text: #e6e8ec;
      --text-muted: #8a98a8;
      --accent: #0ea5e9;
      --border: #283040;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--accent); }
    .chat-header .agent-select { float: right; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-family: inherit; font-size: 13px; }
    .chat-feed { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .msg { margin-bottom: 16px; line-height: 1.55; font-size: 14px; word-wrap: break-word; }
    .msg.user { background: var(--bg-msg-user); padding: 10px 14px; border-radius: 8px; display: inline-block; max-width: min(720px, 80%); white-space: pre-wrap; }
    .msg.bot { padding: 0 4px; white-space: pre-wrap; }
    .msg.error { color: #ff8888; }
    .chat-form { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--border); }
    .chat-form textarea { flex: 1; background: #1b2230; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: inherit; font-size: 14px; resize: none; min-height: 48px; max-height: 150px; outline: none; }
    .chat-form textarea:focus { border-color: var(--accent); }
    .chat-form button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0 22px; cursor: pointer; font-weight: 600; font-family: inherit; }
    .chat-form button:disabled { opacity: 0.4; cursor: not-allowed; }
    .loading { color: var(--text-muted); font-style: italic; }
  </style>
</head>
<body>
  {% csrf_token %}

  <div class="chat-header">
    GigaChat виджет
    <select class="agent-select" id="agentSelect">
      <option value="chat" selected>chat — универсальный</option>
      <option value="route">route — авто-выбор агента</option>
      <option value="rag">rag — по документам</option>
      <option value="sql">sql — база данных</option>
      <option value="math">math — вычисления</option>
      <option value="prompt">prompt — промпт-инженер</option>
    </select>
  </div>

  <div class="chat-feed" id="chatFeed"></div>

  <form class="chat-form" id="chatForm">
    <textarea id="messageInput" rows="1" placeholder="Напишите сообщение..."></textarea>
    <button type="submit" id="sendBtn">Отправить</button>
  </form>

<script>
(function () {
  // CSRF-токен от Django (стандартный механизм через cookie).
  function getCsrfToken() {
    var m = document.cookie.match(/(^|;)\s*csrftoken=([^;]+)/);
    return m ? decodeURIComponent(m[2]) : '';
  }

  var feed = document.getElementById('chatFeed');
  var form = document.getElementById('chatForm');
  var input = document.getElementById('messageInput');
  var btn = document.getElementById('sendBtn');
  var agentSelect = document.getElementById('agentSelect');

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = String(s == null ? '' : s);
    return d.innerHTML;
  }

  function addMsg(role, text, extraClass) {
    var div = document.createElement('div');
    div.className = 'msg ' + role + (extraClass ? ' ' + extraClass : '');
    div.textContent = text;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
    return div;
  }

  // Авто-высота textarea
  input.addEventListener('input', function () {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 150) + 'px';
  });

  // Enter — отправить, Shift+Enter — перенос
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    var text = input.value.trim();
    if (!text) return;

    addMsg('user', text);
    input.value = '';
    input.style.height = '';
    btn.disabled = true;
    var loadingEl = addMsg('bot', '…', 'loading');

    try {
      var res = await fetch("{% url 'giga:ask' %}", {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCsrfToken()
        },
        body: JSON.stringify({
          message: text,
          agent: agentSelect.value
        })
      });
      loadingEl.remove();
      if (!res.ok) {
        var errBody = await res.json().catch(function () { return {error: 'HTTP ' + res.status}; });
        addMsg('bot', 'Ошибка: ' + (errBody.error || res.statusText), 'error');
      } else {
        var data = await res.json();
        addMsg('bot', data.response || JSON.stringify(data));
      }
    } catch (err) {
      loadingEl.remove();
      addMsg('bot', 'Сетевая ошибка: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  });

  input.focus();
})();
</script>
</body>
</html>

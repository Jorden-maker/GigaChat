    <style>
        :root {
            --bg-primary: #1f1f1e;
            --bg-secondary: #1f1e1c;
            --bg-sidebar: #262626;
            --bg-input: #2c2c2a;
            --bg-user: rgba(212, 165, 116, 0.10);
            --bg-bot: #1f1e1c;
            --border: #363432;
            --text-primary: #d4d4d4;
            --text-secondary: #8a8a8a;
            --text-muted: #5a5a5a;
            --accent: #d4a574;
            --accent-hover: #c08a5a;
            --sidebar-width: 220px;
        }
        :root[data-theme="light"] {
            --bg-primary: #fdfdfc;
            --bg-secondary: #f3f1ec;
            --bg-sidebar: #fdfdfc;
            --bg-input: #fffffe;
            --bg-user: rgba(184, 137, 93, 0.12);
            --bg-bot: #f3f1ec;
            --border: #e3dfd5;
            --text-primary: #1f1f1e;
            --text-secondary: #6b6b68;
            --text-muted: #a8a59f;
            --accent: #b8895d;
            --accent-hover: #a0764d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Segoe UI, Tahoma, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .btn-home { display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; margin:10px 12px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); text-decoration:none; flex-shrink:0; transition:background .15s,color .15s,border-color .15s; }
        .btn-home:hover { background:var(--bg-input); color:var(--text-primary); border-color:var(--text-muted); }
        .btn-home svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .sidebar {
            width: var(--sidebar-width); height: calc(100vh - 24px);
            margin: 12px 0 12px 12px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column; flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-header { padding: 0 16px 12px; }
        .sidebar-header h3 { font-size: 13px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
        .sidebar-add { padding: 10px 16px; border-bottom: 1px solid var(--border); }
        .sidebar-add button {
            width: 100%; padding: 8px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            color: var(--text-secondary); border-radius: 6px;
            cursor: pointer; font-size: 13px; text-align: center;
        }
        .sidebar-add button:hover { border-color: var(--accent); color: var(--accent); }
        .session-list { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .session-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; margin: 2px 0; border-radius: 8px;
            cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: background 0.15s;
        }
        .session-item:hover { background: var(--bg-secondary); }
        .session-item.active { background: var(--bg-secondary); color: var(--text-primary); }
        .session-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-item .close, .session-item .edit {
            width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; color: #8a8a8a; font-size: 14px; flex-shrink: 0; margin-left: 4px;
            cursor: pointer; opacity: 0.7; transition: opacity .15s, background .15s, color .15s;
        }
        .session-item .edit { opacity: 0; }
        .session-item:hover .edit { opacity: 0.8; }
        .session-item .edit:hover { background: var(--bg-secondary); color: var(--accent); opacity: 1; }
        .session-item .edit svg, .session-item .close svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .session-item .close:hover { background: var(--bg-secondary); color: var(--accent); opacity: 1; }
        .session-item .name-edit {
            flex: 1; min-width: 0;
            background: var(--bg-input); border: 1px solid var(--accent);
            color: var(--text-primary); font-size: 13px;
            padding: 4px 6px; border-radius: 4px;
            outline: none; font-family: inherit;
        }
        .main { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; flex-shrink: 0; position: relative; z-index: 2;
        }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header-right { display:flex; align-items:center; gap:12px; }
        header h1 {
            font-family: Consolas, monospace; font-size: 20px; font-weight: 600;
            color: var(--accent);
            letter-spacing: 2px;
        }
        header .status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; line-height: 1; color: var(--text-secondary); letter-spacing: 0.5px; }
        header .status .dot { width: 5px; height: 5px; border-radius: 50%; background: #f0ad4e; transform: translate(-4px, 1px); animation: pulse 1s infinite; }
        header .status .dot.online { background: #4caf50; box-shadow: 0 0 8px rgba(76,175,80,0.5); animation: pulse 2s infinite; }
        header .status .dot.offline { background: #cc4444; box-shadow: 0 0 8px rgba(204,68,68,0.4); animation: none; }
        header .status .dot.checking { background: #f0ad4e; animation: pulse 1s infinite; }
        .btn-export { padding:6px 16px; background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-secondary); border-radius:6px; cursor:pointer; font-size:12px; transition:all .2s; }
        .btn-export:hover { background:rgba(212,165,116,0.15); color:var(--accent); border-color:var(--accent); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        /* Чат-лента в стиле Claude Code: всё слева, без центрирования и лейблов.
           User — компактный блок с лёгкой подложкой. Bot — чистый текст без обёртки. */
        #chat { flex: 1; overflow-y: auto; padding: 20px 24px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .msg { animation: fadeIn 0.25s ease; line-height: 1.55; font-size: 14px; color: var(--text-primary); word-wrap: break-word; overflow-wrap: anywhere; }
        .msg + .msg { margin-top: 16px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user {
            background: var(--bg-user);
            color: var(--accent);
            padding: 10px 14px; border-radius: 8px;
            word-break: break-all;
            font-size: 14px;
            display: block;
            width: fit-content;
            max-width: min(720px, 80%);
        }
        .msg.bot { padding: 0 4px; font-size: 14px; display: block; }
        /* Бэйдж "какой агент" — справа от user-msg, top-aligned. Левая граница
           совпадает с левой границей фона copy-кнопки (которая на hover
           появляется на right:-27px ~ +5px от правого края user-msg). */
        .inflight-agent-badge {
            position: absolute; top: 0; left: calc(100% + 5px);
            padding: 6px 14px; border-radius: 8px;
            background: transparent; color: var(--text-primary);
            font-size: 11px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap; pointer-events: none;
        }
        .bot b { color: var(--text-primary); }
        .bot i { color: var(--text-secondary); }
        .bot p { margin: 0 0 12px 0; }
        .bot p:last-child { margin-bottom: 0; }
        .bot code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-family: Consolas, monospace; font-size: 13.5px; color: var(--accent); }
        .bot pre { background: var(--bg-secondary); padding: 14px 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; white-space: pre; border: 1px solid var(--border); }
        .bot pre code { background: transparent; padding: 0; color: var(--text-primary); font-size: 13px; }
        .bot hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
        .bot table { border-collapse: collapse; margin: 12px 0; width: 100%; font-size: 13.5px; }
        .bot th, .bot td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
        .bot th { background: var(--bg-secondary); color: var(--accent); font-weight: 600; }
        .loading { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 13px; padding: 14px 18px; font-style: italic; }
        .loading .dots span { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--text-secondary); animation: blink 1.4s infinite; }
        .loading .dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .timer { font-family: Consolas, monospace; font-size: 11px; color: var(--text-secondary); margin-left: 8px; }
        .bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
        .agent-hint {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; margin-bottom: 8px;
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px;
            font-size: 12px; color: var(--text-secondary);
        }
        .agent-hint .arrow { color: var(--accent); }
        /* Кастомный dropdown — выглядит одинаково на всех ОС */
        .custom-select { position: relative; display: inline-block; }
        .custom-select-trigger {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--accent); font-weight: 600; cursor: pointer;
            font-size: 12px; padding: 5px 10px;
            border-radius: 6px;
            display: flex; align-items: center; gap: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .custom-select-trigger:hover { border-color: var(--accent); }
        .custom-select.open .custom-select-trigger { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(212,165,116,0.2); }
        .custom-select-arrow {
            width: 12px; height: 12px;
            stroke: var(--accent); fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .custom-select.open .custom-select-arrow { transform: rotate(180deg); }
        .custom-select-panel {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            min-width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: none;
            z-index: 100;
            white-space: nowrap;
        }
        .custom-select.open .custom-select-panel { display: block; }
        .custom-select-option {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
            transition: background 0.15s, color 0.15s;
        }
        .custom-select-option:hover { background: rgba(212,165,116,0.12); color: var(--accent); }
        .custom-select-option.selected { background: rgba(212,165,116,0.18); color: var(--accent); }
        /* Поле ввода: textarea + иконка-отправки (внутри) + скрепка (снаружи).
           Базовая раскладка задаётся классом .gc-input-row в _shared.js. */
        #input-area { display: flex; gap: 8px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif; font-size: 15px; outline: none;
            transition: border-color 0.2s;
            resize: none; min-height: 36px; max-height: 130px; line-height: 1.5;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 6px; }
        #msg::-webkit-scrollbar-track { background: transparent; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        #msg::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: var(--text-secondary); opacity: 0.5; }
        .empty-chat { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); font-size: 14px; gap: 8px; padding: 20px; text-align: center; }
        .empty-chat .hint { font-size: 12px; opacity: 0.7; max-width: 400px; line-height: 1.5; }
        .history-loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); font-size: 14px; font-style: italic; }
    </style>

        function classify(message) {
            var lower = message.toLowerCase();

            // Очки за каждое совпадение
            var scores = { sql: 0, rag: 0, math: 0, 'prompt-engineer': 0 };
            for (var agent in KEYWORDS) {
                var list = KEYWORDS[agent];
                for (var i = 0; i < list.length; i++) {
                    if (lower.indexOf(list[i]) !== -1) scores[agent]++;
                }
            }

            // Спец-эвристики для math: lookahead требует хотя бы одну цифру,
            // иначе "+++" или "..." уезжают в math по одному только regex.
            if (/^(?=.*\d)[\d\s+\-*/^().,=]+$/.test(message.trim())) scores.math += 5;
            if (/\d+\s*[+\-*/^%=]\s*\d+/.test(message)) scores.math += 2;

            // Победитель — наивысший балл. При ничье приоритет: sql > rag > math > prompt-engineer
            var priority = ['sql', 'rag', 'math', 'prompt-engineer'];
            var bestScore = 0;
            var bestAgent = null;
            for (var k = 0; k < priority.length; k++) {
                if (scores[priority[k]] > bestScore) {
                    bestScore = scores[priority[k]];
                    bestAgent = priority[k];
                }
            }

            // Если ни один не сработал — направляем в общий чат
            return bestAgent || 'chat';
        }

        function onInput() {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 150) + 'px';
            var text = input.value.trim();
            if (text.length >= 2) {
                var suggested = classify(text);
                setTargetAgent(suggested);
                agentHint.style.display = 'flex';
            } else {
                agentHint.style.display = 'none';
            }
        }

        // ============ КАСТОМНЫЙ DROPDOWN ============
        function syncDropdownAria(sel) {
            var trigger = sel.querySelector('.custom-select-trigger');
            if (trigger) trigger.setAttribute('aria-expanded', sel.classList.contains('open') ? 'true' : 'false');
        }
        function toggleAgentDropdown(e) {
            e.stopPropagation();
            var sel = document.getElementById('targetAgentSelect');
            sel.classList.toggle('open');
            syncDropdownAria(sel);
        }
        function setTargetAgent(value) {
            currentAgent = value;
            var label = AGENT_LABELS[value] || value;
            var sel = document.getElementById('targetAgentSelect');
            var labelEl = sel.querySelector('.custom-select-label');
            if (labelEl) labelEl.textContent = label;
            sel.querySelectorAll('.custom-select-option').forEach(function (el) {
                var on = el.dataset.value === value;
                el.classList.toggle('selected', on);
                el.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            sel.classList.remove('open');
            syncDropdownAria(sel);
            // После ручного выбора возвращаем фокус в поле ввода —
            // юзер сразу продолжает печатать, не теряя контекст.
            if (input && !input.disabled) input.focus();
        }
        // Закрытие выпадашки при клике вне её
        document.addEventListener('click', function (e) {
            var sel = document.getElementById('targetAgentSelect');
            if (sel && !sel.contains(e.target) && sel.classList.contains('open')) {
                sel.classList.remove('open');
                syncDropdownAria(sel);
            }
        });

        // ============ СЕССИИ через GigaChat.createSessionStore ============
        var sessionStore = GigaChat.createSessionStore({
            prefix: 'router',
            idPrefix: 'router_',
            namePrefix: 'Auto-',
            sessionList: sessionList,
            renderMessages: function () { renderChat(); },
            onAttachmentClear: function () {
                if (attachment) { attachment.cancel(); attachment.clear(); attachment.setDisabled(false); }
            },
            onEmpty: function () {
                chat.innerHTML = '<div class="empty-chat"><span>Создайте новую сессию для начала работы</span><span class="hint">GigaChat Auto автоматически направит запрос нужному агенту.</span></div>';
                input.disabled = true; btn.disabled = true;
                if (attachment) attachment.setDisabled(true);
                agentHint.style.display = 'none';
            },
            onSwitch: function (sid) {
                var draft = sessionStore.getDraft(sid) || '';
                input.value = draft;
                input.style.height = '';
                if (draft) {
                    input.style.height = Math.min(input.scrollHeight, 150) + 'px';
                }
                agentHint.style.display = 'none';
                var processing = !!sessionStore.getInflight(sid);
                input.disabled = processing;
                btn.disabled = false;
                GigaChat.syncSendButton(btn, sid, !!sessionStore.getInflight(sid));
                if (attachment) attachment.setDisabled(processing);
                if (!processing) input.focus();
                // Если есть восстановленный draft — пересчитать выбор агента,
                // иначе юзер видит текст и не знает в какой агент уйдёт.
                if (draft) onInput();
            },
            loadHistory: async function (sid) {
                if (!sessionStore.state.displayMessages.length && !sessionStore.getInflight(sid)) {
                    chat.innerHTML = '<div class="history-loading">Загружаю историю...</div>';
                }
                try {
                    var res = await GigaChat.fetchWithRetry(HISTORY_URL, { method: 'POST', headers: { 'Content-Type': 'application/json; charset=utf-8' }, body: JSON.stringify({ session_id: sid }) }, { timeout: 30000, retries: 0 });
                    if (!res.ok) throw new Error('Сервер ответил ' + res.status);
                    var data = await res.json();
                    return (data.messages || []).map(function (m) {
                        return { role: m.role, content: m.content, extras: m.extras || null };
                    });
                } catch (e) {
                    if (!sessionStore.state.displayMessages.length && !sessionStore.getInflight(sid)) {
                        chat.innerHTML = '<div class="empty-chat"><span>Не удалось загрузить историю.</span></div>';
                    }
                    return null;
                }
            }
        });

        ['sessions', 'activeSessionId', 'displayMessages'].forEach(function (k) {
            Object.defineProperty(window, k, {
                get: function () { return sessionStore.state[k]; },
                set: function (v) { sessionStore.state[k] = v; },
                configurable: true
            });
        });

        function createNewSession() { sessionStore.createNew(); }
        function pushToSession(sid, msg) { sessionStore.pushToSession(sid, msg); }

        function checkServerStatus() {
            return GigaChat.checkServerStatus(ROUTER_URL, statusDot, statusText);
        }
        function renderChat() {
            if (!activeSessionId || !sessions.find(function (s) { return s.id === activeSessionId; })) {
                chat.innerHTML = '<div class="empty-chat"><span>Создайте новую сессию для начала работы</span><span class="hint">GigaChat Auto автоматически направит запрос нужному агенту.</span></div>';
                return;
            }
            // Бэйдж "какой агент" прикрепляется к каждому user-сообщению
            // справа сверху. Источник имени агента — сначала m.agent
            // (сохранён при отправке, переживает ошибки/отмены), иначе
            // nextBot.agent (на случай старых сессий без m.agent).
            // НЕ используем inflightLocal.label — он один на сессию и
            // подсветит ВСЕ user-msgs без bot-ответа одинаковой меткой.
            var html = '';
            for (var i = 0; i < displayMessages.length; i++) {
                var m = displayMessages[i];
                if (m.role === 'user') {
                    var userBody = m.content ? escapeHtml(m.content) : '';
                    var atts = m.attachments
                        ? m.attachments
                        : (m.attachment ? [{ fileName: m.attachment, error: !!m.attachmentError }] : []);
                    if (atts.length > 0) {
                        var chipsHtml = '';
                        for (var k = 0; k < atts.length; k++) {
                            var att = atts[k];
                            var cls = att.error ? 'gc-attach-chip bot error' : 'gc-attach-chip bot';
                            chipsHtml += '<span class="' + cls + '">📎 ' + escapeHtml(att.fileName) + '</span>';
                        }
                        var spacing = userBody ? 'margin-top:8px' : '';
                        userBody += '<div style="' + spacing + ';display:flex;flex-wrap:wrap;gap:6px">' + chipsHtml + '</div>';
                    }
                    var agentKey = '';
                    if (m.agent) {
                        agentKey = m.agent;
                    } else {
                        var nextBot = (i + 1 < displayMessages.length && displayMessages[i + 1].role === 'assistant')
                            ? displayMessages[i + 1] : null;
                        if (nextBot && nextBot.agent) agentKey = nextBot.agent;
                    }
                    var inflBadge = agentKey
                        ? '<span class="inflight-agent-badge">' + escapeHtml(AGENT_LABELS[agentKey] || agentKey) + '</span>'
                        : '';
                    html += '<div class="msg user" data-ts="' + (m.ts || 0) + '">'+ userBody + inflBadge + '</div>';
                } else {
                    // Бэйдж агента теперь прикреплён к user-msg (см. выше),
                    // поэтому в bot-msg его не дублируем.
                    html += '<div class="msg bot">' + formatResponse(m.content) + '</div>';
                }
            }
            var inflight = sessionStore.getInflight(activeSessionId);
            if (inflight) {
                var elapsed = Math.floor((Date.now() - inflight.startedAt) / 1000);
                // Loader: только точки + таймер (имя агента уже прикреплено
                // к user-сообщению справа).
                html += '<div class="loading gc-inflight-loader" data-started-at="' + inflight.startedAt + '">' +
                    '<span class="dots"><span></span><span></span><span></span></span>' +
                    '<span class="timer">' + elapsed + ' сек</span></div>';
            }
            var __wasAtBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 30;
            chat.innerHTML = html;
            GigaChat.attachCopyButtons(chat);
            if (__wasAtBottom) chat.scrollTop = chat.scrollHeight;
        }
        function fetchWithRetry(url, options, optsOrRetries) {
            // optsOrRetries для обратной совместимости: либо число retries,
            // либо объект { retries, signal }.
            var opts = (typeof optsOrRetries === 'number')
                ? { retries: optsOrRetries }
                : (optsOrRetries || {});
            return GigaChat.fetchWithRetry(url, options, {
                timeout: FETCH_TIMEOUT_MS,
                retries: opts.retries,
                retryDelay: RETRY_DELAY_MS,
                signal: opts.signal
            });
        }
        // Контроллер вложений: создаётся после загрузки сессий ниже
        var attachment = null;

        async function sendMsg() {
            if (!activeSessionId || !sessions.find(function (s) { return s.id === activeSessionId; })) return;
            var __existing = GigaChat.getSendController(activeSessionId);
            if (__existing) { __existing.abort(); return; }
            // Inflight marker без локального controller (запрос в другой
            // вкладке или повис) → click stop = clearInflight, без abort.
            if (sessionStore.getInflight(activeSessionId)) { sessionStore.clearInflight(activeSessionId); return; }
            var text = input.value.trim();
            var hasFiles = attachment && attachment.hasFiles();
            if (!text && !hasFiles) return;
            if (sessionStore.getInflight(activeSessionId)) return;
            var sendSessionId = activeSessionId;
            var agent = currentAgent;
            var agentUrl = GigaChat.webhookUrl(agent);

            var fileNamesSnapshot = hasFiles
                ? attachment.getFiles().map(function (f) { return f.name; })
                : [];

            input.disabled = true; btn.disabled = true;
            if (attachment) attachment.setDisabled(true);
            input.value = ''; input.style.height = 'auto';
            sessionStore.clearDraft(sendSessionId);
            agentHint.style.display = 'none';

            // Пушим user-сообщение СРАЗУ + setInflight ДО любых await. Это
            // единый источник правды что сессия занята; onSwitch при возврате
            // увидит inflight и оставит скрепку заблокированной.
            // agent сохраняем на user-msg: бэйдж в renderChat берёт его
            // оттуда, чтобы каждый запрос помнил свой агент даже если
            // bot-ответ ещё не пришёл / запрос был отменён.
            var userMsg = { role: 'user', content: text, ts: Date.now(), agent: agent };
            if (fileNamesSnapshot.length > 0) {
                userMsg.attachments = fileNamesSnapshot.map(function (n) {
                    return { fileName: n, error: false };
                });
            }
            pushToSession(sendSessionId, userMsg);
            sessionStore.setInflight(sendSessionId, hasFiles ? 'Извлекаю файлы' : (AGENT_LABELS[agent] || agent));

            var messageForAgent = text;
            var extractedList = [];

            function abortAndRestore() {
                sessionStore.clearInflight(sendSessionId);
                var msgs = sessionStore.state.displayMessages;
                if (msgs.length && msgs[msgs.length - 1].role === 'user') {
                    msgs.pop();
                    sessionStore.saveSnapshot();
                }
                if (activeSessionId === sendSessionId) {
                    input.disabled = false; btn.disabled = false;
                    if (attachment) attachment.setDisabled(false);
                    input.value = text;
                    input.focus();
                    renderChat();
                }
            }

            if (hasFiles) {
                var cancelled = false;
                var inflightLoader = document.querySelector('.gc-inflight-loader');
                if (inflightLoader) {
                    var cancelBtn = document.createElement('button');
                    cancelBtn.type = 'button';
                    cancelBtn.className = 'btn-export';
                    cancelBtn.style.cssText = 'padding:2px 10px;margin-left:8px';
                    cancelBtn.textContent = 'Отмена';
                    cancelBtn.onclick = function () { cancelled = true; attachment.cancel(); };
                    inflightLoader.appendChild(cancelBtn);
                }
                extractedList = await attachment.extract();
                if (cancelled) { abortAndRestore(); return; }
                var totalLen = 0;
                for (var i = 0; i < extractedList.length; i++) totalLen += (extractedList[i].text || '').length;
                if (totalLen > 30000) {
                    var ok = confirm('Извлечено ' + totalLen.toLocaleString('ru-RU') + ' симв. из ' + extractedList.length + ' файла(ов).\nGigaChat может не справиться.\nОтправить всё равно?');
                    if (!ok) { abortAndRestore(); return; }
                }
                var built = GigaChat.buildMessageWithAttachment(text, extractedList);
                messageForAgent = built.messageForAgent;
                var msgs2 = sessionStore.state.displayMessages;
                for (var j = msgs2.length - 1; j >= 0; j--) {
                    if (msgs2[j].role === 'user') {
                        msgs2[j].attachments = built.attachments;
                        break;
                    }
                }
                sessionStore.saveSnapshot();
                sessionStore.setInflight(sendSessionId, (AGENT_LABELS[agent] || agent));
            }

            var sendCtrl = GigaChat.makeCancellableSend(btn, sendSessionId);
            try {
                var res = await fetchWithRetry(agentUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify({ message: messageForAgent, session_id: sendSessionId })
                }, { retries: MAX_RETRIES, signal: sendCtrl.signal });
                sessionStore.clearInflight(sendSessionId);
                if (!res.ok) throw new Error('Сервер вернул ошибку: ' + res.status);
                var data = await res.json();
                var responseText = data.response || data.output || 'Пустой ответ от сервера';
                GigaChat.typewriteAssistant(sessionStore, sendSessionId, { role: 'assistant', content: responseText, agent: agent }, { cps: 100 });
                statusDot.className = 'dot online'; statusText.textContent = 'Онлайн';
            } catch (e) {
                sessionStore.clearInflight(sendSessionId);
                if (!sendCtrl.aborted()) {
                    pushToSession(sendSessionId, { role: 'assistant', content: 'Ошибка: ' + e.message, agent: agent });
                    statusDot.className = 'dot offline'; statusText.textContent = 'Офлайн';
                }
            } finally {
                sendCtrl.restore();
            }
            if (activeSessionId === sendSessionId) {
                input.disabled = false; btn.disabled = false;
                if (attachment) {
                    attachment.setDisabled(false);
                    attachment.clear();
                }
                input.focus();
                chat.scrollTop = chat.scrollHeight;
            }
        }
        function exportChat() {
            if (!activeSessionId || displayMessages.length === 0) {
                alert('Нечего экспортировать.'); return;
            }
            var sessionName = '';
            for (var i = 0; i < sessions.length; i++) {
                if (sessions[i].id === activeSessionId) { sessionName = sessions[i].name; break; }
            }
            var lines = ['=== ' + sessionName + ' ===', 'Экспорт: ' + new Date().toLocaleString('ru-RU'), ''];
            for (var j = 0; j < displayMessages.length; j++) {
                var m = displayMessages[j];
                if (m.role === 'user') {
                    lines.push('[Вы]'); lines.push(m.content); lines.push('');
                } else {
                    var who = m.agent ? AGENT_LABELS[m.agent] || m.agent : 'Агент';
                    lines.push('[' + who + ']'); lines.push(m.content); lines.push('');
                }
            }
            var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = sessionName + '_' + new Date().toISOString().slice(0, 10) + '.txt';
            a.click(); URL.revokeObjectURL(a.href);
        }
        var escapeHtml = GigaChat.escapeHtml;
        function formatResponse(text) {
            // formatMarkdown сам вызывает formatMarkdownTable внутри — не оборачиваем повторно.
            return GigaChat.formatMarkdown(text, '#d4a574');
        }
        // Контроллер вложений инициализируем ДО switchTo: иначе onSwitch при
        // загрузке страницы (юзер перезагрузил пока шёл LLM-запрос) не сможет
        // заблокировать скрепку — `if (attachment)` тихо пропустит вызов.
        attachment = GigaChat.setupAttachment({
            buttonContainer: document.getElementById('attachBtn'),
            chipsContainer: document.getElementById('attachChips'),
            inputElement: input,
            dropZone: document.getElementById('chat')
        });
        GigaChat.initSidebarResize({
            sidebar: document.querySelector('.sidebar'),
            initialWidth: 240, minWidth: 220, maxWidth: 440,
            storageKey: 'giga_router_sidebar_w'
        });
        GigaChat.initHeaderShadowOnScroll({ scrollable: document.getElementById('chat') });
        GigaChat.initScrollToBottomButton({ scrollable: document.getElementById('chat'), inputArea: document.querySelector('.bottom-area') });

        sessionStore.load();
        if (sessionStore.state.activeSessionId && !sessionStore.findSession(sessionStore.state.activeSessionId)) {
            sessionStore.state.activeSessionId = null;
        }
        if (sessionStore.state.sessions.length > 0) {
            sessionStore.renderList();
            var targetId = sessionStore.state.activeSessionId || sessionStore.state.sessions[sessionStore.state.sessions.length - 1].id;
            sessionStore.switchTo(targetId);
        } else {
            attachment.setDisabled(true);
        }

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        });
        input.addEventListener('input', function () {
            onInput(); // autosize + классификатор + dropdown агента
            if (activeSessionId) sessionStore.setDraft(activeSessionId, input.value);
        });

        checkServerStatus();
        setInterval(checkServerStatus, 30000);
    </script>
</body>
</html>

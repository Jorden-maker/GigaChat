<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GigaChat Auto</title>
    <script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
    <style>
        :root {
            --bg-primary: #1f1f1e;
            --bg-secondary: #1f1e1c;
            --bg-sidebar: #262626;
            --bg-input: #2c2c2a;
            --bg-user: rgba(212, 165, 116, 0.10);
            --bg-bot: #1f1e1c;
            --border: #363432;
            --text-primary: #d4d4d4;
            --text-secondary: #8a8a8a;
            --text-muted: #5a5a5a;
            --accent: #d4a574;
            --accent-hover: #c08a5a;
            --sidebar-width: 270px;
        }
        :root[data-theme="light"] {
            --bg-primary: #fdfdfc;
            --bg-secondary: #f3f1ec;
            --bg-sidebar: #fdfdfc;
            --bg-input: #fffffe;
            --bg-user: rgba(184, 137, 93, 0.12);
            --bg-bot: #f3f1ec;
            --border: #e3dfd5;
            --text-primary: #1f1f1e;
            --text-secondary: #6b6b68;
            --text-muted: #a8a59f;
            --accent: #b8895d;
            --accent-hover: #a0764d;
        }
        /* Общие стили чат-агента — в _shared.js через GigaChat.injectAgentCss().
           Здесь только router-specific и per-page правила. */
        #chat { flex: 1; overflow-y: auto; padding: 20px 40px 45px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        /* Бэйдж "какой агент" — справа от user-msg, top-aligned. Левая граница
           совпадает с левой границей фона copy-кнопки (right:-27px → +5px). */
        .inflight-agent-badge {
            position: absolute; top: 0; left: calc(100% + 5px);
            padding: 6px 14px; border-radius: 8px;
            background: transparent; color: var(--text-primary);
            font-size: 11px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap; pointer-events: none;
        }
        .bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
        .agent-hint {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; margin-bottom: 8px;
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px;
            font-size: 12px; color: var(--text-secondary);
        }
        .agent-hint .arrow { color: var(--accent); }
        /* Кастомный dropdown — выглядит одинаково на всех ОС */
        .custom-select { position: relative; display: inline-block; }
        .custom-select-trigger {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--accent); font-weight: 600; cursor: pointer;
            font-size: 12px; padding: 5px 10px;
            border-radius: 6px;
            display: flex; align-items: center; gap: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .custom-select-trigger:hover { border-color: var(--accent); }
        .custom-select.open .custom-select-trigger { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(212,165,116,0.2); }
        .custom-select-arrow {
            width: 12px; height: 12px;
            stroke: var(--accent); fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .custom-select.open .custom-select-arrow { transform: rotate(180deg); }
        .custom-select-panel {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            min-width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: none;
            z-index: 100;
            white-space: nowrap;
        }
        .custom-select.open .custom-select-panel { display: block; }
        .custom-select-option {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
            transition: background 0.15s, color 0.15s;
        }
        .custom-select-option:hover { background: rgba(212,165,116,0.12); color: var(--accent); }
        .custom-select-option.selected { background: rgba(212,165,116,0.18); color: var(--accent); }
        /* Поле ввода: textarea + иконка-отправки (внутри) + скрепка (снаружи).
           Базовая раскладка задаётся классом .gc-input-row в _shared.js. */
        #input-area { display: flex; gap: 8px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif; font-size: 15px; outline: none;
            transition: border-color 0.2s;
            resize: none; min-height: 36px; max-height: 130px; line-height: 1.5;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 6px; }
        #msg::-webkit-scrollbar-track { background: transparent; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        #msg::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: var(--text-secondary); opacity: 0.5; }
        .empty-chat { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); font-size: 14px; gap: 8px; padding: 20px; text-align: center; }
        .empty-chat .hint { font-size: 12px; opacity: 0.7; max-width: 400px; line-height: 1.5; }
        /* .history-loading вынесен в _shared.js */
    </style>
    <script src="_config.js"></script>
    <link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
    <script src="lib/highlight.min.js"></script>
    <script src="_shared.js"></script>
    <script src="lib/jszip.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div class="sidebar-header"><h3>Сессии</h3></div>
        <div class="sidebar-add"><button onclick="createNewSession()">Новая сессия</button></div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left"><h1>GigaChat Auto</h1></div>
            <div class="header-right">
                <div class="status" id="statusBar"><span class="dot checking" id="statusDot"></span><span id="statusText">проверка...</span></div>
                <button class="btn-export" onclick="exportChat()">Экспорт</button>
            </div>
        </header>
        <div id="chat">
            <div class="empty-chat">
                <span>Создайте новую сессию для начала работы</span>
                <span class="hint">GigaChat Auto автоматически направит запрос нужному агенту. Если выбор неверен — измените его в выпадающем списке перед отправкой.</span>
            </div>
        </div>
        <div class="bottom-area">
            <div class="agent-hint" id="agentHint" style="display:none;">
                <span class="arrow">→</span>
                <span>Отправлю в:</span>
                <div class="custom-select" id="targetAgentSelect">
                    <button class="custom-select-trigger" type="button" onclick="toggleAgentDropdown(event)" aria-haspopup="listbox" aria-expanded="false" aria-controls="targetAgentPanel">
                        <span class="custom-select-label">GigaChat Talk</span>
                        <svg class="custom-select-arrow" viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="custom-select-panel" id="targetAgentPanel" role="listbox">
                        <div class="custom-select-option" data-value="sql" onclick="setTargetAgent('sql')" role="option" aria-selected="false">GigaChat Data</div>
                        <div class="custom-select-option" data-value="rag" onclick="setTargetAgent('rag')" role="option" aria-selected="false">GigaChat Docs</div>
                        <div class="custom-select-option" data-value="math" onclick="setTargetAgent('math')" role="option" aria-selected="false">GigaChat Math</div>
                        <div class="custom-select-option" data-value="prompt-engineer" onclick="setTargetAgent('prompt-engineer')" role="option" aria-selected="false">GigaChat Prompt</div>
                        <div class="custom-select-option selected" data-value="chat" onclick="setTargetAgent('chat')" role="option" aria-selected="true">GigaChat Talk</div>
                    </div>
                </div>
            </div>
            <div class="gc-attach-chips" id="attachChips"></div>
            <div id="input-area" class="gc-input-row">
                <div class="gc-input-wrap">
                    <textarea id="msg" rows="1" placeholder="Спросите что угодно..." disabled></textarea>
                    <button id="send" class="gc-send-icon" onclick="sendMsg()" disabled aria-label="Отправить">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                    </button>
                </div>
                <span id="attachBtn"></span>
            </div>
        </div>
    </div>
    <script>
        // ============ ROUTER STATE & UI ============
        var input = document.getElementById('msg');
        var agentHint = document.getElementById('agentHint');
        var currentAgent = 'chat'; // выбранный агент для отправки (default)

        var AGENT_LABELS = {
            sql: 'GigaChat Data',
            rag: 'GigaChat Docs',
            math: 'GigaChat Math',
            'prompt-engineer': 'GigaChat Prompt',
            chat: 'GigaChat Talk'
        };

        // ============ KEYWORD-КЛАССИФИКАТОР ============
        var KEYWORDS = {
            sql: [
                'покажи', 'выведи', 'список', 'найди клиент', 'найди заказ',
                'клиент', 'заказ', 'заказы', 'выручк', 'revenue',
                'таблиц', 'запрос к ', 'база данных', ' бд ', 'базу',
                'select', 'insert', 'update', 'delete', 'sql',
                'добавь клиент', 'удали клиент', 'добавь заказ',
                'сколько клиентов', 'сколько заказов', 'сколько записей',
                'москва', 'питер', 'петербург', 'казань', 'сочи',
                'email', 'выручка', 'сумма заказ', 'средний чек',
                'группир', 'сортир', 'отсортируй', 'отфильтруй',
                'топ ', ' top ', 'первые ', 'последние ',
                'join', 'объедин',
                'аналитик', 'статистик', 'отчёт', 'отчет',
                'за период', 'за месяц', 'за год', 'за неделю', 'за квартал',
                'максимальн', 'минимальн', 'итого', 'продаж'
            ],
            rag: [
                'документ', 'договор', 'акт ', 'контракт', 'соглашени',
                'коммерческ предложен', 'кп ', 'доверенност',
                'записк', 'протокол', 'приказ', 'заявлени',
                'шаблон', 'бланк', 'образец',
                'найди в документ', 'что написано', 'что сказано',
                'о чём документ', 'о чем документ', 'содержание документ',
                'загруженн', 'файл ', 'текст документ',
                'пункт договор', 'параграф', 'раздел договор',
                'срок оплат', 'условия оплат', 'реквизит',
                'составь документ', 'подготовь документ', 'создай документ', 'напиши документ',
                'база знаний', 'найди информаци',
                'процитируй', 'цитат', 'выдержк',
                'регламент', 'инструкци', 'положени', 'устав',
                'накладн', 'счёт-фактур', 'счет-фактур', 'акт выполненн'
            ],
            math: [
                'посчитай', 'вычисли', 'вычислить', 'рассчитай', 'рассчитать',
                'реши уравнен', 'решить уравнен', 'уравнен', 'неравенств',
                'формул', 'процент', 'корень из', 'степень', 'логарифм',
                'площад', 'объём', 'объем', 'периметр', 'окружност',
                'треугольник', 'квадрат', 'куб ', 'прямоугольник', 'цилиндр', 'сфер',
                'интеграл', 'производн', 'предел ', 'синус', 'косинус', 'тангенс',
                'матриц', 'вектор', 'определител', 'детерминант',
                'график функц', 'функци y', 'парабол',
                'среднее значен', 'медиан', 'дисперс', 'отклонен',
                'вероятност', 'комбинатор', 'факториал', 'перестанов', 'сочетан',
                'npv', 'irr', 'roi', 'аннуитет', 'ипотек', 'кредит', 'депозит',
                'инвестиц', 'маржа', 'наценк', 'скидк', 'ндс ', 'налог',
                'зарплат', 'рентабельн', 'прибыл',
                'sqrt', 'calculate', 'solve', 'equation',
                'конвертируй', 'переведи в '
            ],
            'prompt-engineer': [
                'промпт', 'prompt', 'системн промпт', 'системный промпт',
                'создай промпт', 'напиши промпт', 'сгенерируй промпт',
                'адаптируй промпт', 'переделай промпт', 'перепиши промпт',
                'улучши промпт', 'доработай промпт', 'оптимизируй промпт',
                'усиль промпт', 'исправь промпт', 'проанализируй промпт',
                'инструкци для модел', 'для нейросет', 'для llm', 'для ии', 'для ai',
                'для gigachat', 'для гигачат', 'для бота', 'для чат-бота',
                'роль ассистент'
            ]
        };

        function classify(message) {
            var lower = message.toLowerCase();
            var scores = { sql: 0, rag: 0, math: 0, 'prompt-engineer': 0 };
            for (var agent in KEYWORDS) {
                var list = KEYWORDS[agent];
                for (var i = 0; i < list.length; i++) {
                    if (lower.indexOf(list[i]) !== -1) scores[agent]++;
                }
            }
            // Спец-эвристики для math: lookahead требует хотя бы одну цифру.
            if (/^(?=.*\d)[\d\s+\-*/^().,=]+$/.test(message.trim())) scores.math += 5;
            if (/\d+\s*[+\-*/^%=]\s*\d+/.test(message)) scores.math += 2;
            // При ничье приоритет: sql > rag > math > prompt-engineer
            var priority = ['sql', 'rag', 'math', 'prompt-engineer'];
            var bestScore = 0;
            var bestAgent = null;
            for (var k = 0; k < priority.length; k++) {
                if (scores[priority[k]] > bestScore) {
                    bestScore = scores[priority[k]];
                    bestAgent = priority[k];
                }
            }
            return bestAgent || 'chat';
        }

        // ============ КАСТОМНЫЙ DROPDOWN ============
        function syncDropdownAria(sel) {
            var trigger = sel.querySelector('.custom-select-trigger');
            if (trigger) trigger.setAttribute('aria-expanded', sel.classList.contains('open') ? 'true' : 'false');
        }
        function toggleAgentDropdown(e) {
            e.stopPropagation();
            var sel = document.getElementById('targetAgentSelect');
            sel.classList.toggle('open');
            syncDropdownAria(sel);
        }
        function setTargetAgent(value) {
            currentAgent = value;
            var label = AGENT_LABELS[value] || value;
            var sel = document.getElementById('targetAgentSelect');
            var labelEl = sel.querySelector('.custom-select-label');
            if (labelEl) labelEl.textContent = label;
            sel.querySelectorAll('.custom-select-option').forEach(function (el) {
                var on = el.dataset.value === value;
                el.classList.toggle('selected', on);
                el.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            sel.classList.remove('open');
            syncDropdownAria(sel);
            if (input && !input.disabled) input.focus();
        }
        document.addEventListener('click', function (e) {
            var sel = document.getElementById('targetAgentSelect');
            if (sel && !sel.contains(e.target) && sel.classList.contains('open')) {
                sel.classList.remove('open');
                syncDropdownAria(sel);
            }
        });

        var escapeHtml = GigaChat.escapeHtml;

        // Снапшот currentAgent на момент СТАРТА отправки. Без него enrichBotMsg
        // прочитает currentAgent в момент ответа от LLM — а юзер мог переключить
        // агент пока 30 сек шёл запрос → bot-msg помечен неверным агентом.
        var sendStartAgent = currentAgent;

        // Хелпер: лифт `agent` поля. На бэке history endpoint хранит msg как
        // {role, content, extras}, своего поля `agent` нет — поэтому agent
        // сериализуется внутрь extras.agent, и читается обратно при загрузке.
        function pickAgent(m) {
            if (m.agent) return m.agent;
            if (m.extras && m.extras.agent) return m.extras.agent;
            return null;
        }

        // ============ FACTORY-CALL ============
        GigaChat.createChatAgent({
            // webhookPath НЕ передаём — URL вычисляется динамически по currentAgent.
            historyPath: 'history',
            prefix: 'router',
            idPrefix: 'router_',
            namePrefix: 'Auto-',
            exportAgentName: 'Агент',  // fallback если у msg нет .agent
            exportBotLabel: function (m) {
                var a = pickAgent(m);
                return a ? (AGENT_LABELS[a] || a) : 'Агент';
            },
            emptyChatHtml: '<div class="empty-chat"><span>Создайте новую сессию для начала работы</span><span class="hint">GigaChat Auto автоматически направит запрос нужному агенту.</span></div>',
            historyErrorHtml: '<div class="empty-chat"><span>Не удалось загрузить историю.</span></div>',

            // URL вычисляем динамически — но фиксируем sendStartAgent в onSendStart,
            // чтобы pre-resolve URL и attribute согласовались (не подменились при
            // переключении агента после старта запроса).
            resolveSendUrl: function () { return GigaChat.webhookUrl(sendStartAgent); },

            // Лейбл inflight-спиннера = имя выбранного агента (a не статичный "Думаю").
            getInflightLabel: function (phase) {
                if (phase === 'extract') return 'Извлекаю файлы';
                return AGENT_LABELS[sendStartAgent] || sendStartAgent;
            },

            // На user/bot-msg сохраняем agent — нужно для бэйджа и экспорта.
            // Дублируем в extras.agent чтобы пережить serializaton через history
            // endpoint (там нет field `agent`, есть только extras).
            enrichUserMsg: function (msg) {
                msg.agent = sendStartAgent;
                msg.extras = Object.assign({}, msg.extras || {}, { agent: sendStartAgent });
            },
            enrichBotMsg: function (msg) {
                msg.agent = sendStartAgent;
                msg.extras = Object.assign({}, msg.extras || {}, { agent: sendStartAgent });
            },

            // Бэйдж справа от user-msg. Приоритет: m.agent → extras.agent (после
            // reload) → next bot's agent (для старых сессий без extras.agent).
            userBadgeHtml: function (m, nextMsg) {
                var agentKey = pickAgent(m);
                if (!agentKey && nextMsg && nextMsg.role === 'assistant') {
                    agentKey = pickAgent(nextMsg);
                }
                if (!agentKey) return '';
                return '<span class="inflight-agent-badge">' + escapeHtml(AGENT_LABELS[agentKey] || agentKey) + '</span>';
            },

            // При смене сессии: спрятать agent-hint; если есть draft — пересчитать
            // классификатором (иначе юзер видит текст и не знает в какой агент уйдёт).
            onSwitchExtra: function (sid, draft) {
                agentHint.style.display = 'none';
                if (draft) onInputExtra(draft);
            },
            onInputExtra: onInputExtra,
            // СНАПШОТ currentAgent — фиксируем что было выбрано НА МОМЕНТ старта.
            // Это значение использует resolveSendUrl, getInflightLabel,
            // enrichUserMsg/enrichBotMsg на протяжении всего запроса.
            onSendStart: function () {
                agentHint.style.display = 'none';
                sendStartAgent = currentAgent;
            },

            // Лифтим extras.agent (или legacy .agent) обратно в верхнее поле,
            // чтобы userBadgeHtml/exportBotLabel могли его прочитать через pickAgent.
            parseHistoryMessage: function (m) {
                var out = { role: m.role, content: m.content, extras: m.extras || null };
                var a = pickAgent(m);
                if (a) out.agent = a;
                return out;
            }
        });

        // Классификатор + agent-hint при вводе. Вынесено наружу,
        // чтобы onSwitchExtra могла его вызвать для восстановленного draft.
        function onInputExtra(text) {
            text = (text || '').trim();
            if (text.length >= 2) {
                var suggested = classify(text);
                setTargetAgent(suggested);
                agentHint.style.display = 'flex';
            } else {
                agentHint.style.display = 'none';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigaChat Prompt</title>
<script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
<style>
:root {
  --bg-primary: #1f1f1e;
  --bg-secondary: #1f1e1c;
  --bg-sidebar: #262626;
  --bg-tertiary: #2c2c2a;
  --bg-input: #2c2c2a;
  --bg-user: rgba(212, 165, 116, 0.10);
  --bg-bot: #1f1e1c;
  --accent: #d4a574;
  --accent-hover: #c08a5a;
  --accent-light: rgba(212, 165, 116, 0.15);
  --text-primary: #d4d4d4;
  --text-secondary: #8a8a8a;
  --text-muted: #5a5a5a;
  --border: #363432;
  --code-bg: #1f1e1c;
  --sidebar-width: 270px;
}
:root[data-theme="light"] {
  --bg-primary: #fdfdfc;
  --bg-secondary: #f3f1ec;
  --bg-sidebar: #fdfdfc;
  --bg-tertiary: #fffffe;
  --bg-input: #fffffe;
  --bg-user: rgba(184, 137, 93, 0.12);
  --bg-bot: #f3f1ec;
  --accent: #b8895d;
  --accent-hover: #a0764d;
  --accent-light: rgba(184, 137, 93, 0.15);
  --text-primary: #1f1f1e;
  --text-secondary: #6b6b68;
  --text-muted: #a8a59f;
  --border: #e3dfd5;
  --code-bg: #f3f1ec;
}
/* Общие стили чат-агента — в _shared.js через GigaChat.injectAgentCss().
   Здесь только prompt-engineer-specific правила: prompt-block, btn-copy. */
#chat { flex: 1; overflow-y: auto; padding: 20px 24px 45px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#chat::-webkit-scrollbar { width: 5px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
.bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
#input-area { display: flex; gap: 8px; align-items: flex-end; }
#msg {
    flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text-primary);
    font-family: Segoe UI, Tahoma, sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
    resize: none; min-height: 36px; max-height: 200px; line-height: 1.5;
    overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
#msg::-webkit-scrollbar { width: 4px; }
#msg::-webkit-scrollbar-track { background: transparent; }
#msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
#msg:focus { border-color: var(--accent); }
#msg:disabled { opacity: 0.4; }
#msg::placeholder { color: var(--text-muted); }

/* Prompt-block — уникальный UI prompt-engineer: готовый промпт с copy-btn. */
.prompt-block { background:var(--code-bg); border:1px solid var(--border); border-radius:8px; margin:12px 0; overflow:hidden; }
.prompt-block-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--bg-tertiary); }
.prompt-block-header span { font-size:11px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
.btn-copy { padding:4px 10px; background:var(--accent-light); border:1px solid var(--accent); color:var(--accent); border-radius:4px; cursor:pointer; font-size:11px; transition:all .2s; }
.btn-copy:hover { background:var(--accent); color:#fff; }
.prompt-block pre { padding:14px; font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; line-height:1.6; color:var(--text-primary); overflow-x:auto; white-space:pre-wrap; word-break:break-word; }
</style>
<script src="_config.js"></script>
<link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
<link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
<script src="lib/highlight.min.js"></script>
<script src="_shared.js"></script>
<script src="lib/jszip.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div class="sidebar-header"><h3>Сессии</h3></div>
        <div class="sidebar-add"><button onclick="createNewSession()">Новая сессия</button></div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left"><h1>GigaChat Prompt</h1></div>
            <div class="header-right">
                <div class="status" id="statusBar"><span class="dot checking" id="statusDot"></span><span id="statusText">проверка...</span></div>
                <button class="btn-export" onclick="exportChat()">Экспорт</button>
            </div>
        </header>
        <div id="chat"><div class="empty-chat"><span>Создайте новую сессию для начала работы</span></div></div>
        <div class="bottom-area">
            <div class="gc-attach-chips" id="attachChips"></div>
            <div id="input-area" class="gc-input-row">
                <div class="gc-input-wrap">
                    <textarea id="msg" rows="1" placeholder="Опишите подробно, какой промпт нужен — задачу, контекст, требования, формат ответа. Текст может быть длинным." disabled></textarea>
                    <button id="send" class="gc-send-icon" onclick="sendMsg()" disabled aria-label="Отправить">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                    </button>
                </div>
                <span id="attachBtn"></span>
            </div>
        </div>
    </div>
    <script>
        var escapeHtml = GigaChat.escapeHtml;

        // Вырезает code-блоки из текста — они выводятся отдельно через
        // extras.prompt в .prompt-block.
        function formatResponse(text) {
            var clean = (text || '').replace(/```[\s\S]*?```/g, '').trim();
            return GigaChat.formatMarkdown(clean);
        }

        // Кастомный рендер bot-сообщения: content (без code) + extras.prompt в pre.
        function formatBotMessage(msg) {
            var text = msg.content || msg.text || '';
            var extras = msg.extras || {};
            var prompt = extras.prompt || msg.prompt || '';
            var html = formatResponse(text);
            if (prompt) {
                html += '<div class="prompt-block">' +
                    '<div class="prompt-block-header">' +
                    '<span>Готовый промпт</span>' +
                    '<button class="btn-copy" onclick="copyPrompt(this)">Копировать</button>' +
                    '</div>' +
                    '<pre>' + escapeHtml(prompt) + '</pre>' +
                    '</div>';
            }
            return html;
        }

        // Copy-кнопка в prompt-block. Глобальная — вызывается из onclick в inline-HTML.
        function copyPrompt(btn) {
            var pre = btn.closest('.prompt-block').querySelector('pre');
            if (!pre) return;
            navigator.clipboard.writeText(pre.textContent).then(function () {
                btn.textContent = 'Скопировано!';
                setTimeout(function () { btn.textContent = 'Копировать'; }, 2000);
            });
        }

        // ============ FACTORY-CALL ============
        // DOM IDs/классы теперь стандартные (#chat, #msg, #send, .empty-chat,
        // .bottom-area, span.dot.checking#statusDot в .status), поэтому почти
        // все опции factory ушли в дефолты.
        var agent = GigaChat.createChatAgent({
            webhookPath: 'prompt-engineer',
            historyPath: 'history',
            prefix: 'pe',
            idPrefix: 'pe_',
            namePrefix: 'Prompt-',
            inflightLabel: 'Генерирую промпт',
            exportAgentName: 'GigaChat Prompt',
            autosizeMax: 200, // длинные ТЗ на промпт — поле выше стандартного
            formatBotHtml: formatBotMessage,
            parseBotMessage: function (data) {
                return {
                    role: 'assistant',
                    content: data.response || 'Ответ получен',
                    extras: { prompt: data.prompt || '' }
                };
            }
        });

        // Кастомный экспорт — у prompt-engineer формат отличается от других
        // агентов: блок --- ПРОМПТ --- вокруг extras.prompt, отдельные разделители.
        // Переопределяем после createChatAgent (он назначил свой default).
        window.exportChat = function () {
            var s = agent.sessionStore.state;
            if (!s.activeSessionId) { alert('Нет активной сессии'); return; }
            if (s.displayMessages.length === 0) { alert('Нет сообщений для экспорта'); return; }
            var text = 'GigaChat Prompt\nЭкспорт: ' + new Date().toLocaleString('ru-RU') + '\n' + '='.repeat(50) + '\n\n';
            for (var i = 0; i < s.displayMessages.length; i++) {
                var m = s.displayMessages[i];
                var content = m.content || m.text || '';
                var extras = m.extras || {};
                var prompt = extras.prompt || m.prompt || '';
                if (m.role === 'user') {
                    text += 'Вы:\n' + content + '\n\n';
                } else {
                    text += 'GigaChat Prompt:\n' + content + '\n';
                    if (prompt) text += '\n--- ПРОМПТ ---\n' + prompt + '\n--- /ПРОМПТ ---\n';
                    text += '\n';
                }
                text += '-'.repeat(40) + '\n\n';
            }
            var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'prompt-engineer-export.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        };
    </script>
</body>
</html>

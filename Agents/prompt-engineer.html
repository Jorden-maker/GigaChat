<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Агент по промпт-инженерии — GigaChat</title>
<script>
    (function () {
        var t = localStorage.getItem('giga_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
    })();
</script>
<style>
:root {
  --bg-primary: #0a0e15;
  --bg-secondary: #131820;
  --bg-tertiary: #1b2230;
  --bg-user: rgba(124, 58, 237, 0.12);
  --bg-bot: #131820;
  --accent: #7c3aed;
  --accent-hover: #6d28d9;
  --accent-light: rgba(124, 58, 237, 0.15);
  --text-primary: #e6e8ec;
  --text-secondary: #8a98a8;
  --text-muted: #5a6878;
  --border: #283040;
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;
  --code-bg: #0e131c;
  --eval-bg: #131820;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); height:100vh; display:flex; overflow:hidden; }

.btn-home { display:block; padding:10px 16px; background:#070a10; border-bottom:1px solid var(--border); color:#7a8a9a; text-decoration:none; font-size:13px; transition:color .2s; }
.btn-home:hover { color:var(--accent); }
.btn-home .arrow { margin-right:6px; }

/* Sidebar — единый стиль с остальными агентами */
.sidebar {
    width: 260px; height: 100vh;
    background: #0c1119; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
.sidebar-header h3 { font-size: 13px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
.sidebar-add { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.sidebar-add button {
    width: 100%; padding: 8px;
    background: var(--bg-secondary); border: 1px dashed var(--border);
    color: var(--text-secondary); border-radius: 6px;
    cursor: pointer; font-size: 13px;
}
.sidebar-add button:hover { border-color: var(--accent); color: var(--accent); }
.session-list { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.session-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; margin: 2px 0; border-radius: 8px;
    cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: background 0.15s;
}
.session-item:hover { background: var(--bg-secondary); }
.session-item.active { background: var(--bg-secondary); color: var(--accent); border: 1px solid var(--border); }
.session-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .close, .session-item .edit {
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    border-radius: 4px; color: #556; font-size: 14px; flex-shrink: 0; margin-left: 4px;
    cursor: pointer; opacity: 0.7; transition: opacity .15s, background .15s, color .15s;
}
.session-item .edit { opacity: 0; }
.session-item:hover .edit { opacity: 0.8; }
.session-item .edit:hover { background: var(--bg-secondary); color: var(--accent); opacity: 1; }
.session-item .edit svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.session-item .close:hover { background: #2a3040; color: #ff6666; opacity: 1; }
.session-item .name-edit {
    flex: 1; min-width: 0;
    background: var(--bg-tertiary);
    border: 1px solid var(--accent);
    color: var(--text-primary);
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 4px;
    outline: none;
    font-family: inherit;
}

/* Main */
.main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* Header */
.header { padding:16px 24px; border-bottom:1px solid var(--border); background:var(--bg-secondary); display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:14px; }
.header-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),#a855f7); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.header-info h1 { font-family:Consolas,monospace; font-size:20px; font-weight:600; color:var(--accent); letter-spacing:2px; }
.header-info p { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.header-right { display:flex; align-items:center; gap:12px; }
.status-badge { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); }
.status-dot { width:8px; height:8px; border-radius:50%; background:#f0ad4e; animation:pulse 1s infinite; }
.status-dot.online { background:#4caf50; box-shadow:0 0 8px rgba(76,175,80,0.5); animation:pulse 2s infinite; }
.status-dot.offline { background:#cc4444; box-shadow:0 0 8px rgba(204,68,68,0.4); animation:none; }
.status-dot.checking { background:#f0ad4e; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.btn-export { padding:6px 14px; background:var(--bg-tertiary); border:1px solid var(--border); color:var(--text-secondary); border-radius:6px; cursor:pointer; font-size:12px; transition:all .2s; }
.btn-export:hover { background:var(--accent-light); color:var(--text-primary); border-color:var(--accent); }

/* Chat */
#chatContainer { flex:1; overflow-y:auto; padding:20px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
#chatContainer::-webkit-scrollbar { width:5px; }
#chatContainer::-webkit-scrollbar-track { background:transparent; }
#chatContainer::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#445566; font-size:14px; gap:8px; }
.welcome p { color:var(--text-muted); font-size:14px; max-width:500px; margin:0; line-height:1.6; text-align:center; }

.msg { margin:10px 0; padding:14px 18px; border-radius:12px; max-width:85%; line-height:1.6; font-size:14.5px; animation:fadeIn 0.3s ease; word-break:break-word; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.user { background:var(--bg-user); margin-left:auto; border:1px solid var(--border); color:var(--text-primary); white-space:pre-wrap; }
.bot { background:var(--bg-bot); border:1px solid var(--border); color:var(--text-primary); }
.bot b { color:var(--text-primary); }
.bot i { color:var(--text-secondary); }
.bot code { background:#0e131c; padding:2px 6px; border-radius:4px; font-family:Consolas,monospace; font-size:13px; }
.bot pre { background:#0e131c; padding:10px; border-radius:6px; overflow-x:auto; margin:8px 0; white-space:pre; }
.bot hr { border:none; border-top:1px solid var(--border); margin:10px 0; }
.bot table { border-collapse:collapse; margin:8px 0; width:100%; }
.bot th, .bot td { border:1px solid var(--border); padding:6px 10px; text-align:left; font-size:13px; }
.bot th { background:#0e131c; color:var(--accent); }

.loading { display:flex; align-items:center; gap:8px; color:var(--text-secondary); font-size:13px; padding:14px 18px; font-style:italic; }
.loading .dots span { display:inline-block; width:4px; height:4px; border-radius:50%; background:var(--text-secondary); animation:blink 1.4s infinite; }
.loading .dots span:nth-child(2) { animation-delay:0.2s; }
.loading .dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes blink { 0%,100% { opacity:0.2; } 50% { opacity:1; } }

/* Prompt block */
.prompt-block { background:var(--code-bg); border:1px solid var(--border); border-radius:8px; margin:12px 0; overflow:hidden; }
.prompt-block-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--bg-tertiary); border-bottom:1px solid var(--border); }
.prompt-block-header span { font-size:11px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
.btn-copy { padding:4px 10px; background:var(--accent-light); border:1px solid var(--accent); color:var(--accent); border-radius:4px; cursor:pointer; font-size:11px; transition:all .2s; }
.btn-copy:hover { background:var(--accent); color:#fff; }
.prompt-block pre { padding:14px; font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; line-height:1.6; color:#c9d1d9; overflow-x:auto; white-space:pre-wrap; word-break:break-word; }

/* Evaluation block */
.eval-block { background:var(--eval-bg); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; margin:12px 0; padding:14px; }
.eval-block-title { font-size:12px; color:var(--accent); font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.eval-block pre { font-size:13px; line-height:1.6; color:var(--text-secondary); white-space:pre-wrap; font-family:'Segoe UI',system-ui,sans-serif; }

/* Timer */
.timer { font-size:11px; color:var(--text-muted); margin-top:6px; }

/* Input */
.input-area { padding:16px 24px; border-top:1px solid var(--border); background:var(--bg-secondary); }
.input-wrapper { display:flex; gap:10px; max-width:100%; align-items:flex-end; }
.input-wrapper textarea { flex:1; padding:12px 16px; background:var(--bg-tertiary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-size:14px; resize:none; outline:none; font-family:inherit; min-height:48px; max-height:150px; line-height:1.5; transition:border-color .2s; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.input-wrapper textarea::-webkit-scrollbar { width:4px; }
.input-wrapper textarea::-webkit-scrollbar-track { background:transparent; }
.input-wrapper textarea::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.input-wrapper textarea:focus { border-color:var(--accent); }
.input-wrapper textarea::placeholder { color:var(--text-muted); }
.btn-send { padding:12px 20px; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:14px; font-weight:500; transition:all .2s; align-self:flex-end; flex-shrink:0; white-space:nowrap; }
.btn-send:hover { background:var(--accent-hover); transform:scale(1.02); }
.btn-send:disabled { background:var(--bg-tertiary); color:var(--text-muted); cursor:not-allowed; transform:none; }

/* ============ КНОПКА ТЕМЫ ============ */
.theme-toggle {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 50%;
    width: 36px; height: 36px;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
    color: var(--text-secondary);
    flex-shrink: 0;
}
.theme-toggle:hover { border-color: rgba(255, 255, 255, 0.4); color: var(--text-primary); transform: scale(1.08); }
.theme-toggle svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.theme-toggle .theme-icon-sun { display: inline-flex; }
.theme-toggle .theme-icon-moon { display: none; }

/* ============ СВЕТЛАЯ ТЕМА ============ */
:root[data-theme="light"] {
    --bg-primary: #faf6ee;
    --bg-secondary: #f5efe1;
    --bg-tertiary: #f0e8d4;
    --accent-light: rgba(124, 58, 237, 0.10);
    --text-primary: #2d2416;
    --text-secondary: #6b5a3c;
    --text-muted: #b8a576;
    --border: #e2dcc8;
    --code-bg: #fdf6e3;
    --eval-bg: #fff8e4;
}
:root[data-theme="light"] body { background: var(--bg-primary); color: var(--text-primary); }
:root[data-theme="light"] .btn-home { background: #f0e8d4; color: var(--text-secondary); border-bottom-color: var(--border); }
:root[data-theme="light"] .btn-home:hover { color: var(--accent); }
:root[data-theme="light"] .sidebar { background: #f0e8d4; border-right-color: var(--border); }
:root[data-theme="light"] .sidebar-header, :root[data-theme="light"] .sidebar-add { border-bottom-color: var(--border); }
:root[data-theme="light"] .sidebar-add button { background: #ffffff; border-color: var(--border); color: var(--text-secondary); }
:root[data-theme="light"] .sidebar-add button:hover { border-color: var(--accent); color: var(--accent); }
:root[data-theme="light"] .session-item:hover { background: #ffffff; }
:root[data-theme="light"] .session-item.active { background: #ffffff; color: var(--accent); border-color: var(--accent); }
:root[data-theme="light"] .session-item .close { color: #b8a576; }
:root[data-theme="light"] .session-item .close:hover { background: #f5efe1; color: #dc2626; }
:root[data-theme="light"] .header { background: var(--bg-secondary); border-bottom-color: var(--border); }
:root[data-theme="light"] .header-info p { color: var(--text-secondary); }
:root[data-theme="light"] .status-badge { color: var(--text-secondary); }
:root[data-theme="light"] .btn-export { background: #ffffff; border-color: var(--border); color: var(--text-secondary); }
:root[data-theme="light"] .btn-export:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
:root[data-theme="light"] {
    --bg-user: rgba(124, 58, 237, 0.10);
    --bg-bot: #ffffff;
}
:root[data-theme="light"] #chatContainer::-webkit-scrollbar-thumb { background: var(--border); }
:root[data-theme="light"] .welcome p { color: var(--text-secondary); }
:root[data-theme="light"] .msg.user { background: var(--bg-user); border-color: rgba(124, 58, 237, 0.35); color: var(--text-primary); }
:root[data-theme="light"] .msg.bot { background: var(--bg-bot); border-color: var(--border); color: var(--text-primary); }
:root[data-theme="light"] .bot code, :root[data-theme="light"] .bot pre { background: var(--code-bg); color: #2d2416; }
:root[data-theme="light"] .bot th { background: var(--code-bg); color: var(--accent); }
:root[data-theme="light"] .prompt-block { background: var(--code-bg); border-color: var(--border); }
:root[data-theme="light"] .prompt-block-header { background: var(--bg-tertiary); border-bottom-color: var(--border); }
:root[data-theme="light"] .prompt-block-header span { color: var(--text-secondary); }
:root[data-theme="light"] .prompt-block pre { color: #2d2416; }
:root[data-theme="light"] .btn-copy { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
:root[data-theme="light"] .btn-copy:hover { background: var(--accent); color: #ffffff; }
:root[data-theme="light"] .eval-block { background: var(--eval-bg); border-color: var(--border); }
:root[data-theme="light"] .eval-block pre { color: var(--text-secondary); }
:root[data-theme="light"] .timer { color: var(--text-muted); }
:root[data-theme="light"] .input-area { background: var(--bg-secondary); border-top-color: var(--border); }
:root[data-theme="light"] .input-wrapper textarea { background: #ffffff; border-color: var(--border); color: var(--text-primary); }
:root[data-theme="light"] .input-wrapper textarea::placeholder { color: var(--text-muted); }
:root[data-theme="light"] .btn-send:disabled { background: var(--bg-tertiary); color: var(--text-muted); }
:root[data-theme="light"] .theme-toggle { border-color: rgba(212, 175, 55, 0.35); color: #8a7754; }
:root[data-theme="light"] .theme-toggle:hover { border-color: rgba(212, 175, 55, 0.7); color: #2d2416; box-shadow: 0 0 16px rgba(212, 175, 55, 0.25); }
:root[data-theme="light"] .theme-toggle .theme-icon-sun { display: none; }
:root[data-theme="light"] .theme-toggle .theme-icon-moon { display: inline-flex; }
</style>
<script src="_config.js"></script>
<script src="_shared.js"></script>
<script src="lib/jszip.min.js"></script>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <a class="btn-home" href="../GigaChat-Platform.html"><span class="arrow">&#8592;</span>GigaChat</a>
  <div class="sidebar-header"><h3>Сессии</h3></div>
  <div class="sidebar-add"><button onclick="createNewSession()">+ Новая сессия</button></div>
  <div class="session-list" id="sessionList"></div>
</div>

<!-- Main -->
<div class="main">
  <div class="header">
    <div class="header-left">
      <div class="header-info">
        <h1>Агент по промпт-инженерии — GigaChat</h1>
      </div>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Проверка...</span>
      </div>
      <button class="btn-export" onclick="exportChat()">Экспорт</button>
      <button class="theme-toggle" onclick="GigaChat.toggleTheme()" title="Сменить тему" aria-label="Сменить тему">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <p>Создайте новую сессию для начала работы</p>
    </div>
  </div>

  <div class="input-area">
    <div class="gc-attach-chips" id="attachChips"></div>
    <div class="input-wrapper">
      <div class="gc-input-wrap">
        <textarea id="userInput" placeholder="Опишите подробно, какой промпт нужен — задачу, контекст, требования, формат ответа. Текст может быть длинным." rows="1" onkeydown="handleKey(event)" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,150)+'px';"></textarea>
        <span id="attachBtn"></span>
      </div>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">Отправить</button>
    </div>
  </div>
</div>

<script>
const WEBHOOK_URL = GigaChat.webhookUrl('prompt-engineer');
const HISTORY_URL = GigaChat.webhookUrl('history');

let isProcessing = false;
let serverOnline = false;
const WELCOME_HTML = '<div class="welcome"><p>Создайте новую сессию для начала работы</p></div>';
try { localStorage.removeItem('pe_histories'); } catch (e) {}

const sessionStore = GigaChat.createSessionStore({
  prefix: 'pe',
  idPrefix: 'pe_',
  namePrefix: 'Промпт-',
  sessionList: document.getElementById('sessionList'),
  renderMessages: function () { renderChat(); },
  isProcessing: function () { return isProcessing; },
  onAttachmentClear: function () {
    if (typeof attachment !== 'undefined' && attachment) {
      attachment.cancel(); attachment.clear(); attachment.setDisabled(false);
    }
  },
  onEmpty: function () {
    document.getElementById('chatContainer').innerHTML = WELCOME_HTML;
    document.getElementById('userInput').disabled = true;
    document.getElementById('btnSend').disabled = true;
  },
  onSwitch: function () {
    const userInput = document.getElementById('userInput');
    userInput.value = '';
    userInput.style.height = 'auto';
    userInput.disabled = false;
    document.getElementById('btnSend').disabled = false;
    userInput.focus();
  },
  loadHistory: async function (sid) {
    const container = document.getElementById('chatContainer');
    if (!sessionStore.state.displayMessages.length) {
      container.innerHTML = '<div class="welcome"><p>Загружаю историю...</p></div>';
    }
    try {
      const res = await fetch(HISTORY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json; charset=utf-8' },
        body: JSON.stringify({ session_id: sid })
      });
      if (!res.ok) throw new Error('Сервер ответил ' + res.status);
      const data = await res.json();
      return (data.messages || []).map(m => ({
        role: m.role,
        content: m.content,
        extras: m.extras || null
      }));
    } catch (e) {
      if (!sessionStore.state.displayMessages.length) {
        container.innerHTML = '<div class="welcome"><p>Не удалось загрузить историю.</p></div>';
      }
      return null;
    }
  }
});

['sessions', 'activeSessionId', 'displayMessages'].forEach(k => {
  Object.defineProperty(window, k, {
    get: () => sessionStore.state[k],
    set: v => { sessionStore.state[k] = v; },
    configurable: true
  });
});

function createNewSession() { sessionStore.createNew(); }
function pushToSession(sid, msg) { sessionStore.pushToSession(sid, msg); }

// --- Init ---
function init() {
  sessionStore.load();
  if (sessionStore.state.activeSessionId && !sessionStore.findSession(sessionStore.state.activeSessionId)) {
    sessionStore.state.activeSessionId = null;
  }
  if (sessionStore.state.sessions.length > 0) {
    sessionStore.renderList();
    const targetId = sessionStore.state.activeSessionId || sessionStore.state.sessions[0].id;
    sessionStore.switchTo(targetId);
  } else {
    document.getElementById('userInput').disabled = true;
    document.getElementById('btnSend').disabled = true;
    sessionStore.renderList();
  }
  // Контроллер вложений (скрепка справа от input, чип над input)
  attachment = GigaChat.setupAttachment({
    buttonContainer: document.getElementById('attachBtn'),
    chipsContainer: document.getElementById('attachChips'),
    inputElement: document.getElementById('userInput')
  });
  checkServerStatus();
  setInterval(checkServerStatus, 30000);
}

// --- Chat ---
function renderChat() {
  const container = document.getElementById('chatContainer');
  const inflight = sessionStore.getInflight(activeSessionId);
  if (displayMessages.length === 0 && !inflight) {
    container.innerHTML = WELCOME_HTML;
    return;
  }
  let html = '';
  for (const m of displayMessages) {
    const text = m.content || m.text || '';
    if (m.role === 'user') {
      let userBody = text ? escapeHtml(text) : '';
      const atts = m.attachments
        ? m.attachments
        : (m.attachment ? [{ fileName: m.attachment, error: !!m.attachmentError }] : []);
      if (atts.length > 0) {
        let chipsHtml = '';
        for (const att of atts) {
          const cls = att.error ? 'gc-attach-chip bot error' : 'gc-attach-chip bot';
          chipsHtml += `<span class="${cls}">📎 ${escapeHtml(att.fileName)}</span>`;
        }
        const spacing = userBody ? 'margin-top:8px' : '';
        userBody += `<div style="${spacing};display:flex;flex-wrap:wrap;gap:6px">${chipsHtml}</div>`;
      }
      html += `<div class="msg user">${userBody}</div>`;
    } else {
      const extras = m.extras || {};
      const prompt = extras.prompt || m.prompt || '';
      html += `<div class="msg bot">`;
      html += formatResponse(text);
      if (prompt) {
        html += `<div class="prompt-block"><div class="prompt-block-header"><span>Готовый промпт</span><button class="btn-copy" onclick="copyPrompt(this)">Копировать</button></div><pre>${escapeHtml(prompt)}</pre></div>`;
      }
      html += `</div>`;
    }
  }
  if (inflight) {
    const elapsed = Math.floor((Date.now() - inflight.startedAt) / 1000);
    html += `<div class="loading">${escapeHtml(inflight.label)} <span class="dots"><span>.</span><span>.</span><span>.</span></span><span class="timer">${elapsed} сек</span></div>`;
  }
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function formatResponse(text) {
  // Убираем код-блоки из текста — они выводятся отдельным prompt-block
  const clean = text.replace(/```[\s\S]*?```/g, '').trim();
  return GigaChat.formatMarkdown(clean, '#7c3aed');
}

const escapeHtml = GigaChat.escapeHtml;

function copyPrompt(btn) {
  const pre = btn.closest('.prompt-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Скопировано!';
    setTimeout(() => btn.textContent = 'Копировать', 2000);
  });
}

// --- Send ---
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// Контроллер вложений: создаётся в init() после загрузки сессий
let attachment = null;

function appendLoading(label, withCancel) {
  const id = 'loading-' + Date.now();
  const cancelHtml = withCancel ? ` <button type="button" class="btn-export" id="cancel-${id}" style="padding:2px 10px;margin-left:8px">Отмена</button>` : '';
  const timerHtml = withCancel ? '' : `<span class="timer" id="timer-${id}">0 сек</span>`;
  const container = document.getElementById('chatContainer');
  container.innerHTML += `<div class="loading" id="${id}">${label} <span class="dots"><span>.</span><span>.</span><span>.</span></span>${timerHtml}${cancelHtml}</div>`;
  container.scrollTop = container.scrollHeight;
  return id;
}
function startTimer(id) {
  const t0 = Date.now();
  return setInterval(() => {
    const el = document.getElementById('timer-' + id);
    if (el) el.textContent = Math.floor((Date.now() - t0) / 1000) + ' сек';
  }, 1000);
}
function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

async function sendMessage() {
  if (!activeSessionId || !sessions.find(s => s.id === activeSessionId)) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const hasFiles = attachment && attachment.hasFiles();
  if (!text && !hasFiles) return;
  if (isProcessing) return;

  isProcessing = true;
  const sendSessionId = activeSessionId;
  document.getElementById('btnSend').disabled = true;
  if (attachment) attachment.setDisabled(true);
  input.value = '';
  input.style.height = 'auto';

  let messageForAgent = text;
  let extractedList = [];
  let attachmentsForUI = [];

  function abortAndRestore() {
    isProcessing = false;
    document.getElementById('btnSend').disabled = false;
    if (attachment) attachment.setDisabled(false);
    input.value = text;
    input.focus();
  }

  if (hasFiles) {
    const nFiles = attachment.getFiles().length;
    const extractId = appendLoading(nFiles > 1 ? ('Извлекаю текст из ' + nFiles + ' файлов') : 'Извлекаю текст из файла', true);
    let cancelled = false;
    const cancelBtn = document.getElementById('cancel-' + extractId);
    if (cancelBtn) cancelBtn.onclick = () => { cancelled = true; attachment.cancel(); };
    extractedList = await attachment.extract();
    removeLoading(extractId);
    if (cancelled) { abortAndRestore(); return; }
    let totalLen = 0;
    for (const ex of extractedList) totalLen += (ex.text || '').length;
    if (totalLen > 30000) {
      const ok = confirm('Извлечено ' + totalLen.toLocaleString('ru-RU') + ' симв. из ' + extractedList.length + ' файла(ов).\nGigaChat может не справиться.\nОтправить всё равно?');
      if (!ok) { abortAndRestore(); return; }
    }
    const built = GigaChat.buildMessageWithAttachment(text, extractedList);
    messageForAgent = built.messageForAgent;
    attachmentsForUI = built.attachments;
  }

  const userMsg = { role: 'user', content: text };
  if (attachmentsForUI.length > 0) userMsg.attachments = attachmentsForUI;
  pushToSession(sendSessionId, userMsg);

  sessionStore.setInflight(sendSessionId, 'Генерирую промпт');

  try {
    const data = await fetchWithRetry(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json; charset=utf-8' },
      body: JSON.stringify({ message: messageForAgent, session_id: sendSessionId })
    });
    sessionStore.clearInflight(sendSessionId);

    pushToSession(sendSessionId, {
      role: 'assistant',
      content: data.response || 'Ответ получен',
      extras: { prompt: data.prompt || '' }
    });
  } catch (err) {
    sessionStore.clearInflight(sendSessionId);
    pushToSession(sendSessionId, {
      role: 'assistant',
      content: 'Ошибка: ' + err.message
    });
  }

  isProcessing = false;
  document.getElementById('btnSend').disabled = false;
  if (attachment) {
    attachment.setDisabled(false);
    attachment.clear();
  }
  input.focus();
}

async function fetchWithRetry(url, options, retries = 2) {
  const resp = await GigaChat.fetchWithRetry(url, options, { retries });
  if (!resp.ok) {
    const errText = await resp.text().catch(() => 'Unknown error');
    throw new Error(`Сервер ответил ${resp.status}: ${errText}`);
  }
  return await resp.json();
}

// --- Server status ---
async function checkServerStatus() {
  serverOnline = await GigaChat.checkServerStatus(
    WEBHOOK_URL,
    document.getElementById('statusDot'),
    document.getElementById('statusText'),
    { dotClass: 'status-dot' }
  );
}

// --- Export ---
function exportChat() {
  if (!activeSessionId) { alert('Нет активной сессии'); return; }
  if (displayMessages.length === 0) { alert('Нет сообщений для экспорта'); return; }
  let text = 'Агент по промпт-инженерии — GigaChat\nЭкспорт: ' + new Date().toLocaleString('ru-RU') + '\n' + '='.repeat(50) + '\n\n';
  for (const m of displayMessages) {
    const content = m.content || m.text || '';
    const extras = m.extras || {};
    const prompt = extras.prompt || m.prompt || '';
    if (m.role === 'user') {
      text += 'Вы:\n' + content + '\n\n';
    } else {
      text += 'Агент по промпт-инженерии:\n' + content + '\n';
      if (prompt) text += '\n--- ПРОМПТ ---\n' + prompt + '\n--- /ПРОМПТ ---\n';
      text += '\n';
    }
    text += '-'.repeat(40) + '\n\n';
  }
  const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prompt-engineer-export.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Textarea auto-resize ---
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

init();
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigaChat Prompt</title>
<script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
<style>
:root {
  --bg-primary: #1f1f1e;
  --bg-secondary: #1f1e1c;
  --bg-sidebar: #262626;
  --bg-tertiary: #2c2c2a;
  --bg-input: #2c2c2a;
  --bg-user: rgba(212, 165, 116, 0.10);
  --bg-bot: #1f1e1c;
  --accent: #d4a574;
  --accent-hover: #c08a5a;
  --accent-light: rgba(212, 165, 116, 0.15);
  --text-primary: #d4d4d4;
  --text-secondary: #8a8a8a;
  --text-muted: #5a5a5a;
  --border: #363432;
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;
  --code-bg: #1f1e1c;
  --eval-bg: #1f1e1c;
}
:root[data-theme="light"] {
  --bg-primary: #fdfdfc;
  --bg-secondary: #f3f1ec;
  --bg-sidebar: #fdfdfc;
  --bg-tertiary: #fffffe;
  --bg-input: #fffffe;
  --bg-user: rgba(184, 137, 93, 0.12);
  --bg-bot: #f3f1ec;
  --accent: #b8895d;
  --accent-hover: #a0764d;
  --accent-light: rgba(184, 137, 93, 0.15);
  --text-primary: #1f1f1e;
  --text-secondary: #6b6b68;
  --text-muted: #a8a59f;
  --border: #e3dfd5;
  --code-bg: #f3f1ec;
  --eval-bg: #f3f1ec;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg-primary); color:var(--text-primary); height:100vh; display:flex; overflow:hidden; }

.btn-home { display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; margin:10px 12px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); text-decoration:none; flex-shrink:0; transition:background .15s,color .15s,border-color .15s; }
.btn-home:hover { background:var(--bg-input); color:var(--text-primary); border-color:var(--text-muted); }
.btn-home svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* Sidebar — единый стиль с остальными агентами */
.sidebar {
    width: 260px; height: calc(100vh - 24px);
    margin: 12px 0 12px 12px;
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; flex-direction: column; flex-shrink: 0;
    overflow: hidden;
}
.sidebar-header { padding: 0 16px 12px; }
.sidebar-header h3 { font-size: 13px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
.sidebar-add { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.sidebar-add button {
    width: 100%; padding: 8px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    color: var(--text-secondary); border-radius: 6px;
    cursor: pointer; font-size: 13px; text-align: center;
}
.sidebar-add button:hover { border-color: var(--accent); color: var(--accent); }
.session-list { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.session-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; margin: 2px 0; border-radius: 8px;
    cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: background 0.15s;
}
.session-item:hover { background: var(--bg-secondary); }
.session-item.active { background: var(--bg-secondary); color: var(--text-primary); }
.session-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .close, .session-item .edit {
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    border-radius: 4px; color: var(--text-secondary); font-size: 14px; flex-shrink: 0; margin-left: 4px;
    cursor: pointer; opacity: 0.7; transition: opacity .15s, background .15s, color .15s;
}
.session-item .edit { opacity: 0; }
.session-item:hover .edit { opacity: 0.8; }
.session-item .edit:hover { background: var(--bg-secondary); color: var(--accent); opacity: 1; }
.session-item .edit svg, .session-item .close svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.session-item .close:hover { background: var(--bg-secondary); color: var(--accent); opacity: 1; }
.session-item .name-edit {
    flex: 1; min-width: 0;
    background: var(--bg-tertiary);
    border: 1px solid var(--accent);
    color: var(--text-primary);
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 4px;
    outline: none;
    font-family: inherit;
}

/* Main */
.main { flex:1; min-width: 0; display:flex; flex-direction:column; }

/* Header */
.header { padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: relative; z-index: 2; }
.header-left { display:flex; align-items:center; gap:14px; }
.header-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--accent-hover)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.header-info h1 { font-family:Consolas,monospace; font-size:20px; font-weight:600; color:var(--accent); letter-spacing:2px; }
.header-info p { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.header-right { display:flex; align-items:center; gap:12px; }
.status-badge { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); }
.status-dot { width:8px; height:8px; border-radius:50%; background:#f0ad4e; animation:pulse 1s infinite; }
.status-dot.online { background:#4caf50; box-shadow:0 0 8px rgba(76,175,80,0.5); animation:pulse 2s infinite; }
.status-dot.offline { background:#cc4444; box-shadow:0 0 8px rgba(204,68,68,0.4); animation:none; }
.status-dot.checking { background:#f0ad4e; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.btn-export { padding:6px 16px; background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-secondary); border-radius:6px; cursor:pointer; font-size:12px; transition:all .2s; }
.btn-export:hover { background:rgba(212,165,116,0.15); color:var(--accent); border-color:var(--accent); }

/* Chat */
/* Чат-лента в стиле Claude Code: всё слева, без центрирования и лейблов.
   User — компактный блок с лёгкой подложкой. Bot — чистый текст без обёртки. */
#chatContainer { flex:1; overflow-y:auto; padding:20px 24px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
#chatContainer::-webkit-scrollbar { width:5px; }
#chatContainer::-webkit-scrollbar-track { background:transparent; }
#chatContainer::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-muted); font-size:14px; gap:8px; }
.welcome p { color:var(--text-muted); font-size:14px; max-width:500px; margin:0; line-height:1.6; text-align:center; }

.msg { animation:fadeIn 0.25s ease; line-height:1.55; font-size:14px; color:var(--text-primary); word-wrap:break-word; overflow-wrap:anywhere; }
.msg + .msg { margin-top:16px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user {
    background: var(--bg-user);
            color: var(--accent);
    padding:10px 14px; border-radius:8px; word-break: break-all;
    font-size:14px;
    display: block;
            width: fit-content;
            max-width: min(720px, 80%);
}
.msg.bot { padding:0 4px; font-size:14px; display:block; }
.bot b { color:var(--text-primary); }
.bot i { color:var(--text-secondary); }
.bot p { margin:0 0 12px 0; }
.bot p:last-child { margin-bottom:0; }
.bot code { background:var(--bg-secondary); padding:2px 6px; border-radius:4px; font-family:Consolas,monospace; font-size:13.5px; color:var(--accent); }
.bot pre { background:var(--bg-secondary); padding:14px 16px; border-radius:8px; overflow-x:auto; margin:12px 0; white-space:pre; border:1px solid var(--border); }
.bot pre code { background:transparent; padding:0; color:var(--text-primary); font-size:13px; }
.bot hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
.bot table { border-collapse:collapse; margin:12px 0; width:100%; font-size:13.5px; }
.bot th, .bot td { border:1px solid var(--border); padding:8px 12px; text-align:left; }
.bot th { background:var(--bg-secondary); color:var(--accent); font-weight:600; }

.loading { display:flex; align-items:center; gap:8px; color:var(--text-secondary); font-size:13px; padding:14px 18px; font-style:italic; }
.loading .dots span { display:inline-block; width:4px; height:4px; border-radius:50%; background:var(--text-secondary); animation:blink 1.4s infinite; }
.loading .dots span:nth-child(2) { animation-delay:0.2s; }
.loading .dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes blink { 0%,100% { opacity:0.2; } 50% { opacity:1; } }

/* Prompt block */
.prompt-block { background:var(--code-bg); border:1px solid var(--border); border-radius:8px; margin:12px 0; overflow:hidden; }
.prompt-block-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--bg-tertiary); }
.prompt-block-header span { font-size:11px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
.btn-copy { padding:4px 10px; background:var(--accent-light); border:1px solid var(--accent); color:var(--accent); border-radius:4px; cursor:pointer; font-size:11px; transition:all .2s; }
.btn-copy:hover { background:var(--accent); color:#fff; }
.prompt-block pre { padding:14px; font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; line-height:1.6; color:var(--text-primary); overflow-x:auto; white-space:pre-wrap; word-break:break-word; }

/* Evaluation block */
.eval-block { background:var(--eval-bg); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; margin:12px 0; padding:14px; }
.eval-block-title { font-size:12px; color:var(--accent); font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.eval-block pre { font-size:13px; line-height:1.6; color:var(--text-secondary); white-space:pre-wrap; font-family:'Segoe UI',system-ui,sans-serif; }

/* Timer */
.timer { font-size:11px; color:var(--text-muted); margin-top:6px; }

/* Input — единое поле как у других агентов: textarea + иконка-отправки (внутри)
   + скрепка (снаружи справа). Базовая раскладка через .gc-input-row из _shared.js. */
.input-area { padding: 0 20px 20px; flex-shrink: 0; }
.input-wrapper { display:flex; gap:8px; max-width:100%; align-items:center; }
.input-wrapper textarea { flex:1; padding:10px 16px; word-break: break-word; overflow-wrap: anywhere; background:var(--bg-tertiary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-size:15px; resize:none; outline:none; font-family:inherit; min-height:36px; max-height:130px; line-height:1.5; transition:border-color .2s; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.input-wrapper textarea::-webkit-scrollbar { width:4px; }
.input-wrapper textarea::-webkit-scrollbar-track { background:transparent; }
.input-wrapper textarea::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.input-wrapper textarea:focus { border-color:var(--accent); }
.input-wrapper textarea:disabled { opacity:0.4; }
.input-wrapper textarea::placeholder { color:var(--text-muted); }

</style>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
  <div class="sidebar-header"><h3>Сессии</h3></div>
  <div class="sidebar-add"><button onclick="createNewSession()">Новая сессия</button></div>
  <div class="session-list" id="sessionList"></div>
</div>

<!-- Main -->
<div class="main">
  <div class="header">
    <div class="header-left">
      <div class="header-info">
        <h1>GigaChat Prompt</h1>
      </div>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Проверка...</span>
      </div>
      <button class="btn-export" onclick="exportChat()">Экспорт</button>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <p>Создайте новую сессию для начала работы</p>
    </div>
  </div>

  <div class="input-area">
    <div class="gc-attach-chips" id="attachChips"></div>
    <div class="input-wrapper gc-input-row">
      <div class="gc-input-wrap">
        <textarea id="userInput" placeholder="Опишите подробно, какой промпт нужен — задачу, контекст, требования, формат ответа. Текст может быть длинным." rows="1"></textarea>
        <button class="gc-send-icon" id="btnSend" onclick="sendMessage()" aria-label="Отправить">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
        </button>
      </div>
      <span id="attachBtn"></span>
    </div>
  </div>
</div>

<script>
const WEBHOOK_URL = GigaChat.webhookUrl('prompt-engineer');
const HISTORY_URL = GigaChat.webhookUrl('history');

let serverOnline = false;
const WELCOME_HTML = '<div class="welcome"><p>Создайте новую сессию для начала работы</p></div>';
try { localStorage.removeItem('pe_histories'); } catch (e) {}

// SessionStore: «идёт обработка в сессии X» = sessionStore.getInflight(X).
const sessionStore = GigaChat.createSessionStore({
  prefix: 'pe',
  idPrefix: 'pe_',
  namePrefix: 'Prompt-',
  sessionList: document.getElementById('sessionList'),
  renderMessages: function () { renderChat(); },
  onAttachmentClear: function () {
    if (typeof attachment !== 'undefined' && attachment) {
      attachment.cancel(); attachment.clear(); attachment.setDisabled(false);
    }
  },
  onEmpty: function () {
    document.getElementById('chatContainer').innerHTML = WELCOME_HTML;
    document.getElementById('userInput').disabled = true;
    document.getElementById('btnSend').disabled = true;
    if (attachment) attachment.setDisabled(true);
  },
  onSwitch: function (sid) {
    const userInput = document.getElementById('userInput');
    const draft = sessionStore.getDraft(sid) || '';
    userInput.value = draft;
    userInput.style.height = '';
    if (draft) {
      userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
    }
    const processing = !!sessionStore.getInflight(sid);
    userInput.disabled = processing;
    const btnSend = document.getElementById('btnSend');
    btnSend.disabled = false;
    GigaChat.syncSendButton(btnSend, sid, !!sessionStore.getInflight(sid));
    if (typeof attachment !== 'undefined' && attachment) attachment.setDisabled(processing);
    if (!processing) userInput.focus();
  },
  loadHistory: async function (sid) {
    const container = document.getElementById('chatContainer');
    if (!sessionStore.state.displayMessages.length && !sessionStore.getInflight(sid)) {
      container.innerHTML = '<div class="welcome"><p>Загружаю историю...</p></div>';
    }
    try {
      const res = await GigaChat.fetchWithRetry(HISTORY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json; charset=utf-8' },
        body: JSON.stringify({ session_id: sid })
      }, { timeout: 30000, retries: 0 });
      if (!res.ok) throw new Error('Сервер ответил ' + res.status);
      const data = await res.json();
      return (data.messages || []).map(m => ({
        role: m.role,
        content: m.content,
        extras: m.extras || null
      }));
    } catch (e) {
      if (!sessionStore.state.displayMessages.length && !sessionStore.getInflight(sid)) {
        container.innerHTML = '<div class="welcome"><p>Не удалось загрузить историю.</p></div>';
      }
      return null;
    }
  }
});

['sessions', 'activeSessionId', 'displayMessages'].forEach(k => {
  Object.defineProperty(window, k, {
    get: () => sessionStore.state[k],
    set: v => { sessionStore.state[k] = v; },
    configurable: true
  });
});

function createNewSession() { sessionStore.createNew(); }
function pushToSession(sid, msg) { sessionStore.pushToSession(sid, msg); }

// --- Init ---
function init() {
  // Контроллер вложений инициализируем ДО switchTo: иначе onSwitch при
  // загрузке страницы (юзер перезагрузил пока шёл LLM-запрос) не сможет
  // заблокировать скрепку — `if (attachment)` тихо пропустит вызов.
  attachment = GigaChat.setupAttachment({
    buttonContainer: document.getElementById('attachBtn'),
    chipsContainer: document.getElementById('attachChips'),
    inputElement: document.getElementById('userInput'),
    dropZone: document.getElementById('chatContainer')
  });
  GigaChat.initSidebarResize({
    sidebar: document.querySelector('.sidebar'),
    initialWidth: 300,  // 260 + 20
    minWidth: 260, maxWidth: 520,
    storageKey: 'giga_prompt_sidebar_w'
  });
  GigaChat.initHeaderShadowOnScroll({ scrollable: document.getElementById('chatContainer') });
  GigaChat.initScrollToBottomButton({ scrollable: document.getElementById('chatContainer'), inputArea: document.querySelector('.input-area') });

  sessionStore.load();
  if (sessionStore.state.activeSessionId && !sessionStore.findSession(sessionStore.state.activeSessionId)) {
    sessionStore.state.activeSessionId = null;
  }
  if (sessionStore.state.sessions.length > 0) {
    sessionStore.renderList();
    const targetId = sessionStore.state.activeSessionId || sessionStore.state.sessions[0].id;
    sessionStore.switchTo(targetId);
  } else {
    document.getElementById('userInput').disabled = true;
    document.getElementById('btnSend').disabled = true;
    if (attachment) attachment.setDisabled(true);
    sessionStore.renderList();
  }
  checkServerStatus();
  setInterval(checkServerStatus, 30000);
}

// --- Chat ---
function renderChat() {
  const container = document.getElementById('chatContainer');
  const inflight = sessionStore.getInflight(activeSessionId);
  // Welcome-блок показываем ТОЛЬКО когда нет активной сессии (сессий нет вообще
  // либо все удалены). Если сессия выбрана, но в ней ещё нет сообщений —
  // оставляем пустоту (или inflight loader если уже отправили).
  if (!activeSessionId) {
    container.innerHTML = WELCOME_HTML;
    return;
  }
  if (displayMessages.length === 0 && !inflight) {
    container.innerHTML = '';
    return;
  }
  let html = '';
  for (const m of displayMessages) {
    const text = m.content || m.text || '';
    if (m.role === 'user') {
      let userBody = text ? escapeHtml(text) : '';
      const atts = m.attachments
        ? m.attachments
        : (m.attachment ? [{ fileName: m.attachment, error: !!m.attachmentError }] : []);
      if (atts.length > 0) {
        let chipsHtml = '';
        for (const att of atts) {
          const cls = att.error ? 'gc-attach-chip bot error' : 'gc-attach-chip bot';
          chipsHtml += `<span class="${cls}">📎 ${escapeHtml(att.fileName)}</span>`;
        }
        const spacing = userBody ? 'margin-top:8px' : '';
        userBody += `<div style="${spacing};display:flex;flex-wrap:wrap;gap:6px">${chipsHtml}</div>`;
      }
      html += `<div class="msg user" data-ts="${m.ts || 0}">${userBody}</div>`;
    } else {
      const extras = m.extras || {};
      const prompt = extras.prompt || m.prompt || '';
      html += `<div class="msg bot">`;
      html += formatResponse(text);
      if (prompt) {
        html += `<div class="prompt-block"><div class="prompt-block-header"><span>Готовый промпт</span><button class="btn-copy" onclick="copyPrompt(this)">Копировать</button></div><pre>${escapeHtml(prompt)}</pre></div>`;
      }
      html += `</div>`;
    }
  }
  if (inflight) {
    const elapsed = Math.floor((Date.now() - inflight.startedAt) / 1000);
    html += `<div class="loading gc-inflight-loader" data-started-at="${inflight.startedAt}"><span class="dots"><span></span><span></span><span></span></span><span class="timer">${elapsed} сек</span></div>`;
  }
  const __wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 30;
  container.innerHTML = html;
  GigaChat.attachCopyButtons(container);
  if (__wasAtBottom) container.scrollTop = container.scrollHeight;
}

function formatResponse(text) {
  // Убираем код-блоки из текста — они выводятся отдельным prompt-block
  const clean = text.replace(/```[\s\S]*?```/g, '').trim();
  return GigaChat.formatMarkdown(clean, '#d4a574');
}

const escapeHtml = GigaChat.escapeHtml;

function copyPrompt(btn) {
  const pre = btn.closest('.prompt-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Скопировано!';
    setTimeout(() => btn.textContent = 'Копировать', 2000);
  });
}

// --- Send ---
// Контроллер вложений: создаётся в init() после загрузки сессий
let attachment = null;

async function sendMessage() {
  if (!activeSessionId || !sessions.find(s => s.id === activeSessionId)) return;
  const __existing = GigaChat.getSendController(activeSessionId);
  if (__existing) { __existing.abort(); return; }
  if (sessionStore.getInflight(activeSessionId)) { sessionStore.clearInflight(activeSessionId); return; }
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const hasFiles = attachment && attachment.hasFiles();
  if (!text && !hasFiles) return;
  if (sessionStore.getInflight(activeSessionId)) return;

  const sendSessionId = activeSessionId;

  const fileNamesSnapshot = hasFiles
    ? attachment.getFiles().map(f => f.name)
    : [];

  input.disabled = true;
  document.getElementById('btnSend').disabled = true;
  if (attachment) attachment.setDisabled(true);
  input.value = '';
  input.style.height = 'auto';
  sessionStore.clearDraft(sendSessionId);

  // Пушим user-сообщение СРАЗУ + setInflight ДО любых await. Это единый
  // источник правды что сессия занята; onSwitch при возврате увидит inflight
  // и оставит скрепку заблокированной.
  const userMsg = { role: 'user', content: text, ts: Date.now() };
  if (fileNamesSnapshot.length > 0) {
    userMsg.attachments = fileNamesSnapshot.map(n => ({ fileName: n, error: false }));
  }
  pushToSession(sendSessionId, userMsg);
  sessionStore.setInflight(sendSessionId, hasFiles ? 'Извлекаю файлы' : 'Генерирую промпт');

  let messageForAgent = text;
  let extractedList = [];

  function abortAndRestore() {
    sessionStore.clearInflight(sendSessionId);
    const msgs = sessionStore.state.displayMessages;
    if (msgs.length && msgs[msgs.length - 1].role === 'user') {
      msgs.pop();
      sessionStore.saveSnapshot();
    }
    if (activeSessionId === sendSessionId) {
      input.disabled = false;
      document.getElementById('btnSend').disabled = false;
      if (attachment) attachment.setDisabled(false);
      input.value = text;
      input.focus();
      renderChat();
    }
  }

  if (hasFiles) {
    let cancelled = false;
    const inflightLoader = document.querySelector('.gc-inflight-loader');
    if (inflightLoader) {
      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'btn-export';
      cancelBtn.style.cssText = 'padding:2px 10px;margin-left:8px';
      cancelBtn.textContent = 'Отмена';
      cancelBtn.onclick = () => { cancelled = true; attachment.cancel(); };
      inflightLoader.appendChild(cancelBtn);
    }
    extractedList = await attachment.extract();
    if (cancelled) { abortAndRestore(); return; }
    let totalLen = 0;
    for (const ex of extractedList) totalLen += (ex.text || '').length;
    if (totalLen > 30000) {
      const ok = confirm('Извлечено ' + totalLen.toLocaleString('ru-RU') + ' симв. из ' + extractedList.length + ' файла(ов).\nGigaChat может не справиться.\nОтправить всё равно?');
      if (!ok) { abortAndRestore(); return; }
    }
    const built = GigaChat.buildMessageWithAttachment(text, extractedList);
    messageForAgent = built.messageForAgent;
    const msgs2 = sessionStore.state.displayMessages;
    for (let j = msgs2.length - 1; j >= 0; j--) {
      if (msgs2[j].role === 'user') {
        msgs2[j].attachments = built.attachments;
        break;
      }
    }
    sessionStore.saveSnapshot();
    sessionStore.setInflight(sendSessionId, 'Генерирую промпт');
  }

  const sendCtrl = GigaChat.makeCancellableSend(document.getElementById('btnSend'), sendSessionId);
  try {
    const data = await fetchWithRetry(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json; charset=utf-8' },
      body: JSON.stringify({ message: messageForAgent, session_id: sendSessionId })
    }, { retries: 2, signal: sendCtrl.signal });
    sessionStore.clearInflight(sendSessionId);

    GigaChat.typewriteAssistant(sessionStore, sendSessionId, {
      role: 'assistant',
      content: data.response || 'Ответ получен',
      extras: { prompt: data.prompt || '' }
    }, { cps: 100 });
    document.getElementById('statusDot').className = 'status-dot online';
    document.getElementById('statusText').textContent = 'Онлайн';
  } catch (err) {
    sessionStore.clearInflight(sendSessionId);
    if (!sendCtrl.aborted()) {
      pushToSession(sendSessionId, {
        role: 'assistant',
        content: 'Ошибка: ' + err.message
      });
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusText').textContent = 'Офлайн';
    }
  } finally {
    sendCtrl.restore();
  }

  if (activeSessionId === sendSessionId) {
    input.disabled = false;
    document.getElementById('btnSend').disabled = false;
    if (attachment) {
      attachment.setDisabled(false);
      attachment.clear();
    }
    input.focus();
    const container = document.getElementById('chatContainer');
    container.scrollTop = container.scrollHeight;
  }
}

async function fetchWithRetry(url, options, optsOrRetries = 2) {
  // optsOrRetries: число retries (legacy) или объект { retries, signal }
  const opts = (typeof optsOrRetries === 'number')
    ? { retries: optsOrRetries }
    : (optsOrRetries || {});
  const resp = await GigaChat.fetchWithRetry(url, options, { retries: opts.retries, signal: opts.signal });
  if (!resp.ok) {
    const errText = await resp.text().catch(() => 'Unknown error');
    throw new Error(`Сервер ответил ${resp.status}: ${errText}`);
  }
  return await resp.json();
}

// --- Server status ---
async function checkServerStatus() {
  serverOnline = await GigaChat.checkServerStatus(
    WEBHOOK_URL,
    document.getElementById('statusDot'),
    document.getElementById('statusText'),
    { dotClass: 'status-dot' }
  );
}

// --- Export ---
function exportChat() {
  if (!activeSessionId) { alert('Нет активной сессии'); return; }
  if (displayMessages.length === 0) { alert('Нет сообщений для экспорта'); return; }
  let text = 'GigaChat Prompt\nЭкспорт: ' + new Date().toLocaleString('ru-RU') + '\n' + '='.repeat(50) + '\n\n';
  for (const m of displayMessages) {
    const content = m.content || m.text || '';
    const extras = m.extras || {};
    const prompt = extras.prompt || m.prompt || '';
    if (m.role === 'user') {
      text += 'Вы:\n' + content + '\n\n';
    } else {
      text += 'GigaChat Prompt:\n' + content + '\n';
      if (prompt) text += '\n--- ПРОМПТ ---\n' + prompt + '\n--- /ПРОМПТ ---\n';
      text += '\n';
    }
    text += '-'.repeat(40) + '\n\n';
  }
  const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prompt-engineer-export.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Textarea key/input handlers ---
// Enter — отправить, Shift+Enter — перенос. isComposing/keyCode 229 — защита от IME.
// Каждый ввод сохраняет draft в localStorage для текущей сессии — при переключении
// и возврате текст восстанавливается.
(function () {
  const userInput = document.getElementById('userInput');
  userInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  userInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    if (activeSessionId) sessionStore.setDraft(activeSessionId, this.value);
  });
})();

init();
</script>

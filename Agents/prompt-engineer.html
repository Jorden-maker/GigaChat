<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigaChat Prompt</title>
<script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
<style>
:root {
  --bg-primary: #1f1f1e;
  --bg-secondary: #1f1e1c;
  --bg-sidebar: #262626;
  --bg-tertiary: #2c2c2a;
  --bg-input: #2c2c2a;
  --bg-user: rgba(212, 165, 116, 0.10);
  --bg-bot: #1f1e1c;
  --accent: #d4a574;
  --accent-hover: #c08a5a;
  --accent-light: rgba(212, 165, 116, 0.15);
  --text-primary: #d4d4d4;
  --text-secondary: #8a8a8a;
  --text-muted: #5a5a5a;
  --border: #363432;
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;
  --code-bg: #1f1e1c;
  --eval-bg: #1f1e1c;
}
:root[data-theme="light"] {
  --bg-primary: #fdfdfc;
  --bg-secondary: #f3f1ec;
  --bg-sidebar: #fdfdfc;
  --bg-tertiary: #fffffe;
  --bg-input: #fffffe;
  --bg-user: rgba(184, 137, 93, 0.12);
  --bg-bot: #f3f1ec;
  --accent: #b8895d;
  --accent-hover: #a0764d;
  --accent-light: rgba(184, 137, 93, 0.15);
  --text-primary: #1f1f1e;
  --text-secondary: #6b6b68;
  --text-muted: #a8a59f;
  --border: #e3dfd5;
  --code-bg: #f3f1ec;
  --eval-bg: #f3f1ec;
}
/* Общие стили чат-агента (sidebar, session-item, header, .msg, .bot, .loading,
   .error, status-dot, keyframes) — в _shared.js через GigaChat.injectAgentCss().
   Здесь только prompt-engineer-specific правила. */

/* Per-page */
#chatContainer { flex:1; overflow-y:auto; padding:20px 24px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
#chatContainer::-webkit-scrollbar { width:5px; }
#chatContainer::-webkit-scrollbar-track { background:transparent; }
#chatContainer::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-muted); font-size:14px; gap:8px; }
.welcome p { color:var(--text-muted); font-size:14px; max-width:500px; margin:0; line-height:1.6; text-align:center; }

/* Header иконка-аватарка (только у prompt-engineer) */
.header-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--accent-hover)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.header-info p { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.status-badge { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); }

/* Prompt block */
.prompt-block { background:var(--code-bg); border:1px solid var(--border); border-radius:8px; margin:12px 0; overflow:hidden; }
.prompt-block-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--bg-tertiary); }
.prompt-block-header span { font-size:11px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
.btn-copy { padding:4px 10px; background:var(--accent-light); border:1px solid var(--accent); color:var(--accent); border-radius:4px; cursor:pointer; font-size:11px; transition:all .2s; }
.btn-copy:hover { background:var(--accent); color:#fff; }
.prompt-block pre { padding:14px; font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; line-height:1.6; color:var(--text-primary); overflow-x:auto; white-space:pre-wrap; word-break:break-word; }

/* Evaluation block */
.eval-block { background:var(--eval-bg); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; margin:12px 0; padding:14px; }
.eval-block-title { font-size:12px; color:var(--accent); font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.eval-block pre { font-size:13px; line-height:1.6; color:var(--text-secondary); white-space:pre-wrap; font-family:'Segoe UI',system-ui,sans-serif; }

/* Timer */
.timer { font-size:11px; color:var(--text-muted); margin-top:6px; }

/* Input — единое поле как у других агентов: textarea + иконка-отправки (внутри)
   + скрепка (снаружи справа). Базовая раскладка через .gc-input-row из _shared.js. */
.input-area { padding: 0 20px 20px; flex-shrink: 0; }
.input-wrapper { display:flex; gap:8px; max-width:100%; align-items:center; }
.input-wrapper textarea { flex:1; padding:10px 16px; word-break: break-word; overflow-wrap: anywhere; background:var(--bg-tertiary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-size:15px; resize:none; outline:none; font-family:inherit; min-height:36px; max-height:130px; line-height:1.5; transition:border-color .2s; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.input-wrapper textarea::-webkit-scrollbar { width:4px; }
.input-wrapper textarea::-webkit-scrollbar-track { background:transparent; }
.input-wrapper textarea::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.input-wrapper textarea:focus { border-color:var(--accent); }
.input-wrapper textarea:disabled { opacity:0.4; }
.input-wrapper textarea::placeholder { color:var(--text-muted); }

</style>
<script src="_config.js"></script>
<link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
<link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
<script src="lib/highlight.min.js"></script>
<script src="_shared.js"></script>
<script src="lib/jszip.min.js"></script>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
  <div class="sidebar-header"><h3>Сессии</h3></div>
  <div class="sidebar-add"><button onclick="createNewSession()">Новая сессия</button></div>
  <div class="session-list" id="sessionList"></div>
</div>

<!-- Main -->
<div class="main">
  <div class="header">
    <div class="header-left">
      <div class="header-info">
        <h1>GigaChat Prompt</h1>
      </div>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Проверка...</span>
      </div>
      <button class="btn-export" onclick="exportChat()">Экспорт</button>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <p>Создайте новую сессию для начала работы</p>
    </div>
  </div>

  <div class="input-area">
    <div class="gc-attach-chips" id="attachChips"></div>
    <div class="input-wrapper gc-input-row">
      <div class="gc-input-wrap">
        <textarea id="userInput" placeholder="Опишите подробно, какой промпт нужен — задачу, контекст, требования, формат ответа. Текст может быть длинным." rows="1"></textarea>
        <button class="gc-send-icon" id="btnSend" onclick="sendMessage()" aria-label="Отправить">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
        </button>
      </div>
      <span id="attachBtn"></span>
    </div>
  </div>
</div>

<script>
    // Legacy cleanup — старая ветка хранила истории в локальном кэше.
    try { localStorage.removeItem('pe_histories'); } catch (e) {}

    var escapeHtml = GigaChat.escapeHtml;

    // Кастомный рендер bot-сообщения. content идёт через formatMarkdown
    // (с предварительной зачисткой code-блоков — они выводятся отдельным
    // prompt-block). extras.prompt — готовый промпт в pre с copy-кнопкой.
    function formatResponse(text) {
        var clean = (text || '').replace(/```[\s\S]*?```/g, '').trim();
        return GigaChat.formatMarkdown(clean);
    }

    function formatBotMessage(msg) {
        var text = msg.content || msg.text || '';
        var extras = msg.extras || {};
        var prompt = extras.prompt || msg.prompt || '';
        var html = formatResponse(text);
        if (prompt) {
            html += '<div class="prompt-block">' +
                '<div class="prompt-block-header">' +
                '<span>Готовый промпт</span>' +
                '<button class="btn-copy" onclick="copyPrompt(this)">Копировать</button>' +
                '</div>' +
                '<pre>' + escapeHtml(prompt) + '</pre>' +
                '</div>';
        }
        return html;
    }

    // Copy-кнопка в prompt-block. Глобальная — вызывается из onclick в inline-HTML.
    function copyPrompt(btn) {
        var pre = btn.closest('.prompt-block').querySelector('pre');
        if (!pre) return;
        navigator.clipboard.writeText(pre.textContent).then(function () {
            btn.textContent = 'Скопировано!';
            setTimeout(function () { btn.textContent = 'Копировать'; }, 2000);
        });
    }

    // ============ FACTORY-CALL ============
    var agent = GigaChat.createChatAgent({
        webhookPath: 'prompt-engineer',
        historyPath: 'history',
        prefix: 'pe',
        idPrefix: 'pe_',
        namePrefix: 'Prompt-',
        inflightLabel: 'Генерирую промпт',
        exportAgentName: 'GigaChat Prompt',

        // Другие DOM IDs / классы — переопределяем дефолты factory.
        chatEl: document.getElementById('chatContainer'),
        inputEl: document.getElementById('userInput'),
        sendBtn: document.getElementById('btnSend'),
        bottomAreaEl: document.querySelector('.input-area'),
        statusDotClass: 'status-dot',

        // Sidebar шире — длинные промпты лучше читать в широком списке.
        sidebarInitialWidth: 300,
        sidebarMinWidth: 260,
        sidebarMaxWidth: 520,

        // Autosize textarea выше — длинные технические задания на промпт.
        autosizeMax: 200,

        // Welcome-блок (другой CSS-класс, не .empty-chat).
        emptyChatHtml: '<div class="welcome"><p>Создайте новую сессию для начала работы</p></div>',
        historyErrorHtml: '<div class="welcome"><p>Не удалось загрузить историю.</p></div>',
        historyLoadingHtml: '<div class="welcome"><p>Загружаю историю...</p></div>',

        formatBotHtml: formatBotMessage,
        parseBotMessage: function (data) {
            return {
                role: 'assistant',
                content: data.response || 'Ответ получен',
                extras: { prompt: data.prompt || '' }
            };
        }
    });

    // Кастомный экспорт — у prompt-engineer формат отличается от других
    // агентов: блок --- ПРОМПТ --- вокруг extras.prompt, отдельные разделители.
    // Переопределяем после createChatAgent (он назначил свой default).
    window.exportChat = function () {
        var s = agent.sessionStore.state;
        if (!s.activeSessionId) { alert('Нет активной сессии'); return; }
        if (s.displayMessages.length === 0) { alert('Нет сообщений для экспорта'); return; }
        var text = 'GigaChat Prompt\nЭкспорт: ' + new Date().toLocaleString('ru-RU') + '\n' + '='.repeat(50) + '\n\n';
        for (var i = 0; i < s.displayMessages.length; i++) {
            var m = s.displayMessages[i];
            var content = m.content || m.text || '';
            var extras = m.extras || {};
            var prompt = extras.prompt || m.prompt || '';
            if (m.role === 'user') {
                text += 'Вы:\n' + content + '\n\n';
            } else {
                text += 'GigaChat Prompt:\n' + content + '\n';
                if (prompt) text += '\n--- ПРОМПТ ---\n' + prompt + '\n--- /ПРОМПТ ---\n';
                text += '\n';
            }
            text += '-'.repeat(40) + '\n\n';
        }
        var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'prompt-engineer-export.txt';
        a.click();
        URL.revokeObjectURL(a.href);
    };
</script>
</body>
</html>

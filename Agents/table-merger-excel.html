<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Объединение таблиц Excel — GigaChat</title>
<script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
<style>
:root {
    --bg-primary: #1f1f1e;
    --bg-secondary: #1f1e1c;
    --bg-input: #2c2c2a;
    --bg-card: #1f1e1c;
    --border: #363432;
    --text-primary: #d4d4d4;
    --text-secondary: #8a8a8a;
    --text-muted: #5a5a5a;
    --accent: #d4a574;
    --accent-hover: #c08a5a;
    --accent-light: rgba(212, 165, 116, 0.12);
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
}
:root[data-theme="light"] {
    --bg-primary: #fdfdfc;
    --bg-secondary: #f3f1ec;
    --bg-input: #fffffe;
    --bg-card: #fffffe;
    --border: #e3dfd5;
    --text-primary: #1f1f1e;
    --text-secondary: #6b6b68;
    --text-muted: #a8a59f;
    --accent: #b8895d;
    --accent-hover: #a0764d;
    --accent-light: rgba(184, 137, 93, 0.15);
}
/* Общие стили tool-страницы — в _shared.js через GigaChat.injectToolCss().
   Здесь — только per-page правила (file-list, color-message variants, btn-primary
   override, spinner) + html scrollbar. */
html {
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}
html::-webkit-scrollbar { width: 5px; }
html::-webkit-scrollbar-track { background: transparent; }
html::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
html::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* table-merger overrides shared main width: 800px вместо 900px. */
main { max-width: 800px; }
/* Поведение dragover (а не dragging как в shared) — оставляем имя класса
   из существующего JS, добавляем нужное правило. */
.drop-zone.dragover { border-color: var(--accent); background: var(--accent-light, rgba(212,165,116,.12)); }
/* per-page: скрытый input file внутри drop-zone */
.drop-zone input[type="file"] { display: none; }

#fileList {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
}
#fileList.show { display: block; }
#fileList .file-list-header {
    padding: 12px 18px;
    background: var(--bg-input);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
}
#fileList .file-list-header .count {
    color: var(--accent);
    font-weight: 600;
}
#fileList .file-list-header .clear-all {
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    background: none;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: inherit;
}
#fileList .file-list-header .clear-all:hover { color: var(--error); background: rgba(239,68,68,0.08); }
.file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
}
.file-row:last-child { border-bottom: none; }
.file-row .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-primary);
}
.file-row .size {
    color: var(--text-muted);
    font-size: 12px;
    font-family: Consolas, monospace;
    flex-shrink: 0;
}
.file-row .remove {
    width: 22px; height: 22px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
}
.file-row .remove:hover { color: var(--error); background: rgba(239,68,68,0.08); }

.warning {
    background: rgba(245, 158, 11, 0.10);
    border: 1px solid rgba(245, 158, 11, 0.4);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: var(--warning);
    font-size: 13px;
    display: none;
}
.warning.show { display: block; }

.error-msg {
    background: rgba(239, 68, 68, 0.10);
    border: 1px solid rgba(239, 68, 68, 0.4);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: var(--error);
    font-size: 13px;
    display: none;
}
.error-msg.show { display: block; }

.success-msg {
    background: rgba(16, 185, 129, 0.10);
    border: 1px solid rgba(16, 185, 129, 0.4);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: var(--success);
    font-size: 13px;
    display: none;
}
.success-msg.show { display: block; }

.actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}
/* Override shared .btn-primary: НЕ растягиваем на 100%, чтобы в .actions
   с flex-end кнопка прижималась вправо. Также сбрасываем margin-bottom
   (она тут в footer-зоне рядом с .btn-secondary, не сама по себе). */
.btn-primary {
    width: auto;
    margin-bottom: 0;
    padding: 12px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14.5px;
    font-weight: 600;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary {
    padding: 12px 20px;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
}
.btn-secondary:hover:not(:disabled) { color: var(--text-primary); border-color: var(--text-secondary); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* .status-bar и pulse keyframe в _shared.js (injectToolCss → injectStatusDotCss). */

</style>
<script src="_config.js"></script>
<script src="_shared.js"></script>
</head>
<body>

<header>
    <div class="header-left"><a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a><h1>Объединение Excel</h1></div>
    <div class="header-right">
        <div class="status-bar"><span class="dot checking" id="statusDot"></span><span id="statusText">проверка...</span></div>
    </div>
</header>

<main>
    <div class="intro">
        <h2>Что делает инструмент</h2>
        <p>Загружаете несколько <b>Excel-файлов</b> (<code>.xlsx</code> или <code>.xlsm</code>) с одинаковыми таблицами. Инструмент склеивает все таблицы в одну и отдаёт итоговый <code>.xlsx</code>.</p>
        <p>Читается <b>первый лист</b> в каждом файле. Первая строка считается заголовком.</p>
    </div>

    <label class="drop-zone" id="dropZone" for="fileInput">
        <div class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></div>
        <div class="title">Перетащите Excel-файлы сюда или нажмите для выбора</div>
        <div class="hint">Принимаются <b>.xlsx</b> и <b>.xlsm</b>.</div>
        <input type="file" id="fileInput" multiple accept=".xlsx,.xlsm">
    </label>

    <div class="warning" id="warningBox"></div>
    <div class="error-msg" id="errorBox"></div>
    <div class="success-msg" id="successBox"></div>

    <div id="fileList">
        <div class="file-list-header">
            <span>Выбрано: <span class="count" id="fileCount">0</span></span>
            <button class="clear-all" type="button" onclick="clearFiles()">Очистить</button>
        </div>
        <div id="fileRows"></div>
    </div>

    <div class="actions">
        <button class="btn-primary" id="mergeBtn" onclick="doMerge()" disabled>
            <span id="mergeBtnText">Объединить и скачать</span>
        </button>
    </div>
</main>

<script>
GigaChat.injectToolCss();
var WEBHOOK_URL = GigaChat.webhookUrl('table-merger-excel');
var MAX_FILES_WARN = 10;
var MAX_FILES_HARD = 25;
var FETCH_TIMEOUT_MS = 240000;

var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var fileList = document.getElementById('fileList');
var fileRows = document.getElementById('fileRows');
var fileCount = document.getElementById('fileCount');
var warningBox = document.getElementById('warningBox');
var errorBox = document.getElementById('errorBox');
var successBox = document.getElementById('successBox');
var mergeBtn = document.getElementById('mergeBtn');
var mergeBtnText = document.getElementById('mergeBtnText');
var statusDot = document.getElementById('statusDot');
var statusText = document.getElementById('statusText');

var selectedFiles = [];

function escapeHtml(s) { return GigaChat.escapeHtml(s); }

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' Б';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
    return (bytes / 1024 / 1024).toFixed(1) + ' МБ';
}

function detectKind(name) {
    var lower = (name || '').toLowerCase();
    if (lower.endsWith('.xlsx') || lower.endsWith('.xlsm')) return 'xlsx';
    return null;
}

function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
    successBox.classList.remove('show');
}
function clearError() {
    errorBox.classList.remove('show');
}
function showSuccess(msg) {
    successBox.textContent = msg;
    successBox.classList.add('show');
    errorBox.classList.remove('show');
}
function clearSuccess() {
    successBox.classList.remove('show');
}

function renderList() {
    if (selectedFiles.length === 0) {
        fileList.classList.remove('show');
        warningBox.classList.remove('show');
        mergeBtn.disabled = true;
        return;
    }
    fileList.classList.add('show');
    fileCount.textContent = selectedFiles.length;

    var html = '';
    for (var i = 0; i < selectedFiles.length; i++) {
        var f = selectedFiles[i];
        html += '<div class="file-row">';
        html += '<span class="name">' + escapeHtml(f.name) + '</span>';
        html += '<span class="size">' + formatSize(f.size) + '</span>';
        html += '<button class="remove" onclick="removeFile(' + i + ')" aria-label="Удалить">×</button>';
        html += '</div>';
    }
    fileRows.innerHTML = html;

    // Предупреждения
    var warns = [];
    if (selectedFiles.length > MAX_FILES_HARD) {
        warns.push('Превышен предел в ' + MAX_FILES_HARD + ' файлов. Удалите лишние.');
    } else if (selectedFiles.length > MAX_FILES_WARN) {
        warns.push('Файлов больше ' + MAX_FILES_WARN + ' — обработка может занять минуту или дольше.');
    }
    // Проверка одинаковости формата
    var kinds = {};
    for (var j = 0; j < selectedFiles.length; j++) {
        var k = detectKind(selectedFiles[j].name);
        if (k) kinds[k] = true;
        else warns.push('Файл «' + selectedFiles[j].name + '» имеет неподдерживаемый формат.');
    }
    if (Object.keys(kinds).length > 1) {
        warns.push('Файлы разных форматов. Оставьте только .xlsx/.xlsm.');
    }

    if (warns.length > 0) {
        warningBox.innerHTML = warns.map(function(w) { return '⚠ ' + escapeHtml(w); }).join('<br>');
        warningBox.classList.add('show');
    } else {
        warningBox.classList.remove('show');
    }

    var canMerge = selectedFiles.length >= 1 &&
                   selectedFiles.length <= MAX_FILES_HARD &&
                   Object.keys(kinds).length === 1;
    mergeBtn.disabled = !canMerge;
}

function addFiles(fileLikeList) {
    clearError();
    clearSuccess();
    for (var i = 0; i < fileLikeList.length; i++) {
        var f = fileLikeList[i];
        // Защита от дубликатов по имени+размеру
        var dup = false;
        for (var j = 0; j < selectedFiles.length; j++) {
            if (selectedFiles[j].name === f.name && selectedFiles[j].size === f.size) {
                dup = true; break;
            }
        }
        if (!dup) selectedFiles.push(f);
    }
    renderList();
}

function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderList();
}
function clearFiles() {
    selectedFiles = [];
    fileInput.value = '';
    renderList();
    clearError();
    clearSuccess();
}

fileInput.addEventListener('change', function() {
    addFiles(fileInput.files);
    // Сбрасываем value чтобы можно было загрузить тот же файл повторно
    fileInput.value = '';
});

dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer && e.dataTransfer.files) {
        addFiles(e.dataTransfer.files);
    }
});
async function doMerge() {
    if (selectedFiles.length === 0) return;
    clearError();
    clearSuccess();
    mergeBtn.disabled = true;
    mergeBtnText.innerHTML = '<span class="spinner"></span> Обрабатываю...';

    var formData = new FormData();
    for (var i = 0; i < selectedFiles.length; i++) {
        formData.append('files', selectedFiles[i], selectedFiles[i].name);
    }

    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, FETCH_TIMEOUT_MS);

    try {
        var res = await fetch(WEBHOOK_URL, {
            method: 'POST',
            body: formData,
            signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!res.ok) {
            // Сервер вернул JSON с ошибкой
            var errText;
            try {
                var errJson = await res.json();
                errText = errJson.error || errJson.message || ('HTTP ' + res.status);
            } catch (e) {
                errText = 'HTTP ' + res.status;
            }
            throw new Error(errText);
        }

        var blob = await res.blob();
        if (blob.size === 0) throw new Error('Сервер вернул пустой файл.');

        // Имя файла из Content-Disposition если есть, иначе по умолчанию
        var cd = res.headers.get('content-disposition') || '';
        var filename = 'merged.bin';
        var m = cd.match(/filename\*?=(?:UTF-8'')?([^;]+)/i);
        if (m) {
            try { filename = decodeURIComponent(m[1].replace(/^["']|["']$/g, '')); }
            catch (_) { filename = m[1].replace(/^["']|["']$/g, ''); }
        } else {
            filename = 'merged.xlsx';
        }

        // Триггерим скачивание
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);

        var filesCount = selectedFiles.length;
        showSuccess('Готово. Файл «' + filename + '» (' + formatSize(blob.size) + ') скачан. Объединено файлов: ' + filesCount + '.');
        // Очищаем список выбранных файлов — следующая партия начинается с чистого листа.
        selectedFiles = [];
        fileInput.value = '';
    } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
            showError('Превышено время ожидания (4 минуты). Файлов слишком много или они слишком большие.');
        } else {
            showError(err.message || 'Не удалось обработать файлы.');
        }
    } finally {
        mergeBtn.disabled = false;
        mergeBtnText.textContent = 'Объединить и скачать';
        renderList(); // вернёт правильное disabled если что
    }
}

// Health check (через webhook — если n8n live, считаем что и сервис live;
// настоящий статус узнаем только при запросе на /merge).
function checkStatus() {
    GigaChat.checkServerStatus(WEBHOOK_URL, statusDot, statusText);
}
checkStatus();
setInterval(checkStatus, 30000);

renderList();
</script>

</body>
</html>

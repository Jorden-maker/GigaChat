<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Извлечение текста — GigaChat</title>
    <script>
        (function () {
            var t = localStorage.getItem('giga_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2a2a2a;
            --bg-input: #333333;
            --border: #444444;
            --text-primary: #e0e0e0;
            --text-secondary: #999999;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --success: #4caf50;
            --success-bg: #1a2e1a;
            --error-bg: #3a2020;
            --error-border: #cc4444;
            --error-text: #ff8888;
            --warning-bg: #3a3520;
            --warning-border: #cc9944;
            --warning-text: #ffcc88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Segoe UI, Tahoma, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 60px 20px 40px;
        }

        .btn-home { position:fixed; top:16px; left:16px; padding:8px 16px; background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-secondary); text-decoration:none; font-size:13px; border-radius:8px; transition:all .2s; z-index:10; }
        .btn-home:hover { border-color:var(--accent); color:var(--accent); }
        .btn-home .arrow { margin-right:6px; }

        .container { width: 100%; max-width: 900px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 24px; }
        header h1 { font-family: Consolas, monospace; font-size: 22px; color: var(--accent); letter-spacing: 2px; }
        header p { color: var(--text-secondary); font-size: 14px; margin-top: 8px; }
        .status-line { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 11px; color: var(--text-secondary); }
        .status-line .dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; }
        .status-line .dot.offline { background: #cc4444; animation: none; }
        .status-line .dot.checking { background: #f0ad4e; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .upload-area { border: 2px dashed #555; border-radius: 12px; padding: 36px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg-secondary); margin-bottom: 16px; }
        .upload-area:hover { border-color: var(--accent); background: #2a2a25; }
        .upload-area.dragging { border-color: var(--accent); background: #2a2a30; }
        .upload-area .icon { font-size: 42px; margin-bottom: 10px; }
        .upload-area .text { color: var(--text-secondary); font-size: 14px; }
        .upload-area .filename { color: var(--accent); font-size: 15px; margin-top: 8px; font-weight: 600; word-break: break-all; }
        .upload-area .filesize { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }

        #fileInput { display: none; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 16px; }
        #sendBtn { flex: 1; padding: 14px; background: var(--accent); color: #111; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600; transition: background 0.2s; }
        #sendBtn:hover { background: var(--accent-hover); }
        #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

        .loading { text-align: center; color: var(--text-secondary); font-size: 14px; padding: 16px; display: none; }
        .loading .timer { font-family: Consolas, monospace; color: var(--accent); font-size: 16px; margin-top: 6px; }
        .progress-bar { width: 100%; height: 5px; background: var(--bg-input); border-radius: 3px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-bar .fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; width: 0%; }

        .error-box { display: none; padding: 14px 18px; border-radius: 10px; line-height: 1.6; font-size: 14px; background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); white-space: pre-wrap; margin-bottom: 16px; }

        .result-box { display: none; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .result-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-input); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
        .result-meta { font-size: 12px; color: var(--text-secondary); }
        .result-meta b { color: var(--text-primary); }
        .result-actions { display: flex; gap: 8px; }
        .btn-action { padding: 6px 12px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }
        #resultText { width: 100%; min-height: 380px; max-height: 70vh; background: transparent; border: none; color: var(--text-primary); padding: 14px 18px; font-family: Consolas, 'Cascadia Code', monospace; font-size: 13.5px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; overflow-x: hidden; overflow-y: auto; resize: vertical; outline: none; tab-size: 4; }

        .reset-btn { text-align: center; margin-top: 14px; display: none; }
        .reset-btn button { background: none; border: 1px solid #444; color: #888; padding: 8px 24px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .reset-btn button:hover { border-color: #666; color: #bbb; }

        .theme-toggle {
            position: fixed; top: 16px; right: 16px; z-index: 10;
            width: 40px; height: 40px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 50%;
            cursor: pointer; padding: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
            color: var(--text-secondary);
        }
        .theme-toggle:hover { border-color: rgba(255, 255, 255, 0.4); color: var(--text-primary); transform: scale(1.08); }
        .theme-toggle svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
        .theme-toggle .theme-icon-sun { display: inline-flex; }
        .theme-toggle .theme-icon-moon { display: none; }

        /* ============ СВЕТЛАЯ ТЕМА ============ */
        :root[data-theme="light"] {
            --bg-primary: #faf6ee;
            --bg-secondary: #ffffff;
            --bg-input: #fffbf2;
            --border: #e2dcc8;
            --text-primary: #2d2416;
            --text-secondary: #8a7754;
            --error-bg: #fef2f2;
            --error-border: #fca5a5;
            --error-text: #b91c1c;
        }
        :root[data-theme="light"] body { background: var(--bg-primary); color: var(--text-primary); }
        :root[data-theme="light"] .upload-area { background: #ffffff; border-color: #d4b96f; }
        :root[data-theme="light"] .upload-area:hover { border-color: var(--accent); background: #fffbf2; }
        :root[data-theme="light"] .upload-area.dragging { border-color: var(--accent); background: #f5efe1; }
        :root[data-theme="light"] #sendBtn { color: #1a1a1a; }
        :root[data-theme="light"] .result-header { background: #f5efe1; }
        :root[data-theme="light"] .btn-action { background: #ffffff; }
        :root[data-theme="light"] #resultText { color: var(--text-primary); }
        :root[data-theme="light"] .reset-btn button { border-color: var(--border); color: var(--text-secondary); background: #ffffff; }
        :root[data-theme="light"] .reset-btn button:hover { border-color: var(--accent); color: var(--accent); }
        :root[data-theme="light"] .theme-toggle { border-color: rgba(212, 175, 55, 0.35); color: #8a7754; }
        :root[data-theme="light"] .theme-toggle:hover { border-color: rgba(212, 175, 55, 0.7); color: #2d2416; box-shadow: 0 0 16px rgba(212, 175, 55, 0.25); }
        :root[data-theme="light"] .theme-toggle .theme-icon-sun { display: none; }
        :root[data-theme="light"] .theme-toggle .theme-icon-moon { display: inline-flex; }
    </style>
    <script src="_config.js"></script>
    <script src="_shared.js"></script>
</head>
<body>
    <a class="btn-home" href="../GigaChat-Platform.html"><span class="arrow">&#8592;</span>GigaChat</a>
    <button class="theme-toggle" onclick="GigaChat.toggleTheme()" title="Сменить тему" aria-label="Сменить тему">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="container">
        <header>
            <h1>Извлечение текста</h1>
            <p>Загрузи файл — получи чистый текст с сохранёнными отступами</p>
            <div class="status-line">
                <span class="dot checking" id="statusDot"></span>
                <span id="statusText">проверка...</span>
            </div>
        </header>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="icon">📄</div>
            <div class="text">Нажмите или перетащите файл сюда</div>
            <div class="text" style="margin-top:6px; font-size:12px; color:#666">PDF, Word, изображения, Excel, CSV, TXT (макс. 50 МБ)</div>
            <div class="filename" id="fileName"></div>
            <div class="filesize" id="fileSize"></div>
        </div>

        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.md,.log,.rtf,.odt,.jpg,.jpeg,.png,.tiff,.tif,.bmp,.webp,.gif,.heic" onchange="fileSelected(this)">

        <div class="btn-row">
            <button id="sendBtn" onclick="sendFile()" disabled>Извлечь текст</button>
        </div>

        <div class="loading" id="loading">
            <div>Обрабатываю файл...</div>
            <div class="timer" id="timer">0 сек</div>
            <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="result-box" id="resultBox">
            <div class="result-header">
                <div class="result-meta" id="resultMeta"></div>
                <div class="result-actions">
                    <button class="btn-action" onclick="copyResult()" id="btnCopy">Копировать</button>
                    <button class="btn-action" onclick="downloadResult()">Скачать .txt</button>
                </div>
            </div>
            <textarea id="resultText" readonly></textarea>
        </div>

        <div class="reset-btn" id="resetBtn">
            <button onclick="resetForm()">Извлечь из другого файла</button>
        </div>
    </div>

    <script>
        var WEBHOOK_URL = GigaChat.webhookUrl('extract-text');
        var FETCH_TIMEOUT_MS = 300000;
        var selectedFile = null;
        var isProcessing = false;
        var timerInterval = null;
        var startTime = 0;
        var lastResultText = '';
        var lastFileName = '';

        var ALLOWED_EXTENSIONS = ['pdf','doc','docx','xls','xlsx','csv','txt','md','log','rtf','odt','jpg','jpeg','png','tiff','tif','bmp','webp','gif','heic'];

        var uploadArea = document.getElementById('uploadArea');
        var sendBtn = document.getElementById('sendBtn');
        var loading = document.getElementById('loading');
        var resultBox = document.getElementById('resultBox');
        var errorBox = document.getElementById('errorBox');
        var resetBtnDiv = document.getElementById('resetBtn');
        var progressBar = document.getElementById('progressBar');
        var progressFill = document.getElementById('progressFill');
        var resultText = document.getElementById('resultText');
        var resultMeta = document.getElementById('resultMeta');

        var statusDot = document.getElementById('statusDot');
        var statusText = document.getElementById('statusText');
        function checkServer() {
            return GigaChat.checkServerStatus(WEBHOOK_URL, statusDot, statusText);
        }
        checkServer();
        setInterval(checkServer, 30000);

        // Drag and drop
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });
        uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragging'); });
        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            if (e.dataTransfer.files.length > 0) {
                var file = e.dataTransfer.files[0];
                var ext = (file.name || '').split('.').pop().toLowerCase();
                if (ALLOWED_EXTENSIONS.indexOf(ext) === -1) {
                    alert('Неподдерживаемый формат: .' + ext);
                    return;
                }
                selectedFile = file;
                showFileInfo(selectedFile);
            }
        });

        function fileSelected(input) {
            if (input.files.length > 0) {
                selectedFile = input.files[0];
                showFileInfo(selectedFile);
            }
        }

        function showFileInfo(file) {
            document.getElementById('fileName').textContent = file.name;
            var sizeMB = (file.size / 1024 / 1024).toFixed(2);
            document.getElementById('fileSize').textContent = sizeMB + ' МБ';
            sendBtn.disabled = false;
            if (file.size > 50 * 1024 * 1024) {
                document.getElementById('fileSize').textContent = sizeMB + ' МБ — слишком большой (макс. 50 МБ)';
                document.getElementById('fileSize').style.color = '#ff8888';
                sendBtn.disabled = true;
            } else {
                document.getElementById('fileSize').style.color = '';
            }
        }

        function startTimer() {
            startTime = Date.now();
            var timerEl = document.getElementById('timer');
            timerInterval = setInterval(function() {
                var elapsed = Math.floor((Date.now() - startTime) / 1000);
                var min = Math.floor(elapsed / 60);
                var sec = elapsed % 60;
                timerEl.textContent = min > 0 ? (min + ' мин ' + sec + ' сек') : (sec + ' сек');
                var pct = Math.min(95, (elapsed / 60) * 100);
                progressFill.style.width = pct + '%';
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            progressFill.style.width = '100%';
        }

        async function sendFile() {
            if (!selectedFile || isProcessing) return;
            isProcessing = true;
            sendBtn.disabled = true;
            loading.style.display = 'block';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';
            resetBtnDiv.style.display = 'none';
            startTimer();

            try {
                var controller = new AbortController();
                var timeoutId = setTimeout(function() { controller.abort(); }, FETCH_TIMEOUT_MS);

                var formData = new FormData();
                formData.append('file', selectedFile);

                var res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                stopTimer();
                loading.style.display = 'none';

                if (!res.ok) throw new Error('Сервер вернул ошибку: ' + res.status);

                var data = await res.json();

                if (data.success && data.response) {
                    lastResultText = data.response;
                    lastFileName = selectedFile.name;
                    resultText.value = data.response;

                    var elapsed = Math.floor((Date.now() - startTime) / 1000);
                    var sourceMap = { ocr: 'OCR', text: 'Текстовый файл', table: 'Таблица' };
                    var sourceLabel = sourceMap[data.source] || data.source || '—';
                    var lengthLabel = data.response.length.toLocaleString('ru-RU') + ' символов';
                    var tableMeta = '';
                    if (data.source === 'table' && data.rowCount) {
                        tableMeta = ' · ' + data.rowCount + ' строк · ' + (data.colCount || '?') + ' колонок';
                    }
                    resultMeta.innerHTML = '<b>' + escapeHtml(selectedFile.name) + '</b> · ' + sourceLabel + ' · ' + lengthLabel + tableMeta + ' · ' + elapsed + ' сек';
                    resultBox.style.display = 'block';
                } else {
                    errorBox.textContent = data.response || 'Не удалось извлечь текст.';
                    errorBox.style.display = 'block';
                }
            } catch(e) {
                stopTimer();
                loading.style.display = 'none';
                errorBox.textContent = (e.name === 'AbortError')
                    ? 'Сервер не ответил за 5 минут. Возможно, файл слишком сложный.'
                    : 'Ошибка: ' + e.message;
                errorBox.style.display = 'block';
            }

            isProcessing = false;
            resetBtnDiv.style.display = 'block';
        }

        function copyResult() {
            if (!lastResultText) return;
            navigator.clipboard.writeText(lastResultText).then(function() {
                var btn = document.getElementById('btnCopy');
                var old = btn.textContent;
                btn.textContent = 'Скопировано';
                setTimeout(function() { btn.textContent = old; }, 1500);
            });
        }

        function downloadResult() {
            if (!lastResultText) return;
            var baseName = (lastFileName || 'extracted').replace(/\.[^.]+$/, '');
            var blob = new Blob([lastResultText], { type: 'text/plain;charset=utf-8' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = baseName + '.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function resetForm() {
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('fileSize').textContent = '';
            sendBtn.disabled = true;
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';
            resetBtnDiv.style.display = 'none';
            progressBar.style.display = 'none';
            lastResultText = '';
            lastFileName = '';
        }

        function escapeHtml(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GigaChat Планировщик</title>
    <style>
        /* Pre-paint фон + color-scheme + базовый body — чтобы при переходе
           с дашборда первый paint был уже в правильных шрифтах и цветах.
           Без этого браузер успевал нарисовать h1/текст в серифе (Times New
           Roman) до того как большой <style>-блок применится. */
        html { color-scheme: light; background: #fdfdfc; }
        html[data-theme="dark"] { color-scheme: dark; background: #1f1f1e; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #1f1f1e;
            background: #fdfdfc;
        }
        html[data-theme="dark"] body {
            color: #d4d4d4;
            background: #1f1f1e;
        }
        html.gc-pending-auth, html.gc-pending-auth body { background: inherit !important }
        /* На время верификации токена прячем основной UI (.sidebar и .main).
           Раньше это правило жило только в большом <style> ниже — пока он
           не загрузится, элементы успевали проскочить нестилизованными.
           Дублируем критическое правило тут, чтобы оно действовало с первого paint. */
        html.gc-pending-auth .sidebar,
        html.gc-pending-auth .main { display: none !important; }
    </style>
    <script>(function(){var t='light';try{t=localStorage.getItem('giga_theme')||'light'}catch(e){}document.documentElement.setAttribute('data-theme',t);/* !important чтобы не перебилось последующими стилями (FOUC fix) */document.documentElement.style.setProperty('background',t==='dark'?'#1f1f1e':'#fdfdfc','important');document.documentElement.classList.add('gc-pending-auth');})();</script>
    <style>
        :root {
            --bg-primary: #1f1f1e;
            --bg-secondary: #1f1e1c;
            --bg-sidebar: #262626;
            --bg-input: #2c2c2a;
            --bg-user: rgba(212, 165, 116, 0.10);
            --bg-bot: #1f1e1c;
            --border: #363432;
            --text-primary: #d4d4d4;
            --text-secondary: #8a8a8a;
            --text-muted: #5a5a5a;
            --accent: #d4a574;
            --accent-hover: #c08a5a;
            --code-bg: #1f1e1c;
            --code-text: #d4d4d4;
            --sidebar-width: 270px;
            --priority-high: #d97757;
            --priority-medium: #b8895d;
            --priority-low: #7a7a78;
        }
        :root[data-theme="light"] {
            --bg-primary: #fdfdfc;
            --bg-secondary: #f3f1ec;
            --bg-sidebar: #fdfdfc;
            --bg-input: #fffffe;
            --bg-user: rgba(184, 137, 93, 0.12);
            --bg-bot: #f3f1ec;
            --border: #e3dfd5;
            --text-primary: #1f1f1e;
            --text-secondary: #6b6b68;
            --text-muted: #a8a59f;
            --accent: #b8895d;
            --accent-hover: #a0764d;
            --code-bg: #f3f1ec;
            --code-text: #1f1f1e;
            --priority-high: #c05a3a;
            --priority-medium: #a0764d;
            --priority-low: #8a8a87;
        }

        /* === Sidebar: верхняя строка (btn-home + кнопка «Задачи/Чат») === */
        .sidebar-top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px;
            gap: 8px;
        }
        .sidebar-top-bar .btn-home { margin: 0; }
        .btn-tasks-toggle {
            height: 36px;
            padding: 0 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit; font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .btn-tasks-toggle:hover {
            background: var(--bg-input);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }
        .btn-tasks-toggle.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .btn-tasks-toggle.active:hover {
            background: var(--accent-hover); border-color: var(--accent-hover);
        }

        /* === Контейнер под header (relative для panel-overlay) === */
        .main-body {
            flex: 1; min-height: 0;
            position: relative;
            display: flex; flex-direction: column;
        }

        /* === Панель задач: overlay поверх chat в .main-body === */
        #tasks-panel {
            position: absolute; top:0;right:0;bottom:0;left:0;
            background: var(--bg-primary);
            padding: 16px 40px;
            overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
            z-index: 5;
            opacity: 0; visibility: hidden;
            transition: opacity 0.22s ease, visibility 0s linear 0.22s;
        }
        #tasks-panel.show {
            opacity: 1; visibility: visible;
            transition: opacity 0.22s ease, visibility 0s linear 0s;
        }
        #tasks-panel::-webkit-scrollbar { width: 5px; }
        #tasks-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .tasks-toolbar {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .tasks-filter-tabs { display: flex; gap: 4px; }
        .tasks-filter-tabs button {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
            padding: 4px 12px; border-radius: 14px; font-size: 12px;
            font-family: inherit;
            transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }
        .tasks-filter-tabs button:hover { color: var(--accent); border-color: var(--accent); }
        .tasks-filter-tabs button.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .tasks-filter-tabs button.active:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .tasks-add-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent); color: #fff; border: none;
            cursor: pointer; padding: 6px 14px 6px 11px; border-radius: 8px;
            font-size: 13px; font-weight: 500; font-family: inherit;
            margin-left: auto;
            transition: background 0.18s ease, transform 0.1s ease;
        }
        .tasks-add-btn svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 2.2; stroke-linecap: round;
            flex-shrink: 0;
        }
        .tasks-add-btn:hover { background: var(--accent-hover); }
        .tasks-add-btn:active { transform: scale(0.97); }

        /* Иконки Импорт / Экспорт (XLSX) — справа от + Задача */
        .tasks-io-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px;
            background: transparent; border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary); cursor: pointer; padding: 0;
            transition: color .15s, background .15s, border-color .15s;
        }
        .tasks-io-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--bg-hover); }
        .tasks-io-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .tasks-io-btn svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* Счётчик задач: «Активных N · Просрочено M · Выполнено K» */
        .tasks-counter {
            font-size: 12px; color: var(--text-secondary);
            margin: 4px 0 10px; letter-spacing: 0.2px;
        }
        .tasks-counter .ct-num { color: var(--text-primary); font-weight: 600; }
        .tasks-counter .ct-overdue { color: var(--priority-high); font-weight: 600; }
        .tasks-counter .ct-sep { margin: 0 8px; opacity: 0.5; }

        /* Поисковая строка над списком задач */
        .tasks-search-row {
            position: relative;
            margin-bottom: 10px;
        }
        .tasks-search-row input {
            width: 100%; box-sizing: border-box;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 32px 8px 12px;
            color: var(--text-primary); font-family: inherit; font-size: 13px;
            outline: none;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .tasks-search-row input::placeholder { color: var(--text-muted); }
        .tasks-search-row input:hover { border-color: var(--text-secondary); }
        .tasks-search-row input:focus {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .tasks-search-clear {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            width: 22px; height: 22px;
            background: transparent; border: none;
            color: var(--text-secondary); cursor: pointer;
            font-size: 18px; line-height: 1;
            border-radius: 4px;
            display: none;
            align-items: center; justify-content: center;
            padding: 0;
            transition: color 0.15s, background 0.15s;
        }
        .tasks-search-clear:hover { color: var(--accent); background: var(--bg-hover); }
        .tasks-search-clear.show { display: inline-flex; }

        #tasks-list { display: flex; flex-direction: column; gap: 6px; }
        .tasks-empty {
            padding: 20px; text-align: center; color: var(--text-muted);
            font-size: 13px; font-style: italic;
        }
        /* Подсказка «Создайте список задач…» в центре панели — пиксельно как
           .empty-chat в чате. Показывается когда нет активной сессии. */
        .tasks-no-session {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            max-width: 600px;
            padding: 0 20px;
        }
        .tasks-no-session.hidden { display: none; }
        .task-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 12px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 8px;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
        }
        .task-item:hover { border-color: var(--accent); background: var(--bg-input); }
        /* Drag & drop состояния */
        .task-item { cursor: grab; }
        .task-item.dragging { opacity: 0.4; cursor: grabbing; }
        .task-item.drop-above { box-shadow: inset 0 2px 0 var(--accent); }
        .task-item.drop-below { box-shadow: inset 0 -2px 0 var(--accent); }
        .task-item.completed { opacity: 0.5; }
        .task-item.completed:hover { opacity: 0.75; }
        .task-item.completed .task-title { text-decoration: line-through; }
        .task-item.overdue { border-left: 3px solid var(--priority-high); }
        .task-item.removing { opacity: 0; transform: translateX(20px); }
        /* Подзадача — отступ слева + вертикальная линия слева */
        .task-item.subtask {
            margin-left: 28px;
            border-left: 2px solid var(--border);
        }
        .task-item.subtask .task-title { font-size: 13px; }

        .task-check {
            margin-top: 2px; flex-shrink: 0;
            width: 18px; height: 18px;
            border: 1.5px solid var(--text-secondary); border-radius: 4px;
            cursor: pointer; background: transparent;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-check:hover { border-color: var(--accent); transform: scale(1.08); }
        .task-check:active { transform: scale(0.92); }
        .task-check.checked { background: var(--accent); border-color: var(--accent); }
        .task-check.checked::after {
            content: ''; width: 5px; height: 9px;
            border: solid #fff; border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .task-body { flex: 1; min-width: 0; cursor: pointer; transition: opacity 0.18s ease; }
        .task-body:hover .task-title { color: var(--accent); }
        .task-title { transition: color 0.18s ease; }
        .task-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .task-title {
            font-size: 14px; color: var(--text-primary); font-weight: 500;
            word-break: break-word;
        }
        .task-priority {
            font-size: 11px; padding: 1px 8px; border-radius: 8px;
            text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
            color: #fff; flex-shrink: 0;
        }
        .task-priority.high { background: var(--priority-high); }
        .task-priority.medium { background: var(--priority-medium); }
        .task-priority.low { background: var(--priority-low); }
        .task-deadline {
            font-size: 11px; color: var(--text-secondary); flex-shrink: 0;
        }
        .task-deadline.overdue { color: var(--priority-high); font-weight: 600; }
        .task-recurrence {
            font-size: 14px; color: var(--accent); cursor: help;
            flex-shrink: 0; user-select: none;
        }
        .task-description {
            font-size: 12px; color: var(--text-secondary); margin-top: 4px;
            word-break: break-word;
        }
        .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s ease; }
        .task-item:hover .task-actions { opacity: 1; }
        .task-actions button {
            background: none; border: none; padding: 4px 8px;
            color: var(--text-muted); cursor: pointer; border-radius: 4px;
            font-size: 16px; line-height: 1;
            transition: color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-actions button:hover { color: var(--text-primary); background: var(--bg-input); }
        .task-actions button:active { transform: scale(0.92); }
        .task-actions .delete:hover { color: var(--priority-high); background: rgba(217, 119, 87, 0.1); }

        /* === Чат для AI === */
        #chat { flex: 1; overflow-y: auto; padding: 20px 40px 45px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; min-height: 200px; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .session-item.active { color: var(--accent); border: 1px solid var(--border); }
        .bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
        #input-area { display: flex; gap: 8px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif;
            font-size: 15px; outline: none;
            transition: border-color 0.2s;
            resize: none; min-height: 36px; max-height: 130px; line-height: 1.5;
            overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: var(--text-muted); }

        /* === Modal для добавления/редактирования задачи === */
        .task-modal-overlay {
            position: fixed; top:0;right:0;bottom:0;left:0; z-index: 100;
            background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(3px);
            display: none; align-items: center; justify-content: center;
            animation: plannerFadeIn 0.2s ease;
        }
        .task-modal-overlay.show { display: flex; }
        @keyframes plannerFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes plannerModalSlide {
            from { transform: translateY(16px) scale(0.96); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .task-modal {
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: 12px; width: min(520px, 92vw); max-height: 90vh;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: plannerModalSlide 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .task-modal::-webkit-scrollbar { width: 4px; }
        .task-modal::-webkit-scrollbar-track { background: transparent; }
        .task-modal::-webkit-scrollbar-thumb {
            background: var(--border); border-radius: 10px;
            transition: background 0.18s ease;
        }
        .task-modal::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
        .task-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
        }
        .task-modal-header h3 { margin: 0; font-size: 16px; color: var(--text-primary); }
        .task-modal-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 24px; line-height: 1; cursor: pointer; padding: 2px 8px;
            border-radius: 6px;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .task-modal-close:hover { color: var(--text-primary); background: var(--bg-input); }
        .task-modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
        .task-modal-body label {
            display: flex; flex-direction: column; gap: 5px;
            font-size: 12px; color: var(--text-secondary); font-weight: 500;
        }
        .task-modal-body input[type="text"],
        .task-modal-body input[type="date"],
        .task-modal-body textarea {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px; color: var(--text-primary);
            font-family: inherit; font-size: 14px; outline: none;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .task-modal-body input:hover,
        .task-modal-body textarea:hover { border-color: var(--text-secondary); }
        .task-modal-body input:focus,
        .task-modal-body textarea:focus { border-color: var(--accent); background: var(--bg-secondary); }
        .task-modal-body textarea { resize: vertical; min-height: 60px; max-height: 200px; }
        .task-modal-body select {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 9px 12px; color: var(--text-primary);
            font-family: inherit; font-size: 13px; outline: none; cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
        }
        .task-modal-body select:focus { border-color: var(--accent); background: var(--bg-secondary); }

        /* Кастомный dropdown (не native select — у того нельзя стилизовать
           popup и option-теги полностью, отсюда был синий highlight и острые
           углы). Свой widget на div'ах — полный контроль над всем рендером. */
        .gc-select {
            position: relative; cursor: pointer; user-select: none;
            outline: none;
        }
        .gc-select-trigger {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px;
            font-size: 14px; color: var(--text-primary);
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-select:hover .gc-select-trigger,
        .gc-select:focus .gc-select-trigger { border-color: var(--text-secondary); }
        .gc-select.open .gc-select-trigger {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .gc-select-arrow {
            width: 7px; height: 7px;
            border-right: 1.5px solid var(--text-secondary);
            border-bottom: 1.5px solid var(--text-secondary);
            transform: translateY(-2px) rotate(45deg);
            transition: transform 0.2s ease, border-color 0.18s ease;
            flex-shrink: 0;
        }
        .gc-select.open .gc-select-arrow {
            transform: translateY(2px) rotate(-135deg);
            border-color: var(--accent);
        }
        .gc-select-menu {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            margin: 0; padding: 4px; list-style: none;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 200;
            opacity: 0; visibility: hidden; transform: translateY(-4px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }
        .gc-select.open .gc-select-menu {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .gc-select-menu li {
            padding: 8px 12px; border-radius: 5px;
            font-size: 14px; color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .gc-select-menu li:hover { background: var(--bg-secondary); color: var(--accent); }
        .gc-select-menu li.selected {
            color: var(--accent); font-weight: 500;
            background: var(--bg-secondary);
        }

        /* Кастомный date picker — полностью свой widget вместо input type=date.
           Нативный picker (popup ОС с месяцами) рендерится не CSS и не
           перекрашивается. Свой widget на div'ах = полный контроль над
           UI calendar'а, hover'ами, скруглениями, темой. */
        .gc-datepicker {
            position: relative; cursor: pointer; user-select: none; outline: none;
        }
        .gc-datepicker-trigger {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px;
            font-size: 14px;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-datepicker:hover .gc-datepicker-trigger,
        .gc-datepicker:focus .gc-datepicker-trigger { border-color: var(--text-secondary); }
        .gc-datepicker.open .gc-datepicker-trigger {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .gc-datepicker-label { color: var(--text-primary); }
        .gc-datepicker-label.placeholder { color: var(--text-muted); }
        .gc-datepicker-icon {
            color: var(--text-secondary); flex-shrink: 0; line-height: 0;
            transition: color 0.18s ease;
        }
        .gc-datepicker-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; }
        .gc-datepicker.open .gc-datepicker-icon { color: var(--accent); }

        .gc-datepicker-popup {
            /* Открываемся ВВЕРХ — date input последнее поле модалки, popup
               вниз перекрывал бы footer-кнопки. bottom:100% позиционирует
               попап над триггером, без visible-отступа снизу. */
            position: absolute; bottom: calc(100% + 4px); left: 0;
            width: 280px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 250;
            opacity: 0; visibility: hidden; transform: translateY(6px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }
        .gc-datepicker.open .gc-datepicker-popup {
            opacity: 1; visibility: visible; transform: translateY(0);
        }

        .gc-datepicker-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 4px; margin-bottom: 8px;
        }
        .gc-datepicker-title {
            flex: 1; text-align: center;
            font-size: 13px; font-weight: 600; color: var(--text-primary);
            text-transform: capitalize;
        }
        .gc-datepicker-nav {
            background: none !important; border: none; cursor: pointer;
            width: 28px; height: 28px; border-radius: 6px;
            color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            transition: color 0.18s ease, background 0.18s ease, transform 0.1s ease;
            font-family: inherit; outline: none;
        }
        /* CSS :hover в некоторых браузерах залипает после клика (видимо
           что-то с pointer capture / mouse capture). Перешли на JS-контролируемый
           hover: класс .is-hovering ставится через mouseenter, снимается через
           mouseleave. !important на background выше нужен чтобы default-state
           точно сбрасывался поверх любых унаследованных правил. */
        .gc-datepicker-nav.is-hovering {
            color: var(--accent); background: var(--bg-secondary) !important;
        }
        .gc-datepicker-nav:active { transform: scale(0.92); }
        .gc-datepicker-nav svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .gc-datepicker-weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px; margin-bottom: 4px;
        }
        .gc-datepicker-weekdays span {
            font-size: 10px; color: var(--text-muted);
            text-align: center; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 4px 0;
        }

        .gc-datepicker-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .gc-datepicker-day {
            background: none; border: none; cursor: pointer;
            height: 32px; border-radius: 6px;
            font-size: 12px; font-family: inherit;
            color: var(--text-primary);
            transition: background 0.15s ease, color 0.15s ease;
        }
        .gc-datepicker-day:hover { background: var(--bg-secondary); color: var(--accent); }
        .gc-datepicker-day.other-month { color: var(--text-muted); }
        .gc-datepicker-day.today {
            color: var(--accent); font-weight: 600;
            box-shadow: inset 0 0 0 1px var(--accent);
        }
        .gc-datepicker-day.selected {
            background: var(--accent); color: #fff; font-weight: 600;
            box-shadow: none;
        }
        .gc-datepicker-day.selected:hover { background: var(--accent-hover); color: #fff; }

        .gc-datepicker-actions {
            display: flex; justify-content: space-between; gap: 8px;
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .gc-datepicker-actions button {
            background: none; border: none; cursor: pointer;
            font-size: 12px; padding: 4px 8px; border-radius: 5px;
            color: var(--text-secondary); font-family: inherit;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .gc-datepicker-actions button:hover { color: var(--accent); background: var(--bg-secondary); }
        .gc-datepicker-actions .gc-datepicker-clear:hover { color: var(--priority-high); background: rgba(217,119,87,0.1); }
        .task-modal-footer {
            display: flex; justify-content: flex-end; gap: 8px;
            padding: 14px 22px; border-top: 1px solid var(--border);
        }
        .task-modal-footer button {
            padding: 8px 18px; border-radius: 6px; font-size: 13px;
            font-family: inherit; cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary);
            transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-modal-footer button:hover { color: var(--text-primary); border-color: var(--text-secondary); }
        .task-modal-footer button:active { transform: scale(0.97); }
        .task-modal-footer .primary {
            background: var(--accent); color: #fff; border-color: var(--accent);
            font-weight: 600;
        }
        .task-modal-footer .primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
        .task-modal-error {
            padding: 8px 22px 0; color: var(--priority-high); font-size: 12px; min-height: 14px;
        }

        /* === Login-overlay стили удалены — login/register живёт в /login.html.
           На этой странице остаётся только chgpwd-модалка + общие success-styles. */
        /* Пока auth не разрешён (bootstrap делает verify токена) — основной UI
           скрыт. Это убирает FOUC «проскока чужого UI» между серверным verify и
           первым рендером планировщика. Класс ставится в inline-скрипте в <head>
           ДО парсинга CSS, снимается в onOk колбэке requireAuth. */
        html.gc-pending-auth .sidebar,
        html.gc-pending-auth .main { display: none !important; }

        /* User-menu и change-password модалка перенесены на дашборд.
           Здесь — только pre-paint mask для FOUC + auth-redirect логика
           (см. GigaChat.auth.requireAuth в JS блоке внизу). */
    </style>
    <script src="_config.js"></script>
    <link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
    <script src="lib/highlight.min.js"></script>
    <script src="_shared-guard.js"></script>
    <script src="_shared.js"></script>
    <script src="lib/jszip.min.js"></script>
</head>
<body>
    <!-- Анти-FOUC заставка. Закрывает всё что есть в body однотонным цветом до тех
         пор, пока document не дойдёт до readyState='complete'. Тогда JS в самом
         конце <body> удаляет div. Это гарантирует, что юзер НЕ видит частично
         отрисованный layout/шрифты во время загрузки (что не помогали ни
         color-scheme, ни pre-paint <style>-блок). -->
    <div id="__gc-bootloader" style="position:fixed;top:0;right:0;bottom:0;left:0;background:#1f1f1e;z-index:99999;pointer-events:none"></div>
    <script>(function(){var t=document.documentElement.getAttribute('data-theme');if(t!=='dark'){var el=document.getElementById('__gc-bootloader');if(el)el.style.background='#fdfdfc';}})();</script>

    <!-- Login/register перенесены в /login.html (single-source-of-truth для всей
         платформы). При отсутствии токена/auth_required делаем редирект через
         GigaChat.auth.requireAuth() из _shared.js. -->

    <!-- Change-password модалка перенесена на дашборд (GigaChat-Platform.html) —
         единая точка управления аккаунтом. -->

    <div class="sidebar">
        <div class="sidebar-top-bar">
            <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
            <button class="btn-tasks-toggle" id="tasksToggleBtn" onclick="toggleTasksPanel()">Задачи</button>
        </div>
        <div class="sidebar-header"><h3>Списки задач</h3></div>
        <div class="sidebar-add">
            <button onclick="createNewSession()">Новый список</button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left">
                <h1>GigaChat Планировщик</h1>
            </div>
            <div class="header-right">
                <div class="status" id="statusBar">
                    <span class="dot checking" id="statusDot"></span>
                    <span id="statusText">проверка...</span>
                </div>
                <!-- User-menu (Сменить пароль / Выйти) теперь живёт на дашборде —
                     единая точка управления аккаунтом для всей платформы. -->
                <button class="btn-export" id="btnExport" onclick="exportChat()">Экспорт</button>
            </div>
        </header>

        <!-- .main-body: контейнер под header. Внутри chat (визуальный дефолт)
             + bottom-area (input), и absolute поверх — #tasks-panel.
             Toggle через .show на panel — fade-in/out, chat остаётся под ним. -->
        <div class="main-body">
            <!-- Панель задач: overlay поверх chat при .show -->
            <div id="tasks-panel">
                <div class="tasks-toolbar">
                    <div class="tasks-filter-tabs">
                        <button class="active" data-filter="active" onclick="setTaskFilter('active', this)">Активные</button>
                        <button data-filter="completed" onclick="setTaskFilter('completed', this)">Выполненные</button>
                        <button data-filter="all" onclick="setTaskFilter('all', this)">Все</button>
                    </div>
                    <button class="tasks-add-btn" onclick="openTaskModal()" aria-label="Добавить задачу">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Задача
                    </button>
                    <button class="tasks-io-btn" onclick="exportTasksXlsx()" aria-label="Экспорт в Excel" title="Экспорт списка в Excel">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                    <button class="tasks-io-btn" onclick="document.getElementById('tasksImportInput').click()" aria-label="Импорт из Excel" title="Импорт списка из Excel">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </button>
                    <input type="file" id="tasksImportInput" style="display:none" accept=".xlsx,.xlsm" onchange="importTasksXlsx(this.files[0]); this.value=''">
                </div>
                <!-- Счётчик задач — обновляется в renderTasks из currentTasks -->
                <div class="tasks-counter" id="tasksCounter"></div>
                <!-- Поиск по задачам в текущем списке. Фильтрует currentTasks
                     по title+description в реальном времени. -->
                <div class="tasks-search-row">
                    <input type="text" id="tasksSearch" placeholder="Поиск по задачам…"
                           autocomplete="off" oninput="onTasksSearchInput()">
                    <button type="button" class="tasks-search-clear" id="tasksSearchClear"
                            onclick="clearTasksSearch()" aria-label="Очистить поиск">×</button>
                </div>
                <div id="tasks-list">
                    <div class="tasks-empty"></div>
                </div>
                <!-- Подсказка по центру панели когда нет активной сессии -->
                <div id="tasksNoSession" class="tasks-no-session hidden">Создайте список задач, потом спланируйте их с помощью GigaChat</div>
            </div>

            <!-- AI-чат для запросов -->
            <div id="chat">
                <div class="empty-chat">Создайте список задач, потом спланируйте их с помощью GigaChat</div>
            </div>
            <div class="bottom-area">
                <!-- gc-attach-chips и attachBtn — обязательные slots для setupAttachment
                     из _shared.js (createChatAgent его вызывает безусловно). В планировщике
                     файлы пока не используются, поэтому контейнеры скрыты — скрепка не
                     создаётся в visible-зоне. Без этих элементов createChatAgent падал
                     с appendChild на null, ломая весь setup (resize, ping, status). -->
                <div class="gc-attach-chips" id="attachChips" style="display:none"></div>
                <div id="input-area" class="gc-input-row">
                    <div class="gc-input-wrap">
                        <textarea id="msg" rows="1" placeholder="Спланируйте задачи..." disabled></textarea>
                        <button id="send" class="gc-send-icon" onclick="sendMsg()" disabled aria-label="Отправить">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                        </button>
                    </div>
                    <span id="attachBtn" style="display:none"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка добавления/редактирования задачи -->
    <div class="task-modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
        <div class="task-modal">
            <div class="task-modal-header">
                <h3 id="taskModalTitle">Новая задача</h3>
                <button class="task-modal-close" onclick="closeTaskModal()" aria-label="Закрыть">&times;</button>
            </div>
            <div class="task-modal-body">
                <label>Название
                    <input type="text" id="taskTitle" maxlength="500" placeholder="Что нужно сделать?">
                </label>
                <label>Описание
                    <textarea id="taskDescription" maxlength="5000" placeholder="Детали..."></textarea>
                </label>
                <label>Приоритет
                    <div class="gc-select" id="taskPriority" data-value="medium" tabindex="0" role="combobox" aria-haspopup="listbox" aria-expanded="false">
                        <div class="gc-select-trigger">
                            <span class="gc-select-label">Средний</span>
                            <span class="gc-select-arrow" aria-hidden="true"></span>
                        </div>
                        <ul class="gc-select-menu" role="listbox">
                            <li role="option" data-value="low">Низкий</li>
                            <li role="option" data-value="medium" class="selected">Средний</li>
                            <li role="option" data-value="high">Высокий</li>
                        </ul>
                    </div>
                </label>
                <label>Подзадача (опционально)
                    <select id="taskParent">
                        <option value="">— Самостоятельная задача —</option>
                    </select>
                </label>
                <label>Повторять
                    <select id="taskRecurrence">
                        <option value="">Не повторять</option>
                        <option value="daily">Ежедневно</option>
                        <option value="weekly">Еженедельно</option>
                        <option value="monthly">Ежемесячно</option>
                    </select>
                </label>
                <label>Срок выполнения
                    <div class="gc-datepicker" id="taskDeadline" data-value="" tabindex="0" role="button" aria-haspopup="dialog" aria-expanded="false">
                        <div class="gc-datepicker-trigger">
                            <span class="gc-datepicker-label placeholder">дд.мм.гггг</span>
                            <span class="gc-datepicker-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg></span>
                        </div>
                        <div class="gc-datepicker-popup" role="dialog">
                            <div class="gc-datepicker-header">
                                <button type="button" class="gc-datepicker-nav gc-datepicker-prev" aria-label="Предыдущий месяц"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
                                <div class="gc-datepicker-title"></div>
                                <button type="button" class="gc-datepicker-nav gc-datepicker-next" aria-label="Следующий месяц"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
                            </div>
                            <div class="gc-datepicker-weekdays">
                                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
                            </div>
                            <div class="gc-datepicker-grid"></div>
                            <div class="gc-datepicker-actions">
                                <button type="button" class="gc-datepicker-clear">Закрыть</button>
                                <button type="button" class="gc-datepicker-today">Сегодня</button>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            <div class="task-modal-error" id="taskModalError"></div>
            <div class="task-modal-footer">
                <button onclick="closeTaskModal()">Отмена</button>
                <button class="primary" onclick="saveTask()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        var escapeHtml = GigaChat.escapeHtml;
        var PLANNER_URL = GigaChat.webhookUrl('planner');
        // AUTH_URL/AUTH endpoint вызывается из _shared.js (GigaChat.auth.apiCall),
        // прямого использования здесь больше нет — login/register живёт в /login.html.

        // ========== Полноценная аутентификация ==========
        // localStorage хранит:
        //   gigachat_token    — session-токен (64 hex символа)
        //   gigachat_username — имя юзера (для отображения в header'е)
        // Хранение/чтение — через GigaChat.auth (см. _shared.js). При отсутствии
        // токена ИЛИ протухшем токене редиректим на /login.html?return=<url>.
        // Запросы к /webhook/planner шлют token, workflow проверяет SQL Verify
        // и подставляет user_id.

        function getStoredToken()    { return GigaChat.auth.getToken(); }
        function getStoredUsername() { return GigaChat.auth.getUsername(); }
        function setStoredAuth(token, username) { GigaChat.auth.setAuth(token, username); }
        function clearStoredAuth() { GigaChat.auth.clearAuth(); }

        // sanitizeUserForPrefix перенесён в _shared.js как GigaChat.auth.userPrefix.
        // Используется внутри createChatAgent при userScoped:true для префиксации
        // sessionStore и session_id.


        // submitLogin/submitRegister/change_password/logout/setLoginError/
        // showSuccessBadge/handleLoginEnterChain — всё перенесено в дашборд
        // (GigaChat-Platform.html) и/или login.html. Здесь авторизация — только
        // через GigaChat.auth.requireAuth() из _shared.js: при провале токена
        // редирект на /login.html?return=<url>.

        // Переключение между AI-чатом и панелью задач. Panel — absolute
        // overlay поверх chat (CSS .show → opacity 1 + visibility visible).
        // Кнопка в sidebar меняет надпись: «Задачи» (panel скрыт) ↔ «Чат» (panel открыт).
        function toggleTasksPanel(forceShow) {
            var panel = document.getElementById('tasks-panel');
            var btn = document.getElementById('tasksToggleBtn');
            if (!panel || !btn) return;
            var show = typeof forceShow === 'boolean' ? forceShow : !panel.classList.contains('show');
            panel.classList.toggle('show', show);
            btn.classList.toggle('active', show);
            btn.textContent = show ? 'Чат' : 'Задачи';
            // Кнопка «Экспорт» работает только с чатом — скрываем её при
            // открытом окне задач (юзер видит задачи, экспорт чата бессмыслен).
            var exportBtn = document.getElementById('btnExport');
            if (exportBtn) exportBtn.style.display = show ? 'none' : '';
            if (show) {
                // Обновляем список задач при открытии (могли добавиться через AI)
                if (typeof loadTasks === 'function') loadTasks();
            }
        }

        // === Старт страницы: verify token → main UI или редирект на /login.html ===
        var CURRENT_USER = '';
        var CURRENT_TOKEN = getStoredToken();
        var AUTH_READY = false;  // true когда verify прошёл успешно

        (function bootstrap() {
            // GigaChat.auth.requireAuth() сам вызовет onOk при успехе,
            // или сделает location.replace('../login.html?return=...') при провале.
            GigaChat.auth.requireAuth({
                onOk: function (username) {
                    CURRENT_TOKEN = getStoredToken();
                    CURRENT_USER = username;
                    AUTH_READY = true;
                    // verify прошёл — снимаем gc-pending-auth, main UI становится visible
                    document.documentElement.classList.remove('gc-pending-auth');
                    initAuthenticatedUI();
                }
            });
        })();

        function initAuthenticatedUI() {
            // User-menu (Сменить пароль / Выйти) переехал на дашборд —
            // здесь сразу инициализируем основной UI планировщика.
            initPlannerMainUI();
        }

        // ========== Локальное состояние панели задач ==========
        var currentFilter = 'active';
        var currentTasks = [];           // последний загруженный массив с сервера
        var editingTaskId = null;        // null = создание новой, число = редактирование
        var editingSessionId = null;     // session_id зафиксированный в момент openTaskModal —
                                         // защита от race: юзер открыл модалку, переключил
                                         // активный список, нажал Save → задача попадёт в исходный
        var tasksSearchQuery = '';       // фильтр поиска по title+description (lowercase)
        var plannerAgent = null;         // ссылка на результат createChatAgent — нужна для чтения sessionStore.state

        // Читаем activeSessionId напрямую из sessionStore. Раньше держали
        // отдельную переменную currentSessionId, обновлявшуюся в onSwitchExtra,
        // но onEmpty (срабатывает при удалении ПОСЛЕДНЕЙ сессии) НЕ зовёт
        // onSwitchExtra → переменная не сбрасывалась → юзер мог открыть модалку
        // и создать задачу в несуществующей сессии. Прямое чтение из source-of-truth
        // решает: после удаления sessionStore.state.activeSessionId = null.
        function getCurrentSessionId() {
            if (!plannerAgent || !plannerAgent.sessionStore || !plannerAgent.sessionStore.state) return null;
            return plannerAgent.sessionStore.state.activeSessionId || null;
        }

        // Визуально показываем что без сессии нельзя добавить задачу.
        function updateTasksAddBtnState() {
            var btn = document.querySelector('.tasks-add-btn');
            if (!btn) return;
            var has = !!getCurrentSessionId();
            btn.disabled = !has;
            btn.style.opacity = has ? '' : '0.45';
            btn.style.cursor = has ? '' : 'not-allowed';
            btn.setAttribute('aria-disabled', has ? 'false' : 'true');
        }

        // ========== HTTP-обёртка для всех CRUD-операций ==========
        async function plannerApi(payload) {
            // Подмешиваем token в каждый запрос. Сервер делает SQL Verify token,
            // вытаскивает user_id, фильтрует задачи. Юзер видит только свои.
            payload.token = getStoredToken();
            try {
                var res = await GigaChat.fetchWithRetry(PLANNER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify(payload)
                }, { timeout: 30000, retries: 1 });
                if (!res.ok) throw new Error('Сервер вернул ' + res.status);
                var data = await res.json();
                // Если сервер сказал unauthorized — токен протух/невалиден.
                // Чистим локально и редиректим на /login.html (с return на эту страницу).
                if (data && data.auth_required) {
                    GigaChat.auth.clearAuth();
                    GigaChat.auth.redirectToLogin();
                    return { response: 'error', error: 'Сессия истекла' };
                }
                return data;
            } catch (e) {
                console.error('Planner API error:', e);
                return { response: 'error', error: e.message };
            }
        }

        // ========== Загрузка задач для текущей сессии ==========
        // Всегда грузим ВСЕ задачи списка (filter='all') — счётчик и поиск
        // работают по полному набору, фильтр Активные/Выполненные/Все —
        // на клиенте в renderTasks. На несколько сотен задач быстрее, чем
        // делать отдельный запрос за счётчиком.
        async function loadTasks() {
            var sid = getCurrentSessionId();
            var noSessionEl = document.getElementById('tasksNoSession');
            if (!sid) {
                currentTasks = [];
                document.getElementById('tasks-list').innerHTML = '';
                if (noSessionEl) noSessionEl.classList.remove('hidden');
                updateTasksCounter();
                return;
            }
            if (noSessionEl) noSessionEl.classList.add('hidden');
            var data = await plannerApi({
                action: 'list', session_id: sid, filter: 'all'
            });
            currentTasks = (data && Array.isArray(data.tasks)) ? data.tasks : [];
            renderTasks();
        }

        // Обновление счётчика «Активных N · Просрочено M · Выполнено K».
        // Считается по полному currentTasks (не по visible после фильтра/поиска).
        function updateTasksCounter() {
            var el = document.getElementById('tasksCounter');
            if (!el) return;
            if (!currentTasks.length) { el.innerHTML = ''; return; }
            var today = new Date().toISOString().slice(0, 10);
            var active = 0, overdue = 0, completed = 0;
            for (var i = 0; i < currentTasks.length; i++) {
                var t = currentTasks[i];
                if (t.status === 'completed') completed++;
                else {
                    active++;
                    if (t.deadline && t.deadline < today) overdue++;
                }
            }
            var parts = ['Активных: <span class="ct-num">' + active + '</span>'];
            if (overdue > 0) parts.push('Просрочено: <span class="ct-overdue">' + overdue + '</span>');
            parts.push('Выполнено: <span class="ct-num">' + completed + '</span>');
            el.innerHTML = parts.join('<span class="ct-sep">·</span>');
        }

        function renderTasks() {
            var list = document.getElementById('tasks-list');
            updateTasksCounter();
            // Фильтрация на клиенте: сначала currentFilter (статус),
            // потом поиск (title+description).
            var visibleTasks = currentTasks;
            if (currentFilter === 'active') {
                visibleTasks = visibleTasks.filter(function (t) { return t.status === 'active'; });
            } else if (currentFilter === 'completed') {
                visibleTasks = visibleTasks.filter(function (t) { return t.status === 'completed'; });
            }
            if (tasksSearchQuery) {
                var q = tasksSearchQuery;
                visibleTasks = visibleTasks.filter(function (t) {
                    var hay = ((t.title || '') + ' ' + (t.description || '')).toLowerCase();
                    return hay.indexOf(q) !== -1;
                });
            }
            if (visibleTasks.length === 0) {
                var msg;
                if (tasksSearchQuery && currentTasks.length > 0) {
                    msg = 'По запросу «' + escapeHtml(tasksSearchQuery) + '» ничего не нашлось.';
                } else {
                    msg = currentFilter === 'active' ? 'Активных задач нет. Добавьте первую.'
                        : currentFilter === 'completed' ? 'Ничего пока не выполнено.'
                        : 'Список пуст.';
                }
                list.innerHTML = '<div class="tasks-empty">' + msg + '</div>';
                return;
            }
            var today = new Date().toISOString().slice(0, 10);
            // Иерархия: top-level (parent_id is null) → их подзадачи сразу после.
            // visibleTasks может содержать подзадачи parent'ов которые скрыты
            // фильтром поиска — отображаем их как top-level если parent невидим.
            var visibleIds = {};
            visibleTasks.forEach(function (t) { visibleIds[t.id] = true; });
            var topLevel = visibleTasks.filter(function (t) {
                return !t.parent_id || !visibleIds[t.parent_id];
            });
            var byParent = {};
            visibleTasks.forEach(function (t) {
                if (t.parent_id && visibleIds[t.parent_id]) {
                    if (!byParent[t.parent_id]) byParent[t.parent_id] = [];
                    byParent[t.parent_id].push(t);
                }
            });
            function renderOne(t, isSub) {
                var isCompleted = t.status === 'completed';
                var isOverdue = !isCompleted && t.deadline && t.deadline < today;
                var dlClass = isOverdue ? 'overdue' : '';
                var dlText = t.deadline ? ('до ' + t.deadline) : '';
                var prioRu = t.priority === 'high' ? 'Высокий'
                           : t.priority === 'low' ? 'Низкий' : 'Средний';
                var descHtml = t.description ? '<div class="task-description">' + escapeHtml(t.description) + '</div>' : '';
                return '<div class="task-item ' + (isSub ? 'subtask ' : '') + (isCompleted ? 'completed ' : '') + (isOverdue ? 'overdue' : '') + '" data-id="' + t.id + '" draggable="true">'
                    + '<div class="task-check ' + (isCompleted ? 'checked' : '') + '" onclick="toggleTask(' + t.id + ')" role="checkbox" aria-checked="' + isCompleted + '"></div>'
                    + '<div class="task-body" onclick="openTaskModal(' + t.id + ')">'
                    + '<div class="task-title-row">'
                    + '<span class="task-priority ' + t.priority + '">' + prioRu + '</span>'
                    + '<span class="task-title">' + escapeHtml(t.title) + '</span>'
                    + (t.recurrence ? '<span class="task-recurrence" title="' + (t.recurrence === 'daily' ? 'Ежедневно' : t.recurrence === 'weekly' ? 'Еженедельно' : 'Ежемесячно') + '">↻</span>' : '')
                    + (dlText ? '<span class="task-deadline ' + dlClass + '">' + dlText + '</span>' : '')
                    + '</div>'
                    + descHtml
                    + '</div>'
                    + '<div class="task-actions">'
                    + '<button class="delete" onclick="event.stopPropagation();deleteTask(' + t.id + ')" aria-label="Удалить">×</button>'
                    + '</div>'
                    + '</div>';
            }
            var html = topLevel.map(function (t) {
                var s = renderOne(t, false);
                var subs = byParent[t.id] || [];
                for (var j = 0; j < subs.length; j++) s += renderOne(subs[j], true);
                return s;
            }).join('');
            list.innerHTML = html;
        }

        // ========== Фильтр (Активные / Выполненные / Все) ==========
        function setTaskFilter(filter, btn) {
            currentFilter = filter;
            var tabs = document.querySelectorAll('.tasks-filter-tabs button');
            for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
            btn.classList.add('active');
            // Фильтрация client-side: задачи уже загружены, просто перерендер
            renderTasks();
        }

        // Multi-device sync sessions переехал в _shared.js (createChatAgent
        // с userScoped:true автоматически синхронизирует через
        // /webhook/sessions-sync). Старый planner-meta workflow удалён —
        // sessions-sync универсальный для всех агентов.

        // ========== Импорт / экспорт в Excel ==========
        // Колонки: Название, Описание, Приоритет, Дедлайн, Статус.
        // Шапка обязательна — при импорте первая строка пропускается.
        var PRIO_RU = { high: 'Высокий', medium: 'Средний', low: 'Низкий' };
        var PRIO_RU2EN = { 'высокий': 'high', 'средний': 'medium', 'низкий': 'low',
                           'high': 'high', 'medium': 'medium', 'low': 'low' };
        var STATUS_RU = { active: 'Активная', completed: 'Выполненная' };
        var STATUS_RU2EN = { 'активная': 'active', 'выполненная': 'completed',
                              'active': 'active', 'completed': 'completed' };

        async function exportTasksXlsx() {
            if (!currentTasks.length) { alert('В этом списке нет задач для экспорта.'); return; }
            var headers = ['Название', 'Описание', 'Приоритет', 'Дедлайн', 'Статус'];
            var rows = currentTasks.map(function (t) {
                return [
                    t.title || '',
                    t.description || '',
                    PRIO_RU[t.priority] || 'Средний',
                    t.deadline || '',
                    STATUS_RU[t.status] || 'Активная'
                ];
            });
            try {
                var blob = await GigaChat.buildXlsxBlob(headers, rows, 'Задачи');
                var sid = getCurrentSessionId() || 'tasks';
                var fname = 'planner_' + sid + '_' + new Date().toISOString().slice(0,10) + '.xlsx';
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url; a.download = fname;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
            } catch (e) {
                console.error('Export error:', e);
                alert('Не удалось экспортировать: ' + e.message);
            }
        }

        async function importTasksXlsx(file) {
            if (!file) return;
            var sid = getCurrentSessionId();
            if (!sid) { alert('Сначала создайте или выберите список задач.'); return; }
            try {
                var parsed = await GigaChat.parseXlsxFile(file);
                // parseXlsxFile возвращает массив строк (массивов значений) или { rows: [...] }
                var rows = Array.isArray(parsed) ? parsed
                         : (parsed && Array.isArray(parsed.rows)) ? parsed.rows
                         : [];
                if (!rows.length) { alert('В файле нет данных.'); return; }
                // Первая строка — шапка, пропускаем
                var dataRows = rows.slice(1).filter(function (r) {
                    return Array.isArray(r) && String(r[0] || '').trim().length > 0;
                });
                if (!dataRows.length) { alert('В файле нет задач (после шапки).'); return; }
                if (dataRows.length > 200) {
                    if (!confirm('В файле ' + dataRows.length + ' задач. Импортировать все?')) return;
                }
                var created = 0, failed = 0;
                for (var i = 0; i < dataRows.length; i++) {
                    var r = dataRows[i];
                    var title = String(r[0] || '').trim().slice(0, 500);
                    if (!title) { failed++; continue; }
                    var description = String(r[1] || '').trim().slice(0, 5000);
                    var prioStr = String(r[2] || '').trim().toLowerCase();
                    var priority = PRIO_RU2EN[prioStr] || 'medium';
                    var deadline = String(r[3] || '').trim();
                    if (!/^\d{4}-\d{2}-\d{2}$/.test(deadline)) deadline = '';
                    var data = await plannerApi({
                        action: 'create', session_id: sid,
                        title: title, description: description,
                        priority: priority, deadline: deadline || null
                    });
                    if (data && data.response === 'ok') created++;
                    else failed++;
                }
                alert('Импортировано: ' + created + (failed ? ', не удалось: ' + failed : ''));
                await loadTasks();
            } catch (e) {
                console.error('Import error:', e);
                alert('Не удалось импортировать: ' + e.message);
            }
        }

        // ========== Drag & Drop сортировка задач ==========
        // Делегирование на #tasks-list — handlers ставятся один раз,
        // работают для всех task-item даже при перерендере.
        function initTasksDnD() {
            var list = document.getElementById('tasks-list');
            if (!list || list._dndInit) return;
            list._dndInit = true;
            var dragSrcId = null;
            function clearIndicators() {
                var arr = list.querySelectorAll('.task-item.drop-above, .task-item.drop-below');
                for (var i = 0; i < arr.length; i++) arr[i].classList.remove('drop-above', 'drop-below');
            }
            list.addEventListener('dragstart', function (e) {
                var item = e.target.closest('.task-item');
                if (!item) return;
                dragSrcId = parseInt(item.dataset.id, 10);
                item.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                try { e.dataTransfer.setData('text/plain', String(dragSrcId)); } catch (_) {}
            });
            list.addEventListener('dragover', function (e) {
                var item = e.target.closest('.task-item');
                if (!item || parseInt(item.dataset.id, 10) === dragSrcId) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                clearIndicators();
                var rect = item.getBoundingClientRect();
                var before = (e.clientY - rect.top) < rect.height / 2;
                item.classList.add(before ? 'drop-above' : 'drop-below');
            });
            list.addEventListener('drop', function (e) {
                e.preventDefault();
                var item = e.target.closest('.task-item');
                if (!item || dragSrcId === null) return;
                var dstId = parseInt(item.dataset.id, 10);
                if (dstId === dragSrcId) { clearIndicators(); return; }
                var before = item.classList.contains('drop-above');
                clearIndicators();
                reorderTask(dragSrcId, dstId, before);
                dragSrcId = null;
            });
            list.addEventListener('dragend', function (e) {
                var item = e.target.closest('.task-item');
                if (item) item.classList.remove('dragging');
                clearIndicators();
                dragSrcId = null;
            });
        }
        async function reorderTask(srcId, dstId, before) {
            var srcIdx = currentTasks.findIndex(function (t) { return t.id === srcId; });
            var dstIdx = currentTasks.findIndex(function (t) { return t.id === dstId; });
            if (srcIdx < 0 || dstIdx < 0) return;
            var moved = currentTasks.splice(srcIdx, 1)[0];
            var insertAt = dstIdx;
            if (srcIdx < dstIdx) insertAt--;
            if (!before) insertAt++;
            // Новый sort_order = среднее между соседями (gap-based, без массового update)
            var prev = insertAt > 0 ? currentTasks[insertAt - 1] : null;
            var next = insertAt < currentTasks.length ? currentTasks[insertAt] : null;
            var newOrder;
            if (prev && next) newOrder = Math.floor((prev.sort_order + next.sort_order) / 2);
            else if (prev) newOrder = (prev.sort_order || 0) + 10;
            else if (next) newOrder = (next.sort_order || 0) - 10;
            else newOrder = 0;
            moved.sort_order = newOrder;
            currentTasks.splice(insertAt, 0, moved);
            renderTasks();
            var sid = getCurrentSessionId();
            if (!sid) return;
            try {
                await plannerApi({ action: 'update', session_id: sid, id: srcId, sort_order: newOrder });
            } catch (e) { /* при ошибке перезагрузим */ await loadTasks(); }
        }

        // ========== Поиск по задачам (фильтр текущего списка) ==========
        function onTasksSearchInput() {
            var inp = document.getElementById('tasksSearch');
            var clearBtn = document.getElementById('tasksSearchClear');
            tasksSearchQuery = (inp.value || '').trim().toLowerCase();
            if (clearBtn) clearBtn.classList.toggle('show', tasksSearchQuery.length > 0);
            renderTasks();
        }
        function clearTasksSearch() {
            var inp = document.getElementById('tasksSearch');
            var clearBtn = document.getElementById('tasksSearchClear');
            if (inp) inp.value = '';
            tasksSearchQuery = '';
            if (clearBtn) clearBtn.classList.remove('show');
            renderTasks();
            if (inp) inp.focus();
        }

        // ========== Модалка добавления / редактирования ==========
        // ========== Кастомный dropdown для приоритета ==========
        // Native <select> нельзя стилизовать полностью (popup и option рендерит
        // браузер/ОС — отсюда был синий highlight и острые углы). Свой widget
        // на div'ах даёт полный контроль над поведением и внешним видом.
        function initPrioritySelect() {
            var sel = document.getElementById('taskPriority');
            if (!sel || sel._initialized) return;
            sel._initialized = true;
            var trigger = sel.querySelector('.gc-select-trigger');
            var menu = sel.querySelector('.gc-select-menu');
            var label = sel.querySelector('.gc-select-label');

            function setOpen(open) {
                sel.classList.toggle('open', open);
                sel.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!sel.classList.contains('open'));
            });
            // Закрытие по клику вне
            document.addEventListener('click', function (e) {
                if (!sel.contains(e.target)) setOpen(false);
            });
            // Закрытие по Escape (обрабатывается в общем listener'е модалки тоже,
            // но здесь для случая когда dropdown открыт без модалки)
            sel.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && sel.classList.contains('open')) {
                    setOpen(false); e.stopPropagation();
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    setOpen(!sel.classList.contains('open'));
                }
            });
            // Выбор опции
            menu.querySelectorAll('li').forEach(function (li) {
                li.addEventListener('click', function (e) {
                    e.stopPropagation();
                    setPriorityValue(li.getAttribute('data-value'));
                    setOpen(false);
                });
            });
        }

        function getPriorityValue() {
            var sel = document.getElementById('taskPriority');
            return sel ? (sel.getAttribute('data-value') || 'medium') : 'medium';
        }

        function setPriorityValue(value) {
            var sel = document.getElementById('taskPriority');
            if (!sel) return;
            var menu = sel.querySelector('.gc-select-menu');
            var label = sel.querySelector('.gc-select-label');
            var target = menu.querySelector('li[data-value="' + value + '"]');
            if (!target) return;
            menu.querySelectorAll('li').forEach(function (x) { x.classList.remove('selected'); });
            target.classList.add('selected');
            sel.setAttribute('data-value', value);
            label.textContent = target.textContent;
        }

        // ========== Кастомный datepicker ==========
        // Нативный <input type="date"> открывает OS-уровневый popup с месяцами
        // (синие квадраты, OS-zависимый рендер). Свой widget на div'ах даёт
        // полный контроль: hover/focus в accent, скруглённые ячейки, тёмная/
        // светлая тема, кнопки «Очистить» и «Сегодня». Внутреннее значение
        // хранится как YYYY-MM-DD в data-value (тот же формат что был у input).
        var MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                         'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

        function todayYMD() {
            var d = new Date();
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }
        function formatYMDDisplay(ymd) {
            if (!ymd) return null;
            var p = ymd.split('-');
            return p[2] + '.' + p[1] + '.' + p[0];
        }
        function parseYMD(ymd) {
            var p = ymd.split('-');
            return { y: parseInt(p[0], 10), m: parseInt(p[1], 10) - 1, d: parseInt(p[2], 10) };
        }

        function initDatepicker() {
            var dp = document.getElementById('taskDeadline');
            if (!dp || dp._initialized) return;
            dp._initialized = true;

            var trigger = dp.querySelector('.gc-datepicker-trigger');
            var popup = dp.querySelector('.gc-datepicker-popup');
            var title = popup.querySelector('.gc-datepicker-title');
            var grid = popup.querySelector('.gc-datepicker-grid');
            var label = dp.querySelector('.gc-datepicker-label');

            var viewYear, viewMonth; // текущий просматриваемый месяц

            function setOpen(open) {
                dp.classList.toggle('open', open);
                dp.setAttribute('aria-expanded', open ? 'true' : 'false');
                if (open) {
                    // Точка отсчёта: если есть выбранная дата — её месяц; иначе сегодня.
                    var selected = dp.getAttribute('data-value');
                    var ref = selected ? parseYMD(selected) : (function () {
                        var d = new Date();
                        return { y: d.getFullYear(), m: d.getMonth(), d: d.getDate() };
                    })();
                    viewYear = ref.y;
                    viewMonth = ref.m;
                    render();
                }
            }

            function setValue(ymd) {
                dp.setAttribute('data-value', ymd || '');
                if (ymd) {
                    label.textContent = formatYMDDisplay(ymd);
                    label.classList.remove('placeholder');
                } else {
                    label.textContent = 'дд.мм.гггг';
                    label.classList.add('placeholder');
                }
            }
            dp._setValue = setValue;

            function render() {
                var todayStr = todayYMD();
                var selectedStr = dp.getAttribute('data-value') || '';

                title.textContent = MONTHS_RU[viewMonth] + ' ' + viewYear;

                // Первый день месяца, сдвинутый чтобы Пн=0
                var firstJs = new Date(viewYear, viewMonth, 1).getDay(); // 0=вс
                var firstMon = (firstJs + 6) % 7; // 0=пн
                var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
                var prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

                var cells = [];
                // Хвост предыдущего месяца
                for (var i = firstMon - 1; i >= 0; i--) {
                    var pm = viewMonth === 0 ? { y: viewYear - 1, m: 11 } : { y: viewYear, m: viewMonth - 1 };
                    cells.push({ day: prevMonthDays - i, other: true, y: pm.y, m: pm.m });
                }
                // Текущий месяц
                for (var d = 1; d <= daysInMonth; d++) {
                    cells.push({ day: d, other: false, y: viewYear, m: viewMonth });
                }
                // Голова следующего месяца — добиваем до 6 строк (42 ячейки)
                var nextDay = 1;
                while (cells.length < 42) {
                    var nm = viewMonth === 11 ? { y: viewYear + 1, m: 0 } : { y: viewYear, m: viewMonth + 1 };
                    cells.push({ day: nextDay++, other: true, y: nm.y, m: nm.m });
                }

                grid.innerHTML = cells.map(function (c) {
                    var ymd = c.y + '-' + String(c.m + 1).padStart(2, '0') + '-' + String(c.day).padStart(2, '0');
                    var cls = 'gc-datepicker-day';
                    if (c.other) cls += ' other-month';
                    if (ymd === todayStr && ymd !== selectedStr) cls += ' today';
                    if (ymd === selectedStr) cls += ' selected';
                    return '<button type="button" class="' + cls + '" data-date="' + ymd + '">' + c.day + '</button>';
                }).join('');

                Array.prototype.forEach.call(grid.querySelectorAll('.gc-datepicker-day'), function (btn) {
                    btn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        setValue(btn.getAttribute('data-date'));
                        setOpen(false);
                    });
                });
            }

            // Click handlers
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!dp.classList.contains('open'));
            });
            popup.addEventListener('click', function (e) {
                // Внутренние клики не должны закрывать popup (только закрытие по выбору даты или actions)
                e.stopPropagation();
            });
            // Полностью контролируемый hover через JS: :hover в CSS убран,
            // вместо него класс .is-hovering ставится/снимается событиями
            // mouseenter/mouseleave. Это устраняет залипание подсветки
            // которое наблюдалось после клика мышью (некоторые браузеры
            // держат :hover state даже после mouseout, особенно если фокус
            // остаётся на кнопке). Плюс tabindex=-1 убирает кнопки из таб-
            // ордера — фокус на них не садится никаким образом.
            // mousedown.preventDefault() сохранён как двойная защита от focus.
            Array.prototype.forEach.call(popup.querySelectorAll('button'), function (btn) {
                btn.setAttribute('tabindex', '-1');
                btn.addEventListener('mousedown', function (e) { e.preventDefault(); });
                btn.addEventListener('mouseenter', function () { btn.classList.add('is-hovering'); });
                btn.addEventListener('mouseleave', function () { btn.classList.remove('is-hovering'); });
                // Двойная защита от залипания: после клика принудительно
                // снимаем класс (если mouseleave не отработал по какой-то причине).
                btn.addEventListener('click', function () {
                    btn.classList.remove('is-hovering');
                    btn.blur();
                });
            });
            popup.querySelector('.gc-datepicker-prev').addEventListener('click', function (e) {
                // blur — иначе после клика мышью фокус застревает на кнопке,
                // и она выглядит «активной» пока юзер не наведёт на что-то ещё.
                e.currentTarget.blur();
                viewMonth--;
                if (viewMonth < 0) { viewMonth = 11; viewYear--; }
                render();
            });
            popup.querySelector('.gc-datepicker-next').addEventListener('click', function (e) {
                e.currentTarget.blur();
                viewMonth++;
                if (viewMonth > 11) { viewMonth = 0; viewYear++; }
                render();
            });
            popup.querySelector('.gc-datepicker-today').addEventListener('click', function () {
                var t = todayYMD();
                setValue(t);
                setOpen(false);
            });
            popup.querySelector('.gc-datepicker-clear').addEventListener('click', function () {
                // «Закрыть» — просто закрывает popup, не очищает значение.
                // Если юзер выбрал дату и хочет передумать — клик вне или Esc
                // тоже работают. Если хочет удалить ранее выбранную дату —
                // редактирует задачу и оставляет поле пустым (или удаляет задачу).
                setOpen(false);
            });
            // Outside click → close
            document.addEventListener('click', function (e) {
                if (!dp.contains(e.target)) setOpen(false);
            });
            // Keyboard: Escape закрывает, Enter/Space на triggerе открывает
            dp.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && dp.classList.contains('open')) {
                    setOpen(false); e.stopPropagation();
                } else if ((e.key === 'Enter' || e.key === ' ') && e.target === dp) {
                    e.preventDefault();
                    setOpen(!dp.classList.contains('open'));
                }
            });
        }

        function getDeadlineValue() {
            var dp = document.getElementById('taskDeadline');
            return dp ? (dp.getAttribute('data-value') || '') : '';
        }
        function setDeadlineValue(v) {
            var dp = document.getElementById('taskDeadline');
            if (!dp) return;
            if (dp._setValue) dp._setValue(v || null);
            else dp.setAttribute('data-value', v || '');
        }

        function openTaskModal(taskId) {
            var sid = getCurrentSessionId();
            if (!sid) {
                alert('Сначала создайте или выберите список задач');
                return;
            }
            // Фиксируем session_id на момент открытия модалки — если юзер
            // переключит активную сессию в сайдбаре пока модалка открыта,
            // задача всё равно попадёт в правильный список.
            editingSessionId = sid;
            initPrioritySelect();
            initDatepicker();
            editingTaskId = (typeof taskId === 'number') ? taskId : null;
            // Заполняем select «Подзадача (опционально)» top-level задачами
            // того же списка. Если редактируем — исключаем текущую (не может

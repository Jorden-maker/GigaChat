<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GigaChat Планировщик</title>
    <script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
    <style>
        :root {
            --bg-primary: #1f1f1e;
            --bg-secondary: #1f1e1c;
            --bg-sidebar: #262626;
            --bg-input: #2c2c2a;
            --bg-user: rgba(212, 165, 116, 0.10);
            --bg-bot: #1f1e1c;
            --border: #363432;
            --text-primary: #d4d4d4;
            --text-secondary: #8a8a8a;
            --text-muted: #5a5a5a;
            --accent: #d4a574;
            --accent-hover: #c08a5a;
            --code-bg: #1f1e1c;
            --code-text: #d4d4d4;
            --sidebar-width: 270px;
            --priority-high: #d97757;
            --priority-medium: #b8895d;
            --priority-low: #7a7a78;
        }
        :root[data-theme="light"] {
            --bg-primary: #fdfdfc;
            --bg-secondary: #f3f1ec;
            --bg-sidebar: #fdfdfc;
            --bg-input: #fffffe;
            --bg-user: rgba(184, 137, 93, 0.12);
            --bg-bot: #f3f1ec;
            --border: #e3dfd5;
            --text-primary: #1f1f1e;
            --text-secondary: #6b6b68;
            --text-muted: #a8a59f;
            --accent: #b8895d;
            --accent-hover: #a0764d;
            --code-bg: #f3f1ec;
            --code-text: #1f1f1e;
            --priority-high: #c05a3a;
            --priority-medium: #a0764d;
            --priority-low: #8a8a87;
        }

        /* === Панель задач ============================================ */
        #tasks-panel {
            flex-shrink: 0; padding: 16px 40px 8px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
            max-height: 50vh; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #tasks-panel::-webkit-scrollbar { width: 5px; }
        #tasks-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .tasks-toolbar {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .tasks-toolbar h2 {
            margin: 0; font-size: 15px; font-weight: 600;
            color: var(--text-primary); letter-spacing: 0.5px;
        }
        .tasks-filter-tabs { display: flex; gap: 4px; }
        .tasks-filter-tabs button {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
            padding: 4px 12px; border-radius: 14px; font-size: 12px;
            font-family: inherit;
            transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }
        .tasks-filter-tabs button:hover { color: var(--accent); border-color: var(--accent); }
        .tasks-filter-tabs button.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .tasks-filter-tabs button.active:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .tasks-add-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent); color: #fff; border: none;
            cursor: pointer; padding: 6px 14px 6px 11px; border-radius: 8px;
            font-size: 13px; font-weight: 500; font-family: inherit;
            margin-left: auto;
            transition: background 0.18s ease, transform 0.1s ease;
        }
        .tasks-add-btn svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 2.2; stroke-linecap: round;
            flex-shrink: 0;
        }
        .tasks-add-btn:hover { background: var(--accent-hover); }
        .tasks-add-btn:active { transform: scale(0.97); }

        #tasks-list { display: flex; flex-direction: column; gap: 6px; }
        .tasks-empty {
            padding: 20px; text-align: center; color: var(--text-muted);
            font-size: 13px; font-style: italic;
        }
        .task-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 12px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 8px;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
        }
        .task-item:hover { border-color: var(--accent); background: var(--bg-input); }
        .task-item.completed { opacity: 0.5; }
        .task-item.completed:hover { opacity: 0.75; }
        .task-item.completed .task-title { text-decoration: line-through; }
        .task-item.overdue { border-left: 3px solid var(--priority-high); }
        .task-item.removing { opacity: 0; transform: translateX(20px); }

        .task-check {
            margin-top: 2px; flex-shrink: 0;
            width: 18px; height: 18px;
            border: 1.5px solid var(--text-secondary); border-radius: 4px;
            cursor: pointer; background: transparent;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-check:hover { border-color: var(--accent); transform: scale(1.08); }
        .task-check:active { transform: scale(0.92); }
        .task-check.checked { background: var(--accent); border-color: var(--accent); }
        .task-check.checked::after {
            content: ''; width: 5px; height: 9px;
            border: solid #fff; border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .task-body { flex: 1; min-width: 0; cursor: pointer; transition: opacity 0.18s ease; }
        .task-body:hover .task-title { color: var(--accent); }
        .task-title { transition: color 0.18s ease; }
        .task-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .task-title {
            font-size: 14px; color: var(--text-primary); font-weight: 500;
            word-break: break-word;
        }
        .task-priority {
            font-size: 11px; padding: 1px 8px; border-radius: 8px;
            text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
            color: #fff; flex-shrink: 0;
        }
        .task-priority.high { background: var(--priority-high); }
        .task-priority.medium { background: var(--priority-medium); }
        .task-priority.low { background: var(--priority-low); }
        .task-deadline {
            font-size: 11px; color: var(--text-secondary); flex-shrink: 0;
        }
        .task-deadline.overdue { color: var(--priority-high); font-weight: 600; }
        .task-description {
            font-size: 12px; color: var(--text-secondary); margin-top: 4px;
            word-break: break-word;
        }
        .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s ease; }
        .task-item:hover .task-actions { opacity: 1; }
        .task-actions button {
            background: none; border: none; padding: 4px 8px;
            color: var(--text-muted); cursor: pointer; border-radius: 4px;
            font-size: 16px; line-height: 1;
            transition: color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-actions button:hover { color: var(--text-primary); background: var(--bg-input); }
        .task-actions button:active { transform: scale(0.92); }
        .task-actions .delete:hover { color: var(--priority-high); background: rgba(217, 119, 87, 0.1); }

        /* === Чат для AI === */
        #chat { flex: 1; overflow-y: auto; padding: 20px 40px 45px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; min-height: 200px; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .session-item.active { color: var(--accent); border: 1px solid var(--border); }
        .bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
        #input-area { display: flex; gap: 8px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif;
            font-size: 15px; outline: none;
            transition: border-color 0.2s;
            resize: none; min-height: 36px; max-height: 130px; line-height: 1.5;
            overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: var(--text-muted); }

        /* === Modal для добавления/редактирования задачи === */
        .task-modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(3px);
            display: none; align-items: center; justify-content: center;
            animation: plannerFadeIn 0.2s ease;
        }
        .task-modal-overlay.show { display: flex; }
        @keyframes plannerFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes plannerModalSlide {
            from { transform: translateY(16px) scale(0.96); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .task-modal {
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: 12px; width: min(520px, 92vw); max-height: 90vh;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: plannerModalSlide 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .task-modal::-webkit-scrollbar { width: 4px; }
        .task-modal::-webkit-scrollbar-track { background: transparent; }
        .task-modal::-webkit-scrollbar-thumb {
            background: var(--border); border-radius: 10px;
            transition: background 0.18s ease;
        }
        .task-modal::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
        .task-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
        }
        .task-modal-header h3 { margin: 0; font-size: 16px; color: var(--text-primary); }
        .task-modal-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 24px; line-height: 1; cursor: pointer; padding: 2px 8px;
            border-radius: 6px;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .task-modal-close:hover { color: var(--text-primary); background: var(--bg-input); }
        .task-modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
        .task-modal-body label {
            display: flex; flex-direction: column; gap: 5px;
            font-size: 12px; color: var(--text-secondary); font-weight: 500;
        }
        .task-modal-body input[type="text"],
        .task-modal-body input[type="date"],
        .task-modal-body textarea {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px; color: var(--text-primary);
            font-family: inherit; font-size: 14px; outline: none;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .task-modal-body input:hover,
        .task-modal-body textarea:hover { border-color: var(--text-secondary); }
        .task-modal-body input:focus,
        .task-modal-body textarea:focus { border-color: var(--accent); background: var(--bg-secondary); }
        .task-modal-body textarea { resize: vertical; min-height: 60px; max-height: 200px; }

        /* Кастомный dropdown (не native select — у того нельзя стилизовать
           popup и option-теги полностью, отсюда был синий highlight и острые
           углы). Свой widget на div'ах — полный контроль над всем рендером. */
        .gc-select {
            position: relative; cursor: pointer; user-select: none;
            outline: none;
        }
        .gc-select-trigger {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px;
            font-size: 14px; color: var(--text-primary);
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-select:hover .gc-select-trigger,
        .gc-select:focus .gc-select-trigger { border-color: var(--text-secondary); }
        .gc-select.open .gc-select-trigger {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .gc-select-arrow {
            width: 7px; height: 7px;
            border-right: 1.5px solid var(--text-secondary);
            border-bottom: 1.5px solid var(--text-secondary);
            transform: translateY(-2px) rotate(45deg);
            transition: transform 0.2s ease, border-color 0.18s ease;
            flex-shrink: 0;
        }
        .gc-select.open .gc-select-arrow {
            transform: translateY(2px) rotate(-135deg);
            border-color: var(--accent);
        }
        .gc-select-menu {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            margin: 0; padding: 4px; list-style: none;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 200;
            opacity: 0; visibility: hidden; transform: translateY(-4px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }
        .gc-select.open .gc-select-menu {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .gc-select-menu li {
            padding: 8px 12px; border-radius: 5px;
            font-size: 14px; color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .gc-select-menu li:hover { background: var(--bg-secondary); color: var(--accent); }
        .gc-select-menu li.selected {
            color: var(--accent); font-weight: 500;
            background: var(--bg-secondary);
        }

        /* Кастомный date picker — полностью свой widget вместо input type=date.
           Нативный picker (popup ОС с месяцами) рендерится не CSS и не
           перекрашивается. Свой widget на div'ах = полный контроль над
           UI calendar'а, hover'ами, скруглениями, темой. */
        .gc-datepicker {
            position: relative; cursor: pointer; user-select: none; outline: none;
        }
        .gc-datepicker-trigger {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px;
            font-size: 14px;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-datepicker:hover .gc-datepicker-trigger,
        .gc-datepicker:focus .gc-datepicker-trigger { border-color: var(--text-secondary); }
        .gc-datepicker.open .gc-datepicker-trigger {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .gc-datepicker-label { color: var(--text-primary); }
        .gc-datepicker-label.placeholder { color: var(--text-muted); }
        .gc-datepicker-icon {
            color: var(--text-secondary); flex-shrink: 0; line-height: 0;
            transition: color 0.18s ease;
        }
        .gc-datepicker-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; }
        .gc-datepicker.open .gc-datepicker-icon { color: var(--accent); }

        .gc-datepicker-popup {
            /* Открываемся ВВЕРХ — date input последнее поле модалки, popup
               вниз перекрывал бы footer-кнопки. bottom:100% позиционирует
               попап над триггером, без visible-отступа снизу. */
            position: absolute; bottom: calc(100% + 4px); left: 0;
            width: 280px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 250;
            opacity: 0; visibility: hidden; transform: translateY(6px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }
        .gc-datepicker.open .gc-datepicker-popup {
            opacity: 1; visibility: visible; transform: translateY(0);
        }

        .gc-datepicker-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 4px; margin-bottom: 8px;
        }
        .gc-datepicker-title {
            flex: 1; text-align: center;
            font-size: 13px; font-weight: 600; color: var(--text-primary);
            text-transform: capitalize;
        }
        .gc-datepicker-nav {
            background: none; border: none; cursor: pointer;
            width: 28px; height: 28px; border-radius: 6px;
            color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            transition: color 0.18s ease, background 0.18s ease, transform 0.1s ease;
            font-family: inherit; outline: none;
        }
        /* Подсветка ТОЛЬКО на hover. :focus-visible вариант убран, поскольку
           для клавиатурной навигации мы добавили на саму datepicker-секцию
           tabindex, и табать внутрь календаря необычно. JS делает
           mousedown.preventDefault() — фокус вообще не садится на кнопку
           при клике мышью, состояние «активная» не залипает. */
        .gc-datepicker-nav:hover {
            color: var(--accent); background: var(--bg-secondary);
        }
        .gc-datepicker-nav:active { transform: scale(0.92); }
        .gc-datepicker-nav svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .gc-datepicker-weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px; margin-bottom: 4px;
        }
        .gc-datepicker-weekdays span {
            font-size: 10px; color: var(--text-muted);
            text-align: center; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 4px 0;
        }

        .gc-datepicker-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .gc-datepicker-day {
            background: none; border: none; cursor: pointer;
            height: 32px; border-radius: 6px;
            font-size: 12px; font-family: inherit;
            color: var(--text-primary);
            transition: background 0.15s ease, color 0.15s ease;
        }
        .gc-datepicker-day:hover { background: var(--bg-secondary); color: var(--accent); }
        .gc-datepicker-day.other-month { color: var(--text-muted); }
        .gc-datepicker-day.today {
            color: var(--accent); font-weight: 600;
            box-shadow: inset 0 0 0 1px var(--accent);
        }
        .gc-datepicker-day.selected {
            background: var(--accent); color: #fff; font-weight: 600;
            box-shadow: none;
        }
        .gc-datepicker-day.selected:hover { background: var(--accent-hover); color: #fff; }

        .gc-datepicker-actions {
            display: flex; justify-content: space-between; gap: 8px;
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .gc-datepicker-actions button {
            background: none; border: none; cursor: pointer;
            font-size: 12px; padding: 4px 8px; border-radius: 5px;
            color: var(--text-secondary); font-family: inherit;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .gc-datepicker-actions button:hover { color: var(--accent); background: var(--bg-secondary); }
        .gc-datepicker-actions .gc-datepicker-clear:hover { color: var(--priority-high); background: rgba(217,119,87,0.1); }
        .task-modal-footer {
            display: flex; justify-content: flex-end; gap: 8px;
            padding: 14px 22px; border-top: 1px solid var(--border);
        }
        .task-modal-footer button {
            padding: 8px 18px; border-radius: 6px; font-size: 13px;
            font-family: inherit; cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary);
            transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-modal-footer button:hover { color: var(--text-primary); border-color: var(--text-secondary); }
        .task-modal-footer button:active { transform: scale(0.97); }
        .task-modal-footer .primary {
            background: var(--accent); color: #fff; border-color: var(--accent);
            font-weight: 600;
        }
        .task-modal-footer .primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
        .task-modal-error {
            padding: 8px 22px 0; color: var(--priority-high); font-size: 12px; min-height: 14px;
        }
    </style>
    <script src="_config.js"></script>
    <link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
    <script src="lib/highlight.min.js"></script>
    <script src="_shared.js"></script>
    <script src="lib/jszip.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div class="sidebar-header"><h3>Списки задач</h3></div>
        <div class="sidebar-add">
            <button onclick="createNewSession()">Новый список</button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left">
                <h1>GigaChat Планировщик</h1>
            </div>
            <div class="header-right">
                <div class="status" id="statusBar">
                    <span class="dot checking" id="statusDot"></span>
                    <span id="statusText">проверка...</span>
                </div>
                <button class="btn-export" onclick="exportChat()">Экспорт</button>
            </div>
        </header>

        <!-- Панель задач: чек-лист с фильтром и кнопкой добавить -->
        <div id="tasks-panel">
            <div class="tasks-toolbar">
                <h2>Задачи</h2>
                <div class="tasks-filter-tabs">
                    <button class="active" data-filter="active" onclick="setTaskFilter('active', this)">Активные</button>
                    <button data-filter="completed" onclick="setTaskFilter('completed', this)">Выполненные</button>
                    <button data-filter="all" onclick="setTaskFilter('all', this)">Все</button>
                </div>
                <button class="tasks-add-btn" onclick="openTaskModal()" aria-label="Добавить задачу">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Задача
                </button>
            </div>
            <div id="tasks-list">
                <div class="tasks-empty"></div>
            </div>
        </div>

        <!-- AI-чат для запросов -->
        <div id="chat">
            <div class="empty-chat">Создайте список задач, потом спланируйте их с помощью GigaChat</div>
        </div>
        <div class="bottom-area">
            <!-- gc-attach-chips и attachBtn — обязательные slots для setupAttachment
                 из _shared.js (createChatAgent его вызывает безусловно). В планировщике
                 файлы пока не используются, поэтому контейнеры скрыты — скрепка не
                 создаётся в visible-зоне. Без этих элементов createChatAgent падал
                 с appendChild на null, ломая весь setup (resize, ping, status). -->
            <div class="gc-attach-chips" id="attachChips" style="display:none"></div>
            <div id="input-area" class="gc-input-row">
                <div class="gc-input-wrap">
                    <textarea id="msg" rows="1" placeholder="Спланируйте задачи..." disabled></textarea>
                    <button id="send" class="gc-send-icon" onclick="sendMsg()" disabled aria-label="Отправить">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                    </button>
                </div>
                <span id="attachBtn" style="display:none"></span>
            </div>
        </div>
    </div>

    <!-- Модалка добавления/редактирования задачи -->
    <div class="task-modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
        <div class="task-modal">
            <div class="task-modal-header">
                <h3 id="taskModalTitle">Новая задача</h3>
                <button class="task-modal-close" onclick="closeTaskModal()" aria-label="Закрыть">&times;</button>
            </div>
            <div class="task-modal-body">
                <label>Название
                    <input type="text" id="taskTitle" maxlength="500" placeholder="Что нужно сделать?">
                </label>
                <label>Описание
                    <textarea id="taskDescription" maxlength="5000" placeholder="Детали..."></textarea>
                </label>
                <label>Приоритет
                    <div class="gc-select" id="taskPriority" data-value="medium" tabindex="0" role="combobox" aria-haspopup="listbox" aria-expanded="false">
                        <div class="gc-select-trigger">
                            <span class="gc-select-label">Средний</span>
                            <span class="gc-select-arrow" aria-hidden="true"></span>
                        </div>
                        <ul class="gc-select-menu" role="listbox">
                            <li role="option" data-value="low">Низкий</li>
                            <li role="option" data-value="medium" class="selected">Средний</li>
                            <li role="option" data-value="high">Высокий</li>
                        </ul>
                    </div>
                </label>
                <label>Срок выполнения
                    <div class="gc-datepicker" id="taskDeadline" data-value="" tabindex="0" role="button" aria-haspopup="dialog" aria-expanded="false">
                        <div class="gc-datepicker-trigger">
                            <span class="gc-datepicker-label placeholder">дд.мм.гггг</span>
                            <span class="gc-datepicker-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg></span>
                        </div>
                        <div class="gc-datepicker-popup" role="dialog">
                            <div class="gc-datepicker-header">
                                <button type="button" class="gc-datepicker-nav gc-datepicker-prev" aria-label="Предыдущий месяц"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
                                <div class="gc-datepicker-title"></div>
                                <button type="button" class="gc-datepicker-nav gc-datepicker-next" aria-label="Следующий месяц"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
                            </div>
                            <div class="gc-datepicker-weekdays">
                                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
                            </div>
                            <div class="gc-datepicker-grid"></div>
                            <div class="gc-datepicker-actions">
                                <button type="button" class="gc-datepicker-clear">Закрыть</button>
                                <button type="button" class="gc-datepicker-today">Сегодня</button>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            <div class="task-modal-error" id="taskModalError"></div>
            <div class="task-modal-footer">
                <button onclick="closeTaskModal()">Отмена</button>
                <button class="primary" onclick="saveTask()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        var escapeHtml = GigaChat.escapeHtml;
        var PLANNER_URL = GigaChat.webhookUrl('planner');

        // ========== Локальное состояние панели задач ==========
        var currentFilter = 'active';
        var currentTasks = [];           // последний загруженный массив с сервера
        var currentSessionId = null;     // обновляется через onSwitchExtra
        var editingTaskId = null;        // null = создание новой, число = редактирование

        // ========== HTTP-обёртка для всех CRUD-операций ==========
        async function plannerApi(payload) {
            try {
                var res = await GigaChat.fetchWithRetry(PLANNER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify(payload)
                }, { timeout: 30000, retries: 1 });
                if (!res.ok) throw new Error('Сервер вернул ' + res.status);
                return await res.json();
            } catch (e) {
                console.error('Planner API error:', e);
                return { response: 'error', error: e.message };
            }
        }

        // ========== Загрузка задач для текущей сессии ==========
        async function loadTasks() {
            if (!currentSessionId) {
                document.getElementById('tasks-list').innerHTML = '<div class="tasks-empty"></div>';
                return;
            }
            var data = await plannerApi({
                action: 'list', session_id: currentSessionId, filter: currentFilter
            });
            currentTasks = (data && Array.isArray(data.tasks)) ? data.tasks : [];
            renderTasks();
        }

        function renderTasks() {
            var list = document.getElementById('tasks-list');
            if (currentTasks.length === 0) {
                var msg = currentFilter === 'active' ? 'Активных задач нет. Добавьте первую.'
                        : currentFilter === 'completed' ? 'Ничего пока не выполнено.'
                        : 'Список пуст.';
                list.innerHTML = '<div class="tasks-empty">' + msg + '</div>';
                return;
            }
            var today = new Date().toISOString().slice(0, 10);
            var html = currentTasks.map(function (t) {
                var isCompleted = t.status === 'completed';
                var isOverdue = !isCompleted && t.deadline && t.deadline < today;
                var dlClass = isOverdue ? 'overdue' : '';
                var dlText = t.deadline ? ('до ' + t.deadline) : '';
                var prioRu = t.priority === 'high' ? 'Высокий'
                           : t.priority === 'low' ? 'Низкий' : 'Средний';
                var descHtml = t.description ? '<div class="task-description">' + escapeHtml(t.description) + '</div>' : '';
                return '<div class="task-item ' + (isCompleted ? 'completed ' : '') + (isOverdue ? 'overdue' : '') + '" data-id="' + t.id + '">'
                    + '<div class="task-check ' + (isCompleted ? 'checked' : '') + '" onclick="toggleTask(' + t.id + ')" role="checkbox" aria-checked="' + isCompleted + '"></div>'
                    + '<div class="task-body" onclick="openTaskModal(' + t.id + ')">'
                    + '<div class="task-title-row">'
                    + '<span class="task-priority ' + t.priority + '">' + prioRu + '</span>'
                    + '<span class="task-title">' + escapeHtml(t.title) + '</span>'
                    + (dlText ? '<span class="task-deadline ' + dlClass + '">' + dlText + '</span>' : '')
                    + '</div>'
                    + descHtml
                    + '</div>'
                    + '<div class="task-actions">'
                    + '<button class="delete" onclick="event.stopPropagation();deleteTask(' + t.id + ')" aria-label="Удалить">×</button>'
                    + '</div>'
                    + '</div>';
            }).join('');
            list.innerHTML = html;
        }

        // ========== Фильтр (Активные / Выполненные / Все) ==========
        function setTaskFilter(filter, btn) {
            currentFilter = filter;
            var tabs = document.querySelectorAll('.tasks-filter-tabs button');
            for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
            btn.classList.add('active');
            loadTasks();
        }

        // ========== Модалка добавления / редактирования ==========
        // ========== Кастомный dropdown для приоритета ==========
        // Native <select> нельзя стилизовать полностью (popup и option рендерит
        // браузер/ОС — отсюда был синий highlight и острые углы). Свой widget
        // на div'ах даёт полный контроль над поведением и внешним видом.
        function initPrioritySelect() {
            var sel = document.getElementById('taskPriority');
            if (!sel || sel._initialized) return;
            sel._initialized = true;
            var trigger = sel.querySelector('.gc-select-trigger');
            var menu = sel.querySelector('.gc-select-menu');
            var label = sel.querySelector('.gc-select-label');

            function setOpen(open) {
                sel.classList.toggle('open', open);
                sel.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!sel.classList.contains('open'));
            });
            // Закрытие по клику вне
            document.addEventListener('click', function (e) {
                if (!sel.contains(e.target)) setOpen(false);
            });
            // Закрытие по Escape (обрабатывается в общем listener'е модалки тоже,
            // но здесь для случая когда dropdown открыт без модалки)
            sel.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && sel.classList.contains('open')) {
                    setOpen(false); e.stopPropagation();
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    setOpen(!sel.classList.contains('open'));
                }
            });
            // Выбор опции
            menu.querySelectorAll('li').forEach(function (li) {
                li.addEventListener('click', function (e) {
                    e.stopPropagation();
                    setPriorityValue(li.getAttribute('data-value'));
                    setOpen(false);
                });
            });
        }

        function getPriorityValue() {
            var sel = document.getElementById('taskPriority');
            return sel ? (sel.getAttribute('data-value') || 'medium') : 'medium';
        }

        function setPriorityValue(value) {
            var sel = document.getElementById('taskPriority');
            if (!sel) return;
            var menu = sel.querySelector('.gc-select-menu');
            var label = sel.querySelector('.gc-select-label');
            var target = menu.querySelector('li[data-value="' + value + '"]');
            if (!target) return;
            menu.querySelectorAll('li').forEach(function (x) { x.classList.remove('selected'); });
            target.classList.add('selected');
            sel.setAttribute('data-value', value);
            label.textContent = target.textContent;
        }

        // ========== Кастомный datepicker ==========
        // Нативный <input type="date"> открывает OS-уровневый popup с месяцами
        // (синие квадраты, OS-zависимый рендер). Свой widget на div'ах даёт
        // полный контроль: hover/focus в accent, скруглённые ячейки, тёмная/
        // светлая тема, кнопки «Очистить» и «Сегодня». Внутреннее значение
        // хранится как YYYY-MM-DD в data-value (тот же формат что был у input).
        var MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                         'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

        function todayYMD() {
            var d = new Date();
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }
        function formatYMDDisplay(ymd) {
            if (!ymd) return null;
            var p = ymd.split('-');
            return p[2] + '.' + p[1] + '.' + p[0];
        }
        function parseYMD(ymd) {
            var p = ymd.split('-');
            return { y: parseInt(p[0], 10), m: parseInt(p[1], 10) - 1, d: parseInt(p[2], 10) };
        }

        function initDatepicker() {
            var dp = document.getElementById('taskDeadline');
            if (!dp || dp._initialized) return;
            dp._initialized = true;

            var trigger = dp.querySelector('.gc-datepicker-trigger');
            var popup = dp.querySelector('.gc-datepicker-popup');
            var title = popup.querySelector('.gc-datepicker-title');
            var grid = popup.querySelector('.gc-datepicker-grid');
            var label = dp.querySelector('.gc-datepicker-label');

            var viewYear, viewMonth; // текущий просматриваемый месяц

            function setOpen(open) {
                dp.classList.toggle('open', open);
                dp.setAttribute('aria-expanded', open ? 'true' : 'false');
                if (open) {
                    // Точка отсчёта: если есть выбранная дата — её месяц; иначе сегодня.
                    var selected = dp.getAttribute('data-value');
                    var ref = selected ? parseYMD(selected) : (function () {
                        var d = new Date();
                        return { y: d.getFullYear(), m: d.getMonth(), d: d.getDate() };
                    })();
                    viewYear = ref.y;
                    viewMonth = ref.m;
                    render();
                }
            }

            function setValue(ymd) {
                dp.setAttribute('data-value', ymd || '');
                if (ymd) {
                    label.textContent = formatYMDDisplay(ymd);
                    label.classList.remove('placeholder');
                } else {
                    label.textContent = 'дд.мм.гггг';
                    label.classList.add('placeholder');
                }
            }
            dp._setValue = setValue;

            function render() {
                var todayStr = todayYMD();
                var selectedStr = dp.getAttribute('data-value') || '';

                title.textContent = MONTHS_RU[viewMonth] + ' ' + viewYear;

                // Первый день месяца, сдвинутый чтобы Пн=0
                var firstJs = new Date(viewYear, viewMonth, 1).getDay(); // 0=вс
                var firstMon = (firstJs + 6) % 7; // 0=пн
                var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
                var prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

                var cells = [];
                // Хвост предыдущего месяца
                for (var i = firstMon - 1; i >= 0; i--) {
                    var pm = viewMonth === 0 ? { y: viewYear - 1, m: 11 } : { y: viewYear, m: viewMonth - 1 };
                    cells.push({ day: prevMonthDays - i, other: true, y: pm.y, m: pm.m });
                }
                // Текущий месяц
                for (var d = 1; d <= daysInMonth; d++) {
                    cells.push({ day: d, other: false, y: viewYear, m: viewMonth });
                }
                // Голова следующего месяца — добиваем до 6 строк (42 ячейки)
                var nextDay = 1;
                while (cells.length < 42) {
                    var nm = viewMonth === 11 ? { y: viewYear + 1, m: 0 } : { y: viewYear, m: viewMonth + 1 };
                    cells.push({ day: nextDay++, other: true, y: nm.y, m: nm.m });
                }

                grid.innerHTML = cells.map(function (c) {
                    var ymd = c.y + '-' + String(c.m + 1).padStart(2, '0') + '-' + String(c.day).padStart(2, '0');
                    var cls = 'gc-datepicker-day';
                    if (c.other) cls += ' other-month';
                    if (ymd === todayStr && ymd !== selectedStr) cls += ' today';
                    if (ymd === selectedStr) cls += ' selected';
                    return '<button type="button" class="' + cls + '" data-date="' + ymd + '">' + c.day + '</button>';
                }).join('');

                Array.prototype.forEach.call(grid.querySelectorAll('.gc-datepicker-day'), function (btn) {
                    btn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        setValue(btn.getAttribute('data-date'));
                        setOpen(false);
                    });
                });
            }

            // Click handlers
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!dp.classList.contains('open'));
            });
            popup.addEventListener('click', function (e) {
                // Внутренние клики не должны закрывать popup (только закрытие по выбору даты или actions)
                e.stopPropagation();
            });
            // КРИТИЧНО: на ВСЕ кнопки внутри popup'а вешаем mousedown.preventDefault().
            // Без этого после клика мышью фокус «приклеивается» к кнопке, и в
            // некоторых браузерах :focus-visible матчится → кнопка остаётся
            // подсвеченной как hover. preventDefault на mousedown блокирует
            // нативный focus-on-click, при этом click-event срабатывает.
            Array.prototype.forEach.call(popup.querySelectorAll('button'), function (btn) {
                btn.addEventListener('mousedown', function (e) { e.preventDefault(); });
            });
            popup.querySelector('.gc-datepicker-prev').addEventListener('click', function (e) {
                // blur — иначе после клика мышью фокус застревает на кнопке,
                // и она выглядит «активной» пока юзер не наведёт на что-то ещё.
                e.currentTarget.blur();
                viewMonth--;
                if (viewMonth < 0) { viewMonth = 11; viewYear--; }
                render();
            });
            popup.querySelector('.gc-datepicker-next').addEventListener('click', function (e) {
                e.currentTarget.blur();
                viewMonth++;
                if (viewMonth > 11) { viewMonth = 0; viewYear++; }
                render();
            });
            popup.querySelector('.gc-datepicker-today').addEventListener('click', function () {
                var t = todayYMD();
                setValue(t);
                setOpen(false);
            });
            popup.querySelector('.gc-datepicker-clear').addEventListener('click', function () {
                // «Закрыть» — просто закрывает popup, не очищает значение.
                // Если юзер выбрал дату и хочет передумать — клик вне или Esc
                // тоже работают. Если хочет удалить ранее выбранную дату —
                // редактирует задачу и оставляет поле пустым (или удаляет задачу).
                setOpen(false);
            });
            // Outside click → close
            document.addEventListener('click', function (e) {
                if (!dp.contains(e.target)) setOpen(false);
            });
            // Keyboard: Escape закрывает, Enter/Space на triggerе открывает
            dp.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && dp.classList.contains('open')) {
                    setOpen(false); e.stopPropagation();
                } else if ((e.key === 'Enter' || e.key === ' ') && e.target === dp) {
                    e.preventDefault();
                    setOpen(!dp.classList.contains('open'));
                }
            });
        }

        function getDeadlineValue() {
            var dp = document.getElementById('taskDeadline');
            return dp ? (dp.getAttribute('data-value') || '') : '';
        }
        function setDeadlineValue(v) {
            var dp = document.getElementById('taskDeadline');
            if (!dp) return;
            if (dp._setValue) dp._setValue(v || null);
            else dp.setAttribute('data-value', v || '');
        }

        function openTaskModal(taskId) {
            if (!currentSessionId) {
                alert('Сначала создайте или выберите список задач');
                return;
            }
            initPrioritySelect();
            initDatepicker();
            editingTaskId = (typeof taskId === 'number') ? taskId : null;
            var title = document.getElementById('taskModalTitle');
            var inTitle = document.getElementById('taskTitle');
            var inDesc = document.getElementById('taskDescription');
            var err = document.getElementById('taskModalError');

            if (editingTaskId !== null) {
                title.textContent = 'Изменить задачу';
                var t = currentTasks.find(function (x) { return x.id === editingTaskId; });
                if (!t) { closeTaskModal(); return; }
                inTitle.value = t.title || '';
                inDesc.value = t.description || '';
                setPriorityValue(t.priority || 'medium');
                setDeadlineValue(t.deadline || null);
            } else {
                title.textContent = 'Новая задача';
                inTitle.value = '';
                inDesc.value = '';
                setPriorityValue('medium');
                setDeadlineValue(null);
            }
            err.textContent = '';
            document.getElementById('taskModal').classList.add('show');
            setTimeout(function () { inTitle.focus(); }, 50);
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('show');
            editingTaskId = null;
        }

        async function saveTask() {
            var err = document.getElementById('taskModalError');
            var title = document.getElementById('taskTitle').value.trim();
            if (!title) { err.textContent = 'Название не может быть пустым'; return; }
            if (title.length > 500) { err.textContent = 'Название слишком длинное (>500)'; return; }

            var payload = {
                session_id: currentSessionId,
                title: title,
                description: document.getElementById('taskDescription').value.trim(),
                priority: getPriorityValue(),
                deadline: getDeadlineValue() || null
            };

            if (editingTaskId !== null) {
                payload.action = 'update';
                payload.id = editingTaskId;
            } else {
                payload.action = 'create';
            }

            var data = await plannerApi(payload);
            if (data.response === 'ok') {
                closeTaskModal();
                await loadTasks();
            } else {
                err.textContent = data.error || 'Не удалось сохранить';
            }
        }

        // ========== Отметить выполненной / вернуть в активные ==========
        async function toggleTask(taskId) {
            var t = currentTasks.find(function (x) { return x.id === taskId; });
            if (!t) return;
            var newStatus = t.status === 'completed' ? 'active' : 'completed';
            // Оптимистично обновляем UI до ответа сервера
            t.status = newStatus;
            renderTasks();
            var data = await plannerApi({
                action: 'update', session_id: currentSessionId,
                id: taskId, status: newStatus
            });
            if (data.response !== 'ok') {
                t.status = newStatus === 'completed' ? 'active' : 'completed';
                renderTasks();
                alert('Не удалось обновить статус: ' + (data.error || 'неизвестная ошибка'));
            } else {
                // Перезагружаем чтобы синхронизироваться с серверным фильтром
                await loadTasks();
            }
        }

        // ========== Удаление ==========
        async function deleteTask(taskId) {
            if (!confirm('Удалить задачу безвозвратно?')) return;
            var data = await plannerApi({
                action: 'delete', session_id: currentSessionId, id: taskId
            });
            if (data.response === 'ok') {
                await loadTasks();
            } else {
                alert('Не удалось удалить: ' + (data.error || 'неизвестная ошибка'));
            }
        }

        // ========== Закрытие модалки по Escape ==========
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeTaskModal();
        });

        // ========== Рендер bot-сообщений: простой текст + переносы ==========
        function formatBotMessage(msg) {
            if (!msg.content) return '';
            var html = String(msg.content)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        // ========== Инициализация чат-агента ==========
        GigaChat.createChatAgent({
            webhookPath: 'planner',
            historyPath: 'history',
            prefix: 'planner',
            idPrefix: 'planner_',
            namePrefix: 'List-',
            inflightLabel: 'Думаю',
            exportAgentName: 'GigaChat Планировщик',
            emptyChatHtml: '<div class="empty-chat">Создайте список задач, потом спланируйте их с помощью GigaChat</div>',
            historyErrorHtml: '<div class="empty-chat">Не удалось загрузить историю AI-запросов.</div>',
            historyLoadingHtml: '<div class="empty-chat">Загружаю...</div>',
            formatBotHtml: formatBotMessage,
            parseBotMessage: function (data) {
                return {
                    role: 'assistant',
                    content: data.response || 'Пустой ответ',
                    extras: {}
                };
            },
            onSwitchExtra: function (sid) {
                currentSessionId = sid;
                loadTasks();
            }
        });

        // Safety-net: explicit init resize. createChatAgent уже вызывает его внутри,
        // но если по какой-то причине setup прервался — функция идемпотентна
        // (внутренняя защита от двойной инициализации).
        if (GigaChat.initSidebarResize) {
            GigaChat.initSidebarResize({
                sidebar: document.querySelector('.sidebar'),
                initialWidth: 270, minWidth: 220, maxWidth: 440
            });
        }
    </script>
</body>
</html>

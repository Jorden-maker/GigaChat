<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GigaChat Планировщик</title>
    <script>(function(){var t='light';try{t=localStorage.getItem('giga_theme')||'light'}catch(e){}document.documentElement.setAttribute('data-theme',t);/* Сразу красим фон до загрузки CSS — иначе белая вспышка при переходе с дашборда */document.documentElement.style.background=t==='dark'?'#1f1f1e':'#fdfdfc';document.documentElement.classList.add('gc-pending-auth');})();</script>
    <style>
        :root {
            --bg-primary: #1f1f1e;
            --bg-secondary: #1f1e1c;
            --bg-sidebar: #262626;
            --bg-input: #2c2c2a;
            --bg-user: rgba(212, 165, 116, 0.10);
            --bg-bot: #1f1e1c;
            --border: #363432;
            --text-primary: #d4d4d4;
            --text-secondary: #8a8a8a;
            --text-muted: #5a5a5a;
            --accent: #d4a574;
            --accent-hover: #c08a5a;
            --code-bg: #1f1e1c;
            --code-text: #d4d4d4;
            --sidebar-width: 270px;
            --priority-high: #d97757;
            --priority-medium: #b8895d;
            --priority-low: #7a7a78;
        }
        :root[data-theme="light"] {
            --bg-primary: #fdfdfc;
            --bg-secondary: #f3f1ec;
            --bg-sidebar: #fdfdfc;
            --bg-input: #fffffe;
            --bg-user: rgba(184, 137, 93, 0.12);
            --bg-bot: #f3f1ec;
            --border: #e3dfd5;
            --text-primary: #1f1f1e;
            --text-secondary: #6b6b68;
            --text-muted: #a8a59f;
            --accent: #b8895d;
            --accent-hover: #a0764d;
            --code-bg: #f3f1ec;
            --code-text: #1f1f1e;
            --priority-high: #c05a3a;
            --priority-medium: #a0764d;
            --priority-low: #8a8a87;
        }

        /* === Панель задач ============================================ */
        #tasks-panel {
            flex-shrink: 0; padding: 16px 40px 8px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
            max-height: 50vh; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #tasks-panel::-webkit-scrollbar { width: 5px; }
        #tasks-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .tasks-toolbar {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .tasks-toolbar h2 {
            margin: 0; font-size: 15px; font-weight: 600;
            color: var(--text-primary); letter-spacing: 0.5px;
        }
        .tasks-filter-tabs { display: flex; gap: 4px; }
        .tasks-filter-tabs button {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
            padding: 4px 12px; border-radius: 14px; font-size: 12px;
            font-family: inherit;
            transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }
        .tasks-filter-tabs button:hover { color: var(--accent); border-color: var(--accent); }
        .tasks-filter-tabs button.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .tasks-filter-tabs button.active:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .tasks-add-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent); color: #fff; border: none;
            cursor: pointer; padding: 6px 14px 6px 11px; border-radius: 8px;
            font-size: 13px; font-weight: 500; font-family: inherit;
            margin-left: auto;
            transition: background 0.18s ease, transform 0.1s ease;
        }
        .tasks-add-btn svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 2.2; stroke-linecap: round;
            flex-shrink: 0;
        }
        .tasks-add-btn:hover { background: var(--accent-hover); }
        .tasks-add-btn:active { transform: scale(0.97); }

        #tasks-list { display: flex; flex-direction: column; gap: 6px; }
        .tasks-empty {
            padding: 20px; text-align: center; color: var(--text-muted);
            font-size: 13px; font-style: italic;
        }
        .task-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 12px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 8px;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
        }
        .task-item:hover { border-color: var(--accent); background: var(--bg-input); }
        .task-item.completed { opacity: 0.5; }
        .task-item.completed:hover { opacity: 0.75; }
        .task-item.completed .task-title { text-decoration: line-through; }
        .task-item.overdue { border-left: 3px solid var(--priority-high); }
        .task-item.removing { opacity: 0; transform: translateX(20px); }

        .task-check {
            margin-top: 2px; flex-shrink: 0;
            width: 18px; height: 18px;
            border: 1.5px solid var(--text-secondary); border-radius: 4px;
            cursor: pointer; background: transparent;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-check:hover { border-color: var(--accent); transform: scale(1.08); }
        .task-check:active { transform: scale(0.92); }
        .task-check.checked { background: var(--accent); border-color: var(--accent); }
        .task-check.checked::after {
            content: ''; width: 5px; height: 9px;
            border: solid #fff; border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .task-body { flex: 1; min-width: 0; cursor: pointer; transition: opacity 0.18s ease; }
        .task-body:hover .task-title { color: var(--accent); }
        .task-title { transition: color 0.18s ease; }
        .task-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .task-title {
            font-size: 14px; color: var(--text-primary); font-weight: 500;
            word-break: break-word;
        }
        .task-priority {
            font-size: 11px; padding: 1px 8px; border-radius: 8px;
            text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
            color: #fff; flex-shrink: 0;
        }
        .task-priority.high { background: var(--priority-high); }
        .task-priority.medium { background: var(--priority-medium); }
        .task-priority.low { background: var(--priority-low); }
        .task-deadline {
            font-size: 11px; color: var(--text-secondary); flex-shrink: 0;
        }
        .task-deadline.overdue { color: var(--priority-high); font-weight: 600; }
        .task-description {
            font-size: 12px; color: var(--text-secondary); margin-top: 4px;
            word-break: break-word;
        }
        .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s ease; }
        .task-item:hover .task-actions { opacity: 1; }
        .task-actions button {
            background: none; border: none; padding: 4px 8px;
            color: var(--text-muted); cursor: pointer; border-radius: 4px;
            font-size: 16px; line-height: 1;
            transition: color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-actions button:hover { color: var(--text-primary); background: var(--bg-input); }
        .task-actions button:active { transform: scale(0.92); }
        .task-actions .delete:hover { color: var(--priority-high); background: rgba(217, 119, 87, 0.1); }

        /* === Чат для AI === */
        #chat { flex: 1; overflow-y: auto; padding: 20px 40px 45px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; min-height: 200px; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .session-item.active { color: var(--accent); border: 1px solid var(--border); }
        .bottom-area { padding: 0 20px 20px; flex-shrink: 0; }
        #input-area { display: flex; gap: 8px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif;
            font-size: 15px; outline: none;
            transition: border-color 0.2s;
            resize: none; min-height: 36px; max-height: 130px; line-height: 1.5;
            overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: var(--text-muted); }

        /* === Modal для добавления/редактирования задачи === */
        .task-modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(3px);
            display: none; align-items: center; justify-content: center;
            animation: plannerFadeIn 0.2s ease;
        }
        .task-modal-overlay.show { display: flex; }
        @keyframes plannerFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes plannerModalSlide {
            from { transform: translateY(16px) scale(0.96); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .task-modal {
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: 12px; width: min(520px, 92vw); max-height: 90vh;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: plannerModalSlide 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .task-modal::-webkit-scrollbar { width: 4px; }
        .task-modal::-webkit-scrollbar-track { background: transparent; }
        .task-modal::-webkit-scrollbar-thumb {
            background: var(--border); border-radius: 10px;
            transition: background 0.18s ease;
        }
        .task-modal::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
        .task-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
        }
        .task-modal-header h3 { margin: 0; font-size: 16px; color: var(--text-primary); }
        .task-modal-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 24px; line-height: 1; cursor: pointer; padding: 2px 8px;
            border-radius: 6px;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .task-modal-close:hover { color: var(--text-primary); background: var(--bg-input); }
        .task-modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
        .task-modal-body label {
            display: flex; flex-direction: column; gap: 5px;
            font-size: 12px; color: var(--text-secondary); font-weight: 500;
        }
        .task-modal-body input[type="text"],
        .task-modal-body input[type="date"],
        .task-modal-body textarea {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px; color: var(--text-primary);
            font-family: inherit; font-size: 14px; outline: none;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .task-modal-body input:hover,
        .task-modal-body textarea:hover { border-color: var(--text-secondary); }
        .task-modal-body input:focus,
        .task-modal-body textarea:focus { border-color: var(--accent); background: var(--bg-secondary); }
        .task-modal-body textarea { resize: vertical; min-height: 60px; max-height: 200px; }

        /* Кастомный dropdown (не native select — у того нельзя стилизовать
           popup и option-теги полностью, отсюда был синий highlight и острые
           углы). Свой widget на div'ах — полный контроль над всем рендером. */
        .gc-select {
            position: relative; cursor: pointer; user-select: none;
            outline: none;
        }
        .gc-select-trigger {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px;
            font-size: 14px; color: var(--text-primary);
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-select:hover .gc-select-trigger,
        .gc-select:focus .gc-select-trigger { border-color: var(--text-secondary); }
        .gc-select.open .gc-select-trigger {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .gc-select-arrow {
            width: 7px; height: 7px;
            border-right: 1.5px solid var(--text-secondary);
            border-bottom: 1.5px solid var(--text-secondary);
            transform: translateY(-2px) rotate(45deg);
            transition: transform 0.2s ease, border-color 0.18s ease;
            flex-shrink: 0;
        }
        .gc-select.open .gc-select-arrow {
            transform: translateY(2px) rotate(-135deg);
            border-color: var(--accent);
        }
        .gc-select-menu {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            margin: 0; padding: 4px; list-style: none;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 200;
            opacity: 0; visibility: hidden; transform: translateY(-4px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }
        .gc-select.open .gc-select-menu {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .gc-select-menu li {
            padding: 8px 12px; border-radius: 5px;
            font-size: 14px; color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .gc-select-menu li:hover { background: var(--bg-secondary); color: var(--accent); }
        .gc-select-menu li.selected {
            color: var(--accent); font-weight: 500;
            background: var(--bg-secondary);
        }

        /* Кастомный date picker — полностью свой widget вместо input type=date.
           Нативный picker (popup ОС с месяцами) рендерится не CSS и не
           перекрашивается. Свой widget на div'ах = полный контроль над
           UI calendar'а, hover'ами, скруглениями, темой. */
        .gc-datepicker {
            position: relative; cursor: pointer; user-select: none; outline: none;
        }
        .gc-datepicker-trigger {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px;
            font-size: 14px;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-datepicker:hover .gc-datepicker-trigger,
        .gc-datepicker:focus .gc-datepicker-trigger { border-color: var(--text-secondary); }
        .gc-datepicker.open .gc-datepicker-trigger {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .gc-datepicker-label { color: var(--text-primary); }
        .gc-datepicker-label.placeholder { color: var(--text-muted); }
        .gc-datepicker-icon {
            color: var(--text-secondary); flex-shrink: 0; line-height: 0;
            transition: color 0.18s ease;
        }
        .gc-datepicker-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; }
        .gc-datepicker.open .gc-datepicker-icon { color: var(--accent); }

        .gc-datepicker-popup {
            /* Открываемся ВВЕРХ — date input последнее поле модалки, popup
               вниз перекрывал бы footer-кнопки. bottom:100% позиционирует
               попап над триггером, без visible-отступа снизу. */
            position: absolute; bottom: calc(100% + 4px); left: 0;
            width: 280px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 250;
            opacity: 0; visibility: hidden; transform: translateY(6px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }
        .gc-datepicker.open .gc-datepicker-popup {
            opacity: 1; visibility: visible; transform: translateY(0);
        }

        .gc-datepicker-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 4px; margin-bottom: 8px;
        }
        .gc-datepicker-title {
            flex: 1; text-align: center;
            font-size: 13px; font-weight: 600; color: var(--text-primary);
            text-transform: capitalize;
        }
        .gc-datepicker-nav {
            background: none !important; border: none; cursor: pointer;
            width: 28px; height: 28px; border-radius: 6px;
            color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            transition: color 0.18s ease, background 0.18s ease, transform 0.1s ease;
            font-family: inherit; outline: none;
        }
        /* CSS :hover в некоторых браузерах залипает после клика (видимо
           что-то с pointer capture / mouse capture). Перешли на JS-контролируемый
           hover: класс .is-hovering ставится через mouseenter, снимается через
           mouseleave. !important на background выше нужен чтобы default-state
           точно сбрасывался поверх любых унаследованных правил. */
        .gc-datepicker-nav.is-hovering {
            color: var(--accent); background: var(--bg-secondary) !important;
        }
        .gc-datepicker-nav:active { transform: scale(0.92); }
        .gc-datepicker-nav svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .gc-datepicker-weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px; margin-bottom: 4px;
        }
        .gc-datepicker-weekdays span {
            font-size: 10px; color: var(--text-muted);
            text-align: center; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 4px 0;
        }

        .gc-datepicker-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .gc-datepicker-day {
            background: none; border: none; cursor: pointer;
            height: 32px; border-radius: 6px;
            font-size: 12px; font-family: inherit;
            color: var(--text-primary);
            transition: background 0.15s ease, color 0.15s ease;
        }
        .gc-datepicker-day:hover { background: var(--bg-secondary); color: var(--accent); }
        .gc-datepicker-day.other-month { color: var(--text-muted); }
        .gc-datepicker-day.today {
            color: var(--accent); font-weight: 600;
            box-shadow: inset 0 0 0 1px var(--accent);
        }
        .gc-datepicker-day.selected {
            background: var(--accent); color: #fff; font-weight: 600;
            box-shadow: none;
        }
        .gc-datepicker-day.selected:hover { background: var(--accent-hover); color: #fff; }

        .gc-datepicker-actions {
            display: flex; justify-content: space-between; gap: 8px;
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .gc-datepicker-actions button {
            background: none; border: none; cursor: pointer;
            font-size: 12px; padding: 4px 8px; border-radius: 5px;
            color: var(--text-secondary); font-family: inherit;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .gc-datepicker-actions button:hover { color: var(--accent); background: var(--bg-secondary); }
        .gc-datepicker-actions .gc-datepicker-clear:hover { color: var(--priority-high); background: rgba(217,119,87,0.1); }
        .task-modal-footer {
            display: flex; justify-content: flex-end; gap: 8px;
            padding: 14px 22px; border-top: 1px solid var(--border);
        }
        .task-modal-footer button {
            padding: 8px 18px; border-radius: 6px; font-size: 13px;
            font-family: inherit; cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary);
            transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }
        .task-modal-footer button:hover { color: var(--text-primary); border-color: var(--text-secondary); }
        .task-modal-footer button:active { transform: scale(0.97); }
        .task-modal-footer .primary {
            background: var(--accent); color: #fff; border-color: var(--accent);
            font-weight: 600;
        }
        .task-modal-footer .primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
        .task-modal-error {
            padding: 8px 22px 0; color: var(--priority-high); font-size: 12px; min-height: 14px;
        }

        /* === Login-screen (первый заход юзера) =============================
           Полноэкранный экран в фирменной теме (var(--bg-primary)). НЕ overlay
           поверх UI — UI за ним не должен просвечивать (раньше через rgba
           viден был сайдбар+main). Body получает overflow:hidden когда
           login активен, чтобы не было scrollbar справа от страницы. */
        .gc-login-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            /* Flex: горизонтальное центрирование (без конфликта с
               animation transform на модалке), верх прибит к padding-top.
               align-items: flex-start → при изменении высоты растёт только вниз. */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 18vh;
            opacity: 1;
            transition: opacity 0.25s ease;
            overflow-y: auto;
        }
        /* Плавное растворение overlay после успешного login/register */
        .gc-login-overlay.gc-fade-out { opacity: 0; pointer-events: none; }
        /* Пока auth не разрешён (bootstrap проверяет токен или показывает
           login) — основной UI скрыт. Это убирает FOUC «проскока чужого UI»
           между login-формой и планировщиком. Класс ставится в inline-скрипте
           в <head> ДО парсинга CSS, снимается в hideLoginScreen(). */
        html.gc-pending-auth .sidebar,
        html.gc-pending-auth .main { display: none !important; }
        /* Кнопка «Назад к GigaChat» в левом верхнем углу login-экрана.
           Визуально идентична .btn-home из _shared.js (та же — в сайдбаре после
           логина), но fixed-позиционирование, чтобы поверх overlay'а. */
        .gc-login-back {
            position: fixed; top: 10px; left: 14px; z-index: 1001;
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-secondary);
            text-decoration: none;
            transition: background .15s, color .15s, border-color .15s;
        }
        .gc-login-back:hover {
            background: var(--bg-input); color: var(--text-primary);
            border-color: var(--text-muted);
        }
        .gc-login-back svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        /* Кнопка переключения тем в правом верхнем углу login-экрана.
           Не полагаемся на #gc-theme-toggle из _shared.js — он может быть
           перекрыт overlay в некоторых браузерах. Своя кнопка — надёжнее.
           Стиль скопирован один-в-один из _shared.js (круглая, иконка-луна/солнце). */
        .gc-login-theme {
            position: fixed; top: 10px; right: 14px; z-index: 1001;
            /* Размер 32×32 — точно как у #gc-theme-toggle из _shared.js
               (на других страницах). Не путать с .btn-home (36×36). */
            width: 32px; height: 32px;
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 50%; color: var(--text-secondary);
            cursor: pointer; padding: 0; font-family: inherit;
            transition: background .15s, color .15s, border-color .15s, transform .15s;
        }
        .gc-login-theme:hover {
            background: var(--bg-hover, rgba(255,255,255,0.06));
            color: var(--accent); border-color: var(--accent);
            transform: rotate(15deg);
        }
        .gc-login-theme svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        .gc-login-modal {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 12px;
            width: min(420px, 92vw);
            flex-shrink: 0;
            /* Flex column: footer прижат margin-top:auto к нижней границе.
               При transition height (рост вниз) footer движется синхронно
               с нижней границей модалки — не «прыгает». */
            display: flex; flex-direction: column;
            overflow: hidden;  /* контент не торчит за границу при swap */
            transition: height 0.18s ease;
            animation: plannerModalSlide 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* Footer всегда прижат к низу модалки */
        .gc-login-footer { margin-top: auto; }
        /* Плавный fade форм при смене вкладки — fade-out до движения рамки,
           fade-in после. 90мс — быстро, но различимо. */
        .gc-login-form { transition: opacity 0.09s ease; }
        .gc-login-header {
            padding: 22px 24px 6px; font-size: 18px; font-weight: 600;
            color: var(--text-primary); text-align: center;
            letter-spacing: 0.5px;
        }
        .gc-login-subtitle {
            padding: 0 24px 18px; font-size: 13px; color: var(--text-secondary);
            line-height: 1.5; text-align: center;
        }
        /* Tabs Вход / Регистрация */
        .gc-login-tabs {
            display: flex; gap: 4px;
            margin: 4px 22px 14px;
            padding: 4px;
            background: var(--bg-input); border-radius: 8px;
        }
        .gc-login-tab {
            flex: 1; background: transparent; border: none; cursor: pointer;
            padding: 8px 12px; border-radius: 6px;
            font-family: inherit; font-size: 13px; font-weight: 500;
            color: var(--text-secondary);
            transition: background 0.18s ease, color 0.18s ease;
        }
        .gc-login-tab:hover { color: var(--text-primary); }
        .gc-login-tab.active {
            background: var(--accent); color: #fff;
        }

        /* Формы вход/регистрация */
        .gc-login-form { padding: 0 22px; display: flex; flex-direction: column; gap: 10px; }
        .gc-login-form.hidden { display: none; }
        .gc-login-form label {
            display: flex; flex-direction: column; gap: 4px;
            font-size: 12px; color: var(--text-secondary); font-weight: 500;
        }
        .gc-login-form input[type="text"],
        .gc-login-form input[type="password"] {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 10px 14px; color: var(--text-primary);
            font-family: inherit; font-size: 14px; outline: none;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-login-form input:hover { border-color: var(--text-secondary); }
        .gc-login-form input:focus {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        /* Кастомный чекбокс: нативный input спрятан, визуальный квадрат —
           span.gc-checkbox-box. Hover/click только на самом квадрате —
           клик по тексту не переключает чекбокс. Tab→input, Space→toggle. */
        .gc-checkbox-row {
            display: flex !important; flex-direction: row !important;
            align-items: center; gap: 10px !important;
            user-select: none; padding: 2px 0;
            /* cursor на row НЕ ставим — кликабелен только сам box */
        }
        .gc-checkbox-row input[type="checkbox"] {
            /* Прячем нативный visually-hidden способом — фокус сохраняется,
               accessibility tree не теряет элемент. Pointer-events:none —
               клик по box идёт в JS (см. onclick на span) или native через Tab+Space. */
            position: absolute; opacity: 0; pointer-events: none;
            width: 1px; height: 1px; margin: -1px;
            clip: rect(0 0 0 0); clip-path: inset(50%);
            overflow: hidden; white-space: nowrap;
        }
        .gc-checkbox-box {
            flex-shrink: 0;
            width: 18px; height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            background: var(--bg-input);
            display: inline-flex; align-items: center; justify-content: center;
            position: relative;
            cursor: pointer;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        /* Подсветка только при наведении на сам квадрат */
        .gc-checkbox-box:hover {
            border-color: var(--accent);
        }
        .gc-checkbox-row input[type="checkbox"]:focus-visible + .gc-checkbox-box {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        .gc-checkbox-row input[type="checkbox"]:checked + .gc-checkbox-box {
            background: var(--accent);
            border-color: var(--accent);
        }
        .gc-checkbox-row input[type="checkbox"]:checked + .gc-checkbox-box::after {
            content: '';
            width: 5px; height: 9px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }
        .gc-checkbox-row .gc-checkbox-label {
            font-size: 14px; color: var(--text-primary); font-weight: 500;
            letter-spacing: 0.2px; line-height: 1;
            cursor: default;
        }
        .gc-login-error {
            min-height: 16px; font-size: 12px; color: var(--priority-high);
            text-align: center; margin-top: 4px;
        }
        /* Success-стейт (после регистрации): зелёный бэйдж с белой галочкой
           слева + текст справа. Заменяет error-стиль (красный) на 2 секунды,
           потом setLoginError('regError','') / clear возвращают обычный вид. */
        .gc-login-error.gc-success {
            display: flex; align-items: center; justify-content: center;
            gap: 8px;
            color: var(--text-primary); font-size: 13px;
        }
        .gc-success-badge {
            flex-shrink: 0;
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px;
            background: #4caf50; border-radius: 50%;
            position: relative;
        }
        /* Галочка внутри — тот же приём что в чекбоксе .gc-checkbox-box */
        .gc-success-badge::before {
            content: '';
            width: 5px; height: 9px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }
        .gc-login-footer {
            padding: 14px 22px 22px;
        }
        .gc-login-footer button {
            width: 100%; padding: 10px 18px; border-radius: 6px;
            background: var(--accent); color: #fff; border: none; cursor: pointer;
            font-family: inherit; font-size: 14px; font-weight: 600;
            transition: background 0.18s ease, transform 0.1s ease, opacity 0.18s ease;
        }
        .gc-login-footer button:hover { background: var(--accent-hover); }
        .gc-login-footer button:active { transform: scale(0.98); }
        .gc-login-footer button:disabled {
            opacity: 0.5; cursor: not-allowed;
        }

        /* Change-password модалка — отдельная overlay поверх основного UI */
        .gc-chgpwd-overlay {
            position: fixed; inset: 0; z-index: 800;
            background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(3px);
            display: none; align-items: center; justify-content: center;
        }
        .gc-chgpwd-overlay.show { display: flex; }
        .gc-chgpwd-modal {
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: 12px; width: min(420px, 92vw);
            /* Без тени в обоих темах. Модалка отделяется только border'ом
               и контрастом bg-primary vs backdrop overlay. */
            animation: plannerModalSlide 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .gc-chgpwd-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
            font-size: 15px; font-weight: 600; color: var(--text-primary);
        }
        .gc-chgpwd-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
        }
        .gc-chgpwd-close:hover { color: var(--text-primary); }
        .gc-chgpwd-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 10px; }
        .gc-chgpwd-body label {
            display: flex; flex-direction: column; gap: 4px;
            font-size: 12px; color: var(--text-secondary); font-weight: 500;
        }
        .gc-chgpwd-body input {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; padding: 9px 12px; color: var(--text-primary);
            font-family: inherit; font-size: 14px; outline: none;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-chgpwd-body input:focus { border-color: var(--accent); background: var(--bg-secondary); }
        .gc-chgpwd-error { padding: 0 22px; min-height: 14px; color: var(--priority-high); font-size: 12px; }
        .gc-chgpwd-footer {
            display: flex; justify-content: flex-end; gap: 8px;
            padding: 14px 22px 20px;
        }
        .gc-chgpwd-footer button {
            padding: 8px 18px; border-radius: 6px;
            font-family: inherit; font-size: 13px; cursor: pointer;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); transition: all 0.18s ease;
        }
        .gc-chgpwd-footer button:hover { color: var(--text-primary); }
        .gc-chgpwd-footer .primary {
            background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600;
        }
        .gc-chgpwd-footer .primary:hover { opacity: 0.85; color: #fff; }

        /* === User menu в шапке ============================================
           «Иванов ▼» с dropdown'ом «Сменить имя / Выйти». Стиль — как
           gc-select trigger из модалки задач, единая визуальная семья. */
        .gc-user-menu { position: relative; }
        .gc-user-menu-trigger {
            display: inline-flex; align-items: center; gap: 6px;
            background: transparent; border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 10px;
            color: var(--text-primary); font-family: inherit; font-size: 13px;
            cursor: pointer; outline: none;
            transition: border-color 0.18s ease, background 0.18s ease;
        }
        .gc-user-menu-trigger:hover { border-color: var(--text-secondary); }
        .gc-user-menu.open .gc-user-menu-trigger {
            border-color: var(--accent); background: var(--bg-secondary);
        }
        .gc-user-menu-arrow {
            width: 6px; height: 6px;
            border-right: 1.5px solid var(--text-secondary);
            border-bottom: 1.5px solid var(--text-secondary);
            transform: translateY(-2px) rotate(45deg);
            transition: transform 0.18s ease, border-color 0.18s ease;
        }
        .gc-user-menu.open .gc-user-menu-arrow {
            transform: translateY(2px) rotate(-135deg);
            border-color: var(--accent);
        }
        .gc-user-menu-dropdown {
            position: absolute; top: calc(100% + 4px); right: 0;
            min-width: 160px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; padding: 4px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 90;
            opacity: 0; visibility: hidden; transform: translateY(-4px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }
        .gc-user-menu.open .gc-user-menu-dropdown {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .gc-user-menu-dropdown button {
            display: block; width: 100%;
            background: none; border: none; cursor: pointer;
            padding: 8px 12px; border-radius: 5px;
            font-family: inherit; font-size: 13px;
            color: var(--text-primary); text-align: left;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .gc-user-menu-dropdown button:hover {
            background: var(--bg-secondary); color: var(--accent);
        }
    </style>
    <script src="_config.js"></script>
    <link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
    <script src="lib/highlight.min.js"></script>
    <script src="_shared.js"></script>
    <script src="lib/jszip.min.js"></script>
</head>
<body>
    <!-- Login-screen: показывается если в localStorage нет валидного planner_token
         либо verify-токена вернул auth_required. Tabs Вход/Регистрация. -->
    <div class="gc-login-overlay" id="loginOverlay" style="display:none">
        <!-- Кнопка возврата в дашборд (визуально как .btn-home в сайдбаре) -->
        <a class="gc-login-back" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <!-- Кнопка переключения тем (как #gc-theme-toggle на остальных страницах) -->
        <button class="gc-login-theme" id="loginThemeToggle" type="button" onclick="loginToggleTheme()" aria-label="Переключить тему"></button>
        <div class="gc-login-modal">
            <div class="gc-login-header">Планировщик</div>
            <div class="gc-login-tabs">
                <button class="gc-login-tab active" data-tab="login" onclick="switchLoginTab('login')">Вход</button>
                <button class="gc-login-tab" data-tab="register" onclick="switchLoginTab('register')">Регистрация</button>
            </div>

            <!-- Login form. data-next — id поля, на которое перейти при Enter.
                 Пустой data-next или его отсутствие = native submit.
                 title= намеренно НЕ ставим — юзер запретил все тултипы на login. -->
            <form class="gc-login-form" data-form="login" onsubmit="event.preventDefault(); submitLogin()">
                <label>Имя
                    <input type="text" id="loginUsername" maxlength="100" autocomplete="username"
                           placeholder="Иванов" data-next="loginPassword">
                </label>
                <label>Пароль
                    <input type="password" id="loginPassword" maxlength="200" autocomplete="current-password"
                           placeholder="••••••••" data-next="loginSubmitBtn">
                </label>
                <div class="gc-checkbox-row">
                    <input type="checkbox" id="loginRemember" checked>
                    <span class="gc-checkbox-box" aria-hidden="true" onclick="document.getElementById('loginRemember').click()"></span>
                    <span class="gc-checkbox-label">Запомнить меня</span>
                </div>
                <div class="gc-login-error" id="loginError"></div>
            </form>

            <!-- Register form -->
            <form class="gc-login-form hidden" data-form="register" onsubmit="event.preventDefault(); submitRegister()">
                <label>Имя
                    <input type="text" id="regUsername" maxlength="100" autocomplete="username"
                           placeholder="Иванов" data-next="regPassword">
                </label>
                <label>Пароль
                    <input type="password" id="regPassword" maxlength="200" autocomplete="new-password"
                           placeholder="не менее 6 символов" data-next="regPassword2">
                </label>
                <label>Подтвердите пароль
                    <input type="password" id="regPassword2" maxlength="200" autocomplete="new-password"
                           placeholder="ещё раз" data-next="loginSubmitBtn">
                </label>
                <div class="gc-login-error" id="regError"></div>
            </form>

            <div class="gc-login-footer">
                <button id="loginSubmitBtn" onclick="document.querySelector('.gc-login-form:not(.hidden)').requestSubmit()">Войти</button>
            </div>
        </div>
    </div>

    <!-- Change-password модалка — вызывается из user-menu после login -->
    <div class="gc-chgpwd-overlay" id="chgpwdOverlay" onclick="if(event.target===this)closeChgpwdModal()">
        <div class="gc-chgpwd-modal">
            <div class="gc-chgpwd-header">
                Сменить пароль
                <button class="gc-chgpwd-close" onclick="closeChgpwdModal()" aria-label="Закрыть">&times;</button>
            </div>
            <div class="gc-chgpwd-body">
                <label>Текущий пароль
                    <input type="password" id="chgpwdOld" autocomplete="current-password"
                           data-next="chgpwdNew">
                </label>
                <label>Новый пароль
                    <input type="password" id="chgpwdNew" autocomplete="new-password"
                           placeholder="не менее 6 символов" data-next="chgpwdNew2">
                </label>
                <label>Подтвердите новый пароль
                    <input type="password" id="chgpwdNew2" autocomplete="new-password"
                           data-next="chgpwdSaveBtn">
                </label>
            </div>
            <div class="gc-chgpwd-error" id="chgpwdError"></div>
            <div class="gc-chgpwd-footer">
                <button onclick="closeChgpwdModal()">Отмена</button>
                <button class="primary" id="chgpwdSaveBtn" onclick="submitChangePassword()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div class="sidebar-header"><h3>Списки задач</h3></div>
        <div class="sidebar-add">
            <button onclick="createNewSession()">Новый список</button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left">
                <h1>GigaChat Планировщик</h1>
            </div>
            <div class="header-right">
                <div class="status" id="statusBar">
                    <span class="dot checking" id="statusDot"></span>
                    <span id="statusText">проверка...</span>
                </div>
                <!-- User-menu: имя текущего юзера + dropdown «Сменить/Выйти».
                     Заполняется JS при инициализации (берёт имя из localStorage). -->
                <div class="gc-user-menu" id="userMenu" style="display:none">
                    <button class="gc-user-menu-trigger" id="userMenuTrigger" aria-haspopup="true" aria-expanded="false">
                        <span id="userMenuLabel">—</span>
                        <span class="gc-user-menu-arrow" aria-hidden="true"></span>
                    </button>
                    <div class="gc-user-menu-dropdown" role="menu">
                        <button type="button" onclick="openChgpwdModal()">Сменить пароль</button>
                        <button type="button" onclick="logoutUser()">Выйти</button>
                    </div>
                </div>
                <button class="btn-export" onclick="exportChat()">Экспорт</button>
            </div>
        </header>

        <!-- Панель задач: чек-лист с фильтром и кнопкой добавить -->
        <div id="tasks-panel">
            <div class="tasks-toolbar">
                <h2>Задачи</h2>
                <div class="tasks-filter-tabs">
                    <button class="active" data-filter="active" onclick="setTaskFilter('active', this)">Активные</button>
                    <button data-filter="completed" onclick="setTaskFilter('completed', this)">Выполненные</button>
                    <button data-filter="all" onclick="setTaskFilter('all', this)">Все</button>
                </div>
                <button class="tasks-add-btn" onclick="openTaskModal()" aria-label="Добавить задачу">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Задача
                </button>
            </div>
            <div id="tasks-list">
                <div class="tasks-empty"></div>
            </div>
        </div>

        <!-- AI-чат для запросов -->
        <div id="chat">
            <div class="empty-chat">Создайте список задач, потом спланируйте их с помощью GigaChat</div>
        </div>
        <div class="bottom-area">
            <!-- gc-attach-chips и attachBtn — обязательные slots для setupAttachment
                 из _shared.js (createChatAgent его вызывает безусловно). В планировщике
                 файлы пока не используются, поэтому контейнеры скрыты — скрепка не
                 создаётся в visible-зоне. Без этих элементов createChatAgent падал
                 с appendChild на null, ломая весь setup (resize, ping, status). -->
            <div class="gc-attach-chips" id="attachChips" style="display:none"></div>
            <div id="input-area" class="gc-input-row">
                <div class="gc-input-wrap">
                    <textarea id="msg" rows="1" placeholder="Спланируйте задачи..." disabled></textarea>
                    <button id="send" class="gc-send-icon" onclick="sendMsg()" disabled aria-label="Отправить">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                    </button>
                </div>
                <span id="attachBtn" style="display:none"></span>
            </div>
        </div>
    </div>

    <!-- Модалка добавления/редактирования задачи -->
    <div class="task-modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
        <div class="task-modal">
            <div class="task-modal-header">
                <h3 id="taskModalTitle">Новая задача</h3>
                <button class="task-modal-close" onclick="closeTaskModal()" aria-label="Закрыть">&times;</button>
            </div>
            <div class="task-modal-body">
                <label>Название
                    <input type="text" id="taskTitle" maxlength="500" placeholder="Что нужно сделать?">
                </label>
                <label>Описание
                    <textarea id="taskDescription" maxlength="5000" placeholder="Детали..."></textarea>
                </label>
                <label>Приоритет
                    <div class="gc-select" id="taskPriority" data-value="medium" tabindex="0" role="combobox" aria-haspopup="listbox" aria-expanded="false">

                            <li role="option" data-value="high">Высокий</li>
                        </ul>
                    </div>
                </label>
                <label>Срок выполнения
                    <div class="gc-datepicker" id="taskDeadline" data-value="" tabindex="0" role="button" aria-haspopup="dialog" aria-expanded="false">
                        <div class="gc-datepicker-trigger">
                            <span class="gc-datepicker-label placeholder">дд.мм.гггг</span>
                            <span class="gc-datepicker-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg></span>
                        </div>
                        <div class="gc-datepicker-popup" role="dialog">
                            <div class="gc-datepicker-header">
                                <button type="button" class="gc-datepicker-nav gc-datepicker-prev" aria-label="Предыдущий месяц"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
                                <div class="gc-datepicker-title"></div>
                                <button type="button" class="gc-datepicker-nav gc-datepicker-next" aria-label="Следующий месяц"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
                            </div>
                            <div class="gc-datepicker-weekdays">
                                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
                            </div>
                            <div class="gc-datepicker-grid"></div>
                            <div class="gc-datepicker-actions">
                                <button type="button" class="gc-datepicker-clear">Закрыть</button>

                    </div>
                </label>
            </div>
            <div class="task-modal-error" id="taskModalError"></div>
            <div class="task-modal-footer">
                <button onclick="closeTaskModal()">Отмена</button>
                <button class="primary" onclick="saveTask()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        var escapeHtml = GigaChat.escapeHtml;
        var PLANNER_URL = GigaChat.webhookUrl('planner');
        var AUTH_URL = GigaChat.webhookUrl('planner-auth');

        // ========== Полноценная аутентификация ==========
        // localStorage хранит:
        //   planner_token    — session-токен (64 hex символа)
        //   planner_username — имя юзера (для отображения в header'е)
        // При старте страницы делаем verify(token). Если ОК — main UI.
        // Если нет/протух — login-форма. Запросы к /webhook/planner шлют token,
        // workflow проверяет в SQL Verify token и подставляет user_id.
        var TOKEN_KEY = 'planner_token';
        var USERNAME_KEY = 'planner_username';

        function getStoredToken() {
            try { return localStorage.getItem(TOKEN_KEY) || ''; } catch (e) { return ''; }
        }
        function getStoredUsername() {
            try { return localStorage.getItem(USERNAME_KEY) || ''; } catch (e) { return ''; }
        }
        function setStoredAuth(token, username) {
            try {
                localStorage.setItem(TOKEN_KEY, token);
                localStorage.setItem(USERNAME_KEY, username);
            } catch (e) {}
        }
        function clearStoredAuth() {
            try {
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem(USERNAME_KEY);
            } catch (e) {}
        }

        function sanitizeUserForPrefix(name) {
            return name.replace(/[^A-Za-z0-9_]/g, '_').toLowerCase().slice(0, 50)
                || 'user_' + Math.abs(hashString(name));
        }
        function hashString(s) {
            var h = 0;
            for (var i = 0; i < s.length; i++) {
                h = ((h << 5) - h) + s.charCodeAt(i);
                h |= 0;
            }
            return h;
        }

        // HTTP-обёртка для auth endpoint'а.
        // network: true — отличает сетевую ошибку от серверного отказа.
        // Тексты сообщений намеренно не формируем здесь — caller (submitLogin/
        // submitRegister) сам выбирает фиксированный текст из разрешённого списка.
        async function authApi(payload) {
            try {
                var res = await fetch(AUTH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) return { response: 'error' };
                return await res.json();
            } catch (e) {
                console.error('Auth API error:', e);
                return { response: 'error', network: true };
            }
        }

        // === Login screen UI ===
        function showLoginScreen(activeTab) {
            var overlay = document.getElementById('loginOverlay');
            overlay.style.display = 'flex';
            overlay.classList.remove('gc-fade-out');
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
            // Скрываем стандартный #gc-theme-toggle из _shared.js на login —
            // в overlay есть своя .gc-login-theme. Возвращаем в hideLoginScreen.
            var stdToggle = document.getElementById('gc-theme-toggle');
            if (stdToggle) stdToggle.style.display = 'none';
            updateLoginThemeIcon();
            switchLoginTab(activeTab || 'login');
        }
        // Плавно прячет login-overlay (opacity transition 250 мс) и снимает
        // класс gc-pending-auth → main UI становится visible под overlay,
        // успевает отрендериться, потом overlay уходит. Без reload.
        function hideLoginScreen() {
            var overlay = document.getElementById('loginOverlay');
            // Сразу делаем main UI visible (был спрятан через .gc-pending-auth)
            document.documentElement.classList.remove('gc-pending-auth');
            document.documentElement.style.overflow = '';
            document.body.style.overflow = '';
            // Возвращаем стандартную theme-toggle (на overlay'е была своя)
            var stdToggle = document.getElementById('gc-theme-toggle');
            if (stdToggle) stdToggle.style.display = '';
            if (!overlay) return;
            overlay.classList.add('gc-fade-out');
            setTimeout(function () {
                overlay.style.display = 'none';
                overlay.classList.remove('gc-fade-out');
            }, 260);
        }

        // === Кнопка переключения тем на login-экране ========================
        // Используем GigaChat.toggleTheme если доступен (sync hljs, иконка
        // стандартной кнопки, cross-tab sync), иначе локальный fallback.
        var LOGIN_SUN_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>';
        var LOGIN_MOON_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

        function updateLoginThemeIcon() {
            var btn = document.getElementById('loginThemeToggle');
            if (!btn) return;
            var dark = document.documentElement.getAttribute('data-theme') === 'dark';
            // На тёмной теме показываем солнце (переключатель на светлую) и наоборот.
            btn.innerHTML = dark ? LOGIN_SUN_SVG : LOGIN_MOON_SVG;
            // title= НЕ ставим — тултипы на login-экране запрещены.
            // aria-label оставляем для скринридеров (не показывается визуально).
            btn.setAttribute('aria-label', dark ? 'Светлая тема' : 'Тёмная тема');
        }
        function loginToggleTheme() {
            if (window.GigaChat && typeof window.GigaChat.toggleTheme === 'function') {
                window.GigaChat.toggleTheme();
            } else {
                // Fallback: переключаем data-theme + сохраняем в localStorage
                var html = document.documentElement;
                var cur = html.getAttribute('data-theme') || 'light';
                var next = cur === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                try { localStorage.setItem('giga_theme', next); } catch (e) {}
            }
            updateLoginThemeIcon();
        }

        // Переключение вкладки: ширина и верх модалки фиксированы, плавно
        // меняется только высота (рост/убывание снизу). Содержимое формы
        // переключается мгновенно. options.focusFieldId — id поля для фокуса.
        function switchLoginTab(tab, options) {
            options = options || {};
            var currentActive = document.querySelector('.gc-login-tab.active');
            var isSameTab = currentActive && currentActive.dataset.tab === tab;
            var modal = document.querySelector('.gc-login-modal');

            function applySwap() {
                var tabs = document.querySelectorAll('.gc-login-tab');
                var forms = document.querySelectorAll('.gc-login-form');
                for (var i = 0; i < tabs.length; i++) {
                    tabs[i].classList.toggle('active', tabs[i].dataset.tab === tab);
                }
                for (var i = 0; i < forms.length; i++) {
                    forms[i].classList.toggle('hidden', forms[i].dataset.form !== tab);
                }
                var btn = document.getElementById('loginSubmitBtn');
                if (btn) btn.textContent = tab === 'register' ? 'Зарегистрироваться' : 'Войти';
                setLoginError('loginError', '');
                setLoginError('regError', '');
            }

            function focusTarget() {
                var target = options.focusFieldId
                    ? document.getElementById(options.focusFieldId)
                    : document.querySelector('.gc-login-form:not(.hidden) input');
                if (target) target.focus();
            }

            if (!isSameTab && modal && currentActive) {
                // 3-фазная анимация (≈400мс полный цикл):
                //   Фаза 1 (90мс): opacity текущей формы → 0
                //   Фаза 2 (200мс): swap + height transition, footer движется
                //                   синхронно с нижней границей (flex column)
                //   Фаза 3 (90мс): opacity новой формы → 1
                if (modal._switchTimers) modal._switchTimers.forEach(clearTimeout);
                modal._switchTimers = [];

                var oldForm = document.querySelector('.gc-login-form:not(.hidden)');
                if (oldForm) oldForm.style.opacity = '0';

                modal._switchTimers.push(setTimeout(function () {
                    var fromHeight = modal.offsetHeight;
                    modal.style.height = fromHeight + 'px';
                    modal.offsetHeight; // force reflow
                    applySwap();
                    var newForm = document.querySelector('.gc-login-form:not(.hidden)');
                    if (newForm) newForm.style.opacity = '0';
                    modal.style.height = 'auto';
                    var toHeight = modal.offsetHeight;
                    modal.style.height = fromHeight + 'px';
                    modal.offsetHeight; // force reflow
                    modal.style.height = toHeight + 'px';

                    modal._switchTimers.push(setTimeout(function () {
                        modal.style.height = '';
                        if (oldForm) oldForm.style.opacity = '';
                        if (newForm) newForm.style.opacity = '1';

                        modal._switchTimers.push(setTimeout(function () {
                            if (newForm) newForm.style.opacity = '';
                            modal._switchTimers = [];
                            focusTarget();
                        }, 100));
                    }, 210));
                }, 100));
            } else {
                // Первое отображение или тот же tab — без анимации
                applySwap();
                setTimeout(focusTarget, 50);
            }
        }

        // Установка inline-ошибки с авто-очисткой через 5 секунд.
        // Если text пустой — очищает мгновенно и отменяет старый таймер.
        // Также сбрасывает success-стейт (зелёный бэйдж после регистрации).
        function setLoginError(elId, text) {
            var el = document.getElementById(elId);
            if (!el) return;
            if (el._clearTimer) {
                clearTimeout(el._clearTimer);
                el._clearTimer = null;
            }
            el.classList.remove('gc-success');
            el.textContent = text || '';
            if (text) {
                el._clearTimer = setTimeout(function () {
                    el.textContent = '';
                    el._clearTimer = null;
                }, 5000);
            }
        }

        // Показ success-бэйджа после регистрации в той же области, где ошибки.
        // Зелёный кружок с белой галочкой + текст справа. Очищается при
        // следующем setLoginError или явно через clearRegSuccess().
        function showRegSuccess() {
            var el = document.getElementById('regError');
            if (!el) return;
            if (el._clearTimer) {
                clearTimeout(el._clearTimer);
                el._clearTimer = null;
            }
            el.classList.add('gc-success');
            el.innerHTML = '<span class="gc-success-badge" aria-hidden="true"></span><span>Вы зарегистрированы</span>';
        }

        // submitLogin/submitRegister — единственное место, где формируется
        // текст inline-ошибки. Список разрешённых сообщений фиксирован,
        // серверный текст data.error НЕ показывается юзеру (только в console).
        async function submitLogin() {
            var btn = document.getElementById('loginSubmitBtn');
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            var remember = document.getElementById('loginRemember').checked;
            setLoginError('loginError', '');
            if (!username) { setLoginError('loginError', 'Введите имя'); return; }
            if (!password) { setLoginError('loginError', 'Введите пароль'); return; }
            btn.disabled = true;
            btn.textContent = 'Вход…';
            try {
                var data = await authApi({ action: 'login', username: username, password: password, remember: remember });
                if (data.response !== 'ok') {
                    // Сеть упала → «Сеть недоступна», иначе сервер отказал → «Не удалось войти»
                    setLoginError('loginError', data.network ? 'Сеть недоступна' : 'Не удалось войти');
                    return;
                }
                // Без reload: ставим стейт, инициализируем UI, плавно прячем overlay.
                setStoredAuth(data.token, data.username);
                CURRENT_TOKEN = data.token;
                CURRENT_USER = data.username;
                AUTH_READY = true;
                initAuthenticatedUI();
                hideLoginScreen();
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        async function submitRegister() {
            var btn = document.getElementById('loginSubmitBtn');
            var username = document.getElementById('regUsername').value.trim();
            var password = document.getElementById('regPassword').value;
            var password2 = document.getElementById('regPassword2').value;
            setLoginError('regError', '');
            if (!username) { setLoginError('regError', 'Введите имя'); return; }
            if (password.length < 6) { setLoginError('regError', 'Пароль не короче 6 символов'); return; }
            if (password !== password2) { setLoginError('regError', 'Пароли не совпадают'); return; }
            btn.disabled = true;
            btn.textContent = 'Регистрация…';
            var data = await authApi({ action: 'register', username: username, password: password });
            if (data.response !== 'ok') {
                setLoginError('regError', 'Не удалось зарегистрироваться');
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
                return;
            }
            // Регистрация прошла — показываем зелёный бэйдж «Вы зарегистрированы»
            // на 2 секунды, потом плавный переход на «Вход» с предзаполненным
            // именем. Сессия НЕ создаётся, юзер логинится явно. Кнопку
            // оставляем disabled чтобы повторно не нажал в эти 2 секунды.
            showRegSuccess();
            btn.textContent = 'Готово';
            setTimeout(function () {
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = '';
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regPassword2').value = '';
                // switchLoginTab внутри вызовет setLoginError('regError','')
                // — это снимет gc-success класс и innerHTML бэйджа.
                switchLoginTab('login', { focusFieldId: 'loginPassword' });
                btn.disabled = false;
            }, 2000);
        }

        // === Enter-цепочка в login/register формах =========================
        // Поведение: Enter в input'е НЕ сабмитит форму, а переводит фокус
        // на следующее поле (data-next=id). Если data-next указывает на
        // кнопку (loginSubmitBtn) — Enter триггерит её клик (= submit).
        // Чекбоксы остаются с нативным поведением (Space переключает,
        // Enter не нужен — это последнее поле перед submit).
        function handleLoginEnterChain(e) {
            if (e.key !== 'Enter') return;
            var inp = e.target;
            if (!inp || inp.tagName !== 'INPUT') return;
            if (inp.type === 'checkbox') return;  // native — на checkbox Enter ничего не делает
            var nextId = inp.getAttribute('data-next');
            if (!nextId) return;  // нет data-next → native submit формы
            var nextEl = document.getElementById(nextId);
            if (!nextEl) return;
            e.preventDefault();
            if (nextEl.tagName === 'BUTTON') {
                // Последнее поле — Enter кликает «Войти» / «Зарегистрироваться»
                nextEl.click();
            } else {
                nextEl.focus();
            }
        }
        (function bindLoginEnterChain() {
            // Login/register формы + change-password модалка используют одну
            // и ту же логику data-next (handleLoginEnterChain). Биндим разом.
            var inputs = document.querySelectorAll('.gc-login-form input, .gc-chgpwd-body input');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].addEventListener('keydown', handleLoginEnterChain);
            }
        })();

        // === Logout / Change-password ===
        async function logoutUser() {
            var token = getStoredToken();
            // Fire-and-forget — если сеть упала, всё равно очищаем локально.
            if (token) {
                try { await authApi({ action: 'logout', token: token }); } catch (e) {}
            }
            clearStoredAuth();
            location.reload();
        }

        function openChgpwdModal() {
            document.getElementById('chgpwdOverlay').classList.add('show');
            document.getElementById('chgpwdOld').value = '';
            document.getElementById('chgpwdNew').value = '';
            document.getElementById('chgpwdNew2').value = '';
            document.getElementById('chgpwdError').textContent = '';
            setTimeout(function () { document.getElementById('chgpwdOld').focus(); }, 50);
        }
        function closeChgpwdModal() {
            document.getElementById('chgpwdOverlay').classList.remove('show');
        }
        async function submitChangePassword() {
            var err = document.getElementById('chgpwdError');
            var oldP = document.getElementById('chgpwdOld').value;
            var newP = document.getElementById('chgpwdNew').value;
            var newP2 = document.getElementById('chgpwdNew2').value;
            err.textContent = '';
            if (!oldP) { err.textContent = 'Введите текущий пароль'; return; }
            if (newP.length < 6) { err.textContent = 'Новый пароль не короче 6 символов'; return; }
            if (newP !== newP2) { err.textContent = 'Новые пароли не совпадают'; return; }
            if (oldP === newP) { err.textContent = 'Новый пароль должен отличаться от текущего'; return; }
            var token = getStoredToken();
            if (!token) { err.textContent = 'Не авторизован'; return; }
            var data = await authApi({
                action: 'change_password',
                token: token,
                old_password: oldP,
                new_password: newP,
            });
            if (data.response !== 'ok') {
                err.textContent = data.error || 'Не удалось сменить пароль';
                return;
            }
            closeChgpwdModal();
            alert('Пароль успешно изменён');
        }

        // === Старт страницы: verify token → main UI или login screen ===
        var CURRENT_USER = '';
        var CURRENT_TOKEN = getStoredToken();
        var AUTH_READY = false;  // true когда verify прошёл успешно

        (function bootstrap() {
            if (!CURRENT_TOKEN) {
                // Нет токена — сразу login
                showLoginScreen('login');
                return;
            }
            // Проверяем токен у сервера. Делаем sync-ish через async IIFE.
            (async function verify() {
                var data = await authApi({ action: 'verify', token: CURRENT_TOKEN });
                if (data.response !== 'ok' || data.auth_required) {
                    clearStoredAuth();
                    showLoginScreen('login');
                    return;
                }
                // Токен валиден — обновляем username (может изменился на сервере)
                CURRENT_USER = data.username;
                setStoredAuth(CURRENT_TOKEN, data.username);
                AUTH_READY = true;
                // verify прошёл — снимаем gc-pending-auth, main UI становится visible
                // (login-overlay тут даже не показывали, скрывать нечего).
                document.documentElement.classList.remove('gc-pending-auth');
                initAuthenticatedUI();
            })();
        })();

        function initAuthenticatedUI() {
            // Возвращаем стандартный #gc-theme-toggle (мы прятали его на login-экране,
            // там работала своя .gc-login-theme).
            var stdToggle = document.getElementById('gc-theme-toggle');
            if (stdToggle) stdToggle.style.display = '';
            // User-menu в шапке: показываем имя + dropdown
            var menu = document.getElementById('userMenu');
            var trigger = document.getElementById('userMenuTrigger');
            var label = document.getElementById('userMenuLabel');
            label.textContent = CURRENT_USER;
            menu.style.display = '';

            function setOpen(open) {
                menu.classList.toggle('open', open);
                trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!menu.classList.contains('open'));
            });
            document.addEventListener('click', function (e) {
                if (!menu.contains(e.target)) setOpen(false);
            });

            // Запускаем основную инициализацию планировщика
            initPlannerMainUI();
        }

        // ========== Локальное состояние панели задач ==========
        var currentFilter = 'active';
        var currentTasks = [];           // последний загруженный массив с сервера
        var editingTaskId = null;        // null = создание новой, число = редактирование
        var plannerAgent = null;         // ссылка на результат createChatAgent — нужна для чтения sessionStore.state

        // Читаем activeSessionId напрямую из sessionStore. Раньше держали
        // отдельную переменную currentSessionId, обновлявшуюся в onSwitchExtra,
        // но onEmpty (срабатывает при удалении ПОСЛЕДНЕЙ сессии) НЕ зовёт
        // onSwitchExtra → переменная не сбрасывалась → юзер мог открыть модалку
        // и создать задачу в несуществующей сессии. Прямое чтение из source-of-truth
        // решает: после удаления sessionStore.state.activeSessionId = null.
        function getCurrentSessionId() {
            if (!plannerAgent || !plannerAgent.sessionStore || !plannerAgent.sessionStore.state) return null;
            return plannerAgent.sessionStore.state.activeSessionId || null;
        }

        // Визуально показываем что без сессии нельзя добавить задачу.
        function updateTasksAddBtnState() {
            var btn = document.querySelector('.tasks-add-btn');
            if (!btn) return;
            var has = !!getCurrentSessionId();
            btn.disabled = !has;
            btn.style.opacity = has ? '' : '0.45';
            btn.style.cursor = has ? '' : 'not-allowed';
            btn.setAttribute('aria-disabled', has ? 'false' : 'true');
        }

        // ========== HTTP-обёртка для всех CRUD-операций ==========
        async function plannerApi(payload) {
            // Подмешиваем token в каждый запрос. Сервер делает SQL Verify token,
            // вытаскивает user_id, фильтрует задачи. Юзер видит только свои.
            payload.token = getStoredToken();
            try {
                var res = await GigaChat.fetchWithRetry(PLANNER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify(payload)
                }, { timeout: 30000, retries: 1 });
                if (!res.ok) throw new Error('Сервер вернул ' + res.status);
                var data = await res.json();
                // Если сервер сказал unauthorized — токен протух/невалиден.
                // Чистим локально и перенаправляем на login.
                if (data && data.auth_required) {
                    clearStoredAuth();
                    location.reload();
                    return { response: 'error', error: 'Сессия истекла' };
                }
                return data;
            } catch (e) {
                console.error('Planner API error:', e);
                return { response: 'error', error: e.message };
            }
        }

        // ========== Загрузка задач для текущей сессии ==========
        async function loadTasks() {
            var sid = getCurrentSessionId();
            if (!sid) {
                currentTasks = [];
                document.getElementById('tasks-list').innerHTML = '<div class="tasks-empty"></div>';
                return;
            }
            var data = await plannerApi({
                action: 'list', session_id: sid, filter: currentFilter
            });
            currentTasks = (data && Array.isArray(data.tasks)) ? data.tasks : [];
            renderTasks();
        }

        function renderTasks() {
            var list = document.getElementById('tasks-list');
            if (currentTasks.length === 0) {
                var msg = currentFilter === 'active' ? 'Активных задач нет. Добавьте первую.'
                        : currentFilter === 'completed' ? 'Ничего пока не выполнено.'
                        : 'Список пуст.';
                list.innerHTML = '<div class="tasks-empty">' + msg + '</div>';
                return;
            }
            var today = new Date().toISOString().slice(0, 10);
            var html = currentTasks.map(function (t) {
                var isCompleted = t.status === 'completed';
                var isOverdue = !isCompleted && t.deadline && t.deadline < today;
                var dlClass = isOverdue ? 'overdue' : '';
                var dlText = t.deadline ? ('до ' + t.deadline) : '';
                var prioRu = t.priority === 'high' ? 'Высокий'
                           : t.priority === 'low' ? 'Низкий' : 'Средний';
                var descHtml = t.description ? '<div class="task-description">' + escapeHtml(t.description) + '</div>' : '';
                return '<div class="task-item ' + (isCompleted ? 'completed ' : '') + (isOverdue ? 'overdue' : '') + '" data-id="' + t.id + '">'
                    + '<div class="task-check ' + (isCompleted ? 'checked' : '') + '" onclick="toggleTask(' + t.id + ')" role="checkbox" aria-checked="' + isCompleted + '"></div>'
                    + '<div class="task-body" onclick="openTaskModal(' + t.id + ')">'
                    + '<div class="task-title-row">'
                    + '<span class="task-priority ' + t.priority + '">' + prioRu + '</span>'
                    + '<span class="task-title">' + escapeHtml(t.title) + '</span>'
                    + (dlText ? '<span class="task-deadline ' + dlClass + '">' + dlText + '</span>' : '')
                    + '</div>'
                    + descHtml
                    + '</div>'
                    + '<div class="task-actions">'
                    + '<button class="delete" onclick="event.stopPropagation();deleteTask(' + t.id + ')" aria-label="Удалить">×</button>'
                    + '</div>'
                    + '</div>';
            }).join('');
            list.innerHTML = html;
        }

        // ========== Фильтр (Активные / Выполненные / Все) ==========
        function setTaskFilter(filter, btn) {
            currentFilter = filter;
            var tabs = document.querySelectorAll('.tasks-filter-tabs button');
            for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
            btn.classList.add('active');
            loadTasks();
        }

        // ========== Модалка добавления / редактирования ==========
        // ========== Кастомный dropdown для приоритета ==========
        // Native <select> нельзя стилизовать полностью (popup и option рендерит
        // браузер/ОС — отсюда был синий highlight и острые углы). Свой widget
        // на div'ах даёт полный контроль над поведением и внешним видом.
        function initPrioritySelect() {
            var sel = document.getElementById('taskPriority');
            if (!sel || sel._initialized) return;
            sel._initialized = true;
            var trigger = sel.querySelector('.gc-select-trigger');
            var menu = sel.querySelector('.gc-select-menu');
            var label = sel.querySelector('.gc-select-label');

            function setOpen(open) {
                sel.classList.toggle('open', open);
                sel.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!sel.classList.contains('open'));
            });
            // Закрытие по клику вне
            document.addEventListener('click', function (e) {
                if (!sel.contains(e.target)) setOpen(false);
            });
            // Закрытие по Escape (обрабатывается в общем listener'е модалки тоже,
            // но здесь для случая когда dropdown открыт без модалки)
            sel.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && sel.classList.contains('open')) {
                    setOpen(false); e.stopPropagation();
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    setOpen(!sel.classList.contains('open'));
                }
            });
            // Выбор опции
            menu.querySelectorAll('li').forEach(function (li) {
                li.addEventListener('click', function (e) {
                    e.stopPropagation();
                    setPriorityValue(li.getAttribute('data-value'));
                    setOpen(false);
                });
            });
        }

        function getPriorityValue() {
            var sel = document.getElementById('taskPriority');
            return sel ? (sel.getAttribute('data-value') || 'medium') : 'medium';
        }

        function setPriorityValue(value) {
            var sel = document.getElementById('taskPriority');
            if (!sel) return;
            var menu = sel.querySelector('.gc-select-menu');
            var label = sel.querySelector('.gc-select-label');
            var target = menu.querySelector('li[data-value="' + value + '"]');
            if (!target) return;
            menu.querySelectorAll('li').forEach(function (x) { x.classList.remove('selected'); });
            target.classList.add('selected');
            sel.setAttribute('data-value', value);
            label.textContent = target.textContent;
        }

        // ========== Кастомный datepicker ==========
        // Нативный <input type="date"> открывает OS-уровневый popup с месяцами
        // (синие квадраты, OS-zависимый рендер). Свой widget на div'ах даёт
        // полный контроль: hover/focus в accent, скруглённые ячейки, тёмная/
        // светлая тема, кнопки «Очистить» и «Сегодня». Внутреннее значение
        // хранится как YYYY-MM-DD в data-value (тот же формат что был у input).
        var MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                         'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

        function todayYMD() {
            var d = new Date();
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }
        function formatYMDDisplay(ymd) {
            if (!ymd) return null;
            var p = ymd.split('-');
            return p[2] + '.' + p[1] + '.' + p[0];
        }
        function parseYMD(ymd) {
            var p = ymd.split('-');
            return { y: parseInt(p[0], 10), m: parseInt(p[1], 10) - 1, d: parseInt(p[2], 10) };
        }

        function initDatepicker() {
            var dp = document.getElementById('taskDeadline');
            if (!dp || dp._initialized) return;
            dp._initialized = true;

            var trigger = dp.querySelector('.gc-datepicker-trigger');
            var popup = dp.querySelector('.gc-datepicker-popup');
            var title = popup.querySelector('.gc-datepicker-title');
            var grid = popup.querySelector('.gc-datepicker-grid');
            var label = dp.querySelector('.gc-datepicker-label');

            var viewYear, viewMonth; // текущий просматриваемый месяц

            function setOpen(open) {
                dp.classList.toggle('open', open);
                dp.setAttribute('aria-expanded', open ? 'true' : 'false');
                if (open) {
                    // Точка отсчёта: если есть выбранная дата — её месяц; иначе сегодня.
                    var selected = dp.getAttribute('data-value');
                    var ref = selected ? parseYMD(selected) : (function () {
                        var d = new Date();
                        return { y: d.getFullYear(), m: d.getMonth(), d: d.getDate() };
                    })();
                    viewYear = ref.y;
                    viewMonth = ref.m;
                    render();
                }
            }

            function setValue(ymd) {
                dp.setAttribute('data-value', ymd || '');
                if (ymd) {
                    label.textContent = formatYMDDisplay(ymd);
                    label.classList.remove('placeholder');
                } else {
                    label.textContent = 'дд.мм.гггг';
                    label.classList.add('placeholder');
                }
            }
            dp._setValue = setValue;

            function render() {
                var todayStr = todayYMD();
                var selectedStr = dp.getAttribute('data-value') || '';

                title.textContent = MONTHS_RU[viewMonth] + ' ' + viewYear;

                // Первый день месяца, сдвинутый чтобы Пн=0
                var firstJs = new Date(viewYear, viewMonth, 1).getDay(); // 0=вс
                var firstMon = (firstJs + 6) % 7; // 0=пн
                var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
                var prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

                var cells = [];
                // Хвост предыдущего месяца
                for (var i = firstMon - 1; i >= 0; i--) {
                    var pm = viewMonth === 0 ? { y: viewYear - 1, m: 11 } : { y: viewYear, m: viewMonth - 1 };
                    cells.push({ day: prevMonthDays - i, other: true, y: pm.y, m: pm.m });
                }
                // Текущий месяц
                for (var d = 1; d <= daysInMonth; d++) {
                    cells.push({ day: d, other: false, y: viewYear, m: viewMonth });
                }
                // Голова следующего месяца — добиваем до 6 строк (42 ячейки)
                var nextDay = 1;
                while (cells.length < 42) {
                    var nm = viewMonth === 11 ? { y: viewYear + 1, m: 0 } : { y: viewYear, m: viewMonth + 1 };
                    cells.push({ day: nextDay++, other: true, y: nm.y, m: nm.m });
                }

                grid.innerHTML = cells.map(function (c) {
                    var ymd = c.y + '-' + String(c.m + 1).padStart(2, '0') + '-' + String(c.day).padStart(2, '0');
                    var cls = 'gc-datepicker-day';
                    if (c.other) cls += ' other-month';
                    if (ymd === todayStr && ymd !== selectedStr) cls += ' today';
                    if (ymd === selectedStr) cls += ' selected';
                    return '<button type="button" class="' + cls + '" data-date="' + ymd + '">' + c.day + '</button>';
                }).join('');

                Array.prototype.forEach.call(grid.querySelectorAll('.gc-datepicker-day'), function (btn) {
                    btn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        setValue(btn.getAttribute('data-date'));
                        setOpen(false);
                    });
                });
            }

            // Click handlers
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(!dp.classList.contains('open'));
            });
            popup.addEventListener('click', function (e) {
                // Внутренние клики не должны закрывать popup (только закрытие по выбору даты или actions)
                e.stopPropagation();
            });
            // Полностью контролируемый hover через JS: :hover в CSS убран,
            // вместо него класс .is-hovering ставится/снимается событиями
            // mouseenter/mouseleave. Это устраняет залипание подсветки
            // которое наблюдалось после клика мышью (некоторые браузеры
            // держат :hover state даже после mouseout, особенно если фокус
            // остаётся на кнопке). Плюс tabindex=-1 убирает кнопки из таб-
            // ордера — фокус на них не садится никаким образом.
            // mousedown.preventDefault() сохранён как двойная защита от focus.
            Array.prototype.forEach.call(popup.querySelectorAll('button'), function (btn) {
                btn.setAttribute('tabindex', '-1');
                btn.addEventListener('mousedown', function (e) { e.preventDefault(); });
                btn.addEventListener('mouseenter', function () { btn.classList.add('is-hovering'); });
                btn.addEventListener('mouseleave', function () { btn.classList.remove('is-hovering'); });
                // Двойная защита от залипания: после клика принудительно
                // снимаем класс (если mouseleave не отработал по какой-то причине).
                btn.addEventListener('click', function () {
                    btn.classList.remove('is-hovering');
                    btn.blur();
                });
            });
            popup.querySelector('.gc-datepicker-prev').addEventListener('click', function (e) {
                // blur — иначе после клика мышью фокус застревает на кнопке,
                // и она выглядит «активной» пока юзер не наведёт на что-то ещё.
                e.currentTarget.blur();
                viewMonth--;
                if (viewMonth < 0) { viewMonth = 11; viewYear--; }
                render();
            });
            popup.querySelector('.gc-datepicker-next').addEventListener('click', function (e) {
                e.currentTarget.blur();
                viewMonth++;
                if (viewMonth > 11) { viewMonth = 0; viewYear++; }
                render();
            });
            popup.querySelector('.gc-datepicker-today').addEventListener('click', function () {
                var t = todayYMD();
                setValue(t);
                setOpen(false);
            });
            popup.querySelector('.gc-datepicker-clear').addEventListener('click', function () {
                // «Закрыть» — просто закрывает popup, не очищает значение.
                // Если юзер выбрал дату и хочет передумать — клик вне или Esc
                // тоже работают. Если хочет удалить ранее выбранную дату —
                // редактирует задачу и оставляет поле пустым (или удаляет задачу).
                setOpen(false);
            });
            // Outside click → close
            document.addEventListener('click', function (e) {
                if (!dp.contains(e.target)) setOpen(false);
            });
            // Keyboard: Escape закрывает, Enter/Space на triggerе открывает
            dp.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && dp.classList.contains('open')) {
                    setOpen(false); e.stopPropagation();
                } else if ((e.key === 'Enter' || e.key === ' ') && e.target === dp) {
                    e.preventDefault();
                    setOpen(!dp.classList.contains('open'));
                }
            });
        }

        function getDeadlineValue() {
            var dp = document.getElementById('taskDeadline');
            return dp ? (dp.getAttribute('data-value') || '') : '';
        }
        function setDeadlineValue(v) {
            var dp = document.getElementById('taskDeadline');
            if (!dp) return;
            if (dp._setValue) dp._setValue(v || null);
            else dp.setAttribute('data-value', v || '');
        }

        function openTaskModal(taskId) {
            if (!getCurrentSessionId()) {
                alert('Сначала создайте или выберите список задач');
                return;
            }
            initPrioritySelect();
            initDatepicker();
            editingTaskId = (typeof taskId === 'number') ? taskId : null;
            var title = document.getElementById('taskModalTitle');
            var inTitle = document.getElementById('taskTitle');
            var inDesc = document.getElementById('taskDescription');
            var err = document.getElementById('taskModalError');

            if (editingTaskId !== null) {
                title.textContent = 'Изменить задачу';
                var t = currentTasks.find(function (x) { return x.id === editingTaskId; });
                if (!t) { closeTaskModal(); return; }
                inTitle.value = t.title || '';
                inDesc.value = t.description || '';
                setPriorityValue(t.priority || 'medium');
                setDeadlineValue(t.deadline || null);
            } else {
                title.textContent = 'Новая задача';
                inTitle.value = '';
                inDesc.value = '';
                setPriorityValue('medium');
                setDeadlineValue(null);
            }
            err.textContent = '';
            document.getElementById('taskModal').classList.add('show');
            setTimeout(function () { inTitle.focus(); }, 50);
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('show');
            editingTaskId = null;
        }

        async function saveTask() {
            var err = document.getElementById('taskModalError');
            var sid = getCurrentSessionId();
            if (!sid) {
                err.textContent = 'Сессия не выбрана — создайте новый список задач слева';
                return;
            }
            var title = document.getElementById('taskTitle').value.trim();
            if (!title) { err.textContent = 'Название не может быть пустым'; return; }
            if (title.length > 500) { err.textContent = 'Название слишком длинное (>500)'; return; }

            var payload = {
                session_id: sid,
                title: title,
                description: document.getElementById('taskDescription').value.trim(),
                priority: getPriorityValue(),
                deadline: getDeadlineValue() || null
            };

            if (editingTaskId !== null) {
                payload.action = 'update';
                payload.id = editingTaskId;
            } else {
                payload.action = 'create';
            }

            var data = await plannerApi(payload);
            if (data.response === 'ok') {
                closeTaskModal();
                await loadTasks();
            } else {
                err.textContent = data.error || 'Не удалось сохранить';
            }
        }

        // ========== Отметить выполненной / вернуть в активные ==========
        async function toggleTask(taskId) {
            var sid = getCurrentSessionId();
            if (!sid) return;
            var t = currentTasks.find(function (x) { return x.id === taskId; });
            if (!t) return;
            var newStatus = t.status === 'completed' ? 'active' : 'completed';
            // Оптимистично обновляем UI до ответа сервера
            t.status = newStatus;
            renderTasks();
            var data = await plannerApi({
                action: 'update', session_id: sid,
                id: taskId, status: newStatus
            });
            if (data.response !== 'ok') {
                t.status = newStatus === 'completed' ? 'active' : 'completed';
                renderTasks();
                alert('Не удалось обновить статус: ' + (data.error || 'неизвестная ошибка'));
            } else {
                // Перезагружаем чтобы синхронизироваться с серверным фильтром
                await loadTasks();
            }
        }

        // ========== Удаление ==========
        async function deleteTask(taskId) {
            var sid = getCurrentSessionId();
            if (!sid) return;
            if (!confirm('Удалить задачу безвозвратно?')) return;
            var data = await plannerApi({
                action: 'delete', session_id: sid, id: taskId
            });
            if (data.response === 'ok') {
                await loadTasks();
            } else {
                alert('Не удалось удалить: ' + (data.error || 'неизвестная ошибка'));
            }
        }

        // ========== Закрытие модалки по Escape ==========
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeTaskModal();
        });

        // ========== Рендер bot-сообщений: простой текст + переносы ==========
        function formatBotMessage(msg) {
            if (!msg.content) return '';
            var html = String(msg.content)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        // ========== Инициализация чат-агента ==========
        // ВАЖНО: prefix/idPrefix зависят от текущего юзера — благодаря этому
        // списки задач (sessions в localStorage) изолированы между юзерами
        // на одном браузере. Иванов вошёл → видит свои списки; вышел, Петров
        // вошёл → видит свои. Имена сессий безопасно живут в plain ASCII
        // (sanitizeUserForPrefix транслитерирует кириллицу в _).
        //
        // Эта функция вызывается из initAuthenticatedUI ПОСЛЕ успешного
        // verify-токена — раньше делать нельзя, потому что createChatAgent
        // создаёт sessionStore с user-зависимым префиксом, а сменить его
        // после без полного релоада нельзя.
        function initPlannerMainUI() {
        var USER_PREFIX = sanitizeUserForPrefix(CURRENT_USER);
        plannerAgent = GigaChat.createChatAgent({
            webhookPath: 'planner',
            historyPath: 'history',
            prefix: 'planner_' + USER_PREFIX,
            idPrefix: 'planner_' + USER_PREFIX + '_',
            namePrefix: 'Список-',
            inflightLabel: 'Думаю',
            exportAgentName: 'GigaChat Планировщик',
            emptyChatHtml: '<div class="empty-chat">Создайте список задач, потом спланируйте их с помощью GigaChat</div>',
            historyErrorHtml: '<div class="empty-chat">Не удалось загрузить историю AI-запросов.</div>',
            historyLoadingHtml: '<div class="empty-chat">Загружаю...</div>',
            formatBotHtml: formatBotMessage,
            parseBotMessage: function (data) {
                return {
                    role: 'assistant',
                    content: data.response || 'Пустой ответ',
                    extras: {}
                };
            },
            onSwitchExtra: function (sid) {
                // sid здесь — id новой активной сессии. Прямо его не сохраняем,
                // источник истины — sessionStore.state.activeSessionId (читается
                // через getCurrentSessionId()). Обновляем UI и грузим задачи.
                updateTasksAddBtnState();
                loadTasks();
            }
        });

        // Отслеживаем удаление сессий через DOM-изменения сайдбара. _shared.js
        // при удалении ПОСЛЕДНЕЙ сессии не зовёт onSwitch (и значит не зовёт
        // наш onSwitchExtra) — только onEmpty. Этот колбэк хардкодится в
        // createChatAgent, расширить его нельзя. MutationObserver на
        // #sessionList — единственный надёжный сигнал что состав сессий изменился.
        (function () {
            var sl = document.getElementById('sessionList');
            if (!sl) return;
            new MutationObserver(function () {
                updateTasksAddBtnState();
                if (!getCurrentSessionId()) {
                    // Активная сессия исчезла — чистим панель задач
                    currentTasks = [];
                    document.getElementById('tasks-list').innerHTML = '<div class="tasks-empty"></div>';
                }
            }).observe(sl, { childList: true, subtree: false });
        })();

        // Начальное состояние кнопки «+ Задача» — на момент init может не быть
        // активной сессии (новый юзер без сохранённых списков).
        updateTasksAddBtnState();

        // Safety-net: explicit init resize. createChatAgent уже вызывает его внутри,
        // но если по какой-то причине setup прервался — функция идемпотентна
        // (внутренняя защита от двойной инициализации).
        if (GigaChat.initSidebarResize) {
            GigaChat.initSidebarResize({
                sidebar: document.querySelector('.sidebar'),
                initialWidth: 270, minWidth: 220, maxWidth: 440
            });
        }
        } // end function initPlannerMainUI — вызывается из initAuthenticatedUI после verify
    </script>
</body>
</html>
